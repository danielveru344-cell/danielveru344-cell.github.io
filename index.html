// ── Tarjeta de configuración de correo ────────────────────────────────────────
function EmailConfigCard({ flash }) {
  const load = () => window.getEmailConfig ? window.getEmailConfig() : { habilitado: true, correo: "" };
  const [cfg, setCfg]       = React.useState(load);
  const [editCorreo, setEditCorreo] = React.useState(load().correo);
  const [saved, setSaved]   = React.useState(false);

  const toggleHabilitado = () => {
    const next = { ...cfg, habilitado: !cfg.habilitado };
    setCfg(next);
    window.setEmailConfig(next);
    flash(next.habilitado ? "Notificaciones de correo activadas ✓" : "Notificaciones de correo desactivadas");
  };

  const guardarCorreo = () => {
    const correoTrim = editCorreo.trim();
    if (!correoTrim.includes("@") || !correoTrim.includes(".")) {
      flash("Ingresa un correo válido", false); return;
    }
    const next = { ...cfg, correo: correoTrim };
    setCfg(next);
    setEditCorreo(correoTrim);
    window.setEmailConfig(next);
    setSaved(true);
    flash("Correo destino actualizado ✓");
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div className="ios-card" style={{ padding: 0, overflow: "hidden" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#D9ECFF,#EAF4FF)", padding: "14px 18px", display: "flex", alignItems: "center", gap: 12, borderBottom: "1px solid #B3D4FF" }}>
        <div style={{ width: 36, height: 36, borderRadius: 10, background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, boxShadow: "0 1px 4px rgba(0,74,158,0.15)", flexShrink: 0 }}>📧</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: "Montserrat,sans-serif", fontWeight: 800, fontSize: 13, color: "#004A9E", textTransform: "uppercase", letterSpacing: 0.4 }}>Notificaciones por Correo</div>
          <div style={{ fontSize: 11, color: "#5A7FA8", marginTop: 1 }}>Aviso automático al pasar solicitud a "Para Compra"</div>
        </div>
        {/* Toggle switch */}
        <button onClick={toggleHabilitado} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: cfg.habilitado ? "#34C759" : "#8E8E93" }}>
            {cfg.habilitado ? "ACTIVO" : "INACTIVO"}
          </span>
          <div style={{
            width: 50, height: 28, borderRadius: 99, transition: "background 0.25s",
            background: cfg.habilitado ? "#34C759" : "#D1D1D6",
            position: "relative", flexShrink: 0, boxShadow: "inset 0 1px 3px rgba(0,0,0,0.15)"
          }}>
            <div style={{
              position: "absolute", top: 3, left: cfg.habilitado ? 24 : 3,
              width: 22, height: 22, borderRadius: "50%", background: "#fff",
              boxShadow: "0 1px 4px rgba(0,0,0,0.2)", transition: "left 0.22s cubic-bezier(0.4,0,0.2,1)"
            }}/>
          </div>
        </button>
      </div>

      {/* Correo destino */}
      <div style={{ padding: "14px 18px 16px", opacity: cfg.habilitado ? 1 : 0.45, transition: "opacity 0.2s" }}>
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 0.5, color: "#8E8E93", marginBottom: 8 }}>
          Correo destino
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input
            type="email"
            value={editCorreo}
            onChange={e => setEditCorreo(e.target.value)}
            disabled={!cfg.habilitado}
            placeholder="ejemplo@empresa.com"
            onKeyDown={e => e.key === "Enter" && cfg.habilitado && guardarCorreo()}
            style={{
              flex: 1, padding: "10px 13px", borderRadius: 10,
              border: "1.5px solid #D1D1D6", fontSize: 14, fontFamily: "inherit",
              background: cfg.habilitado ? "#fff" : "#F2F2F7",
              color: "#1C1C1E", outline: "none", transition: "border-color 0.2s"
            }}
            onFocus={e => e.target.style.borderColor = "#004A9E"}
            onBlur={e => e.target.style.borderColor = "#D1D1D6"}
          />
          <button
            onClick={guardarCorreo}
            disabled={!cfg.habilitado || editCorreo.trim() === cfg.correo}
            className="ios-btn ios-btn-blue ios-btn-sm"
            style={{ flexShrink: 0, opacity: (!cfg.habilitado || editCorreo.trim() === cfg.correo) ? 0.4 : 1, transition: "opacity 0.2s" }}
          >
            {saved ? "✓ Guardado" : "Guardar"}
          </button>
        </div>
        {cfg.correo && (
          <div style={{ fontSize: 11, color: "#8E8E93", marginTop: 6 }}>
            Enviando a: <strong style={{ color: "#004A9E" }}>{cfg.correo}</strong>
          </div>
        )}
      </div>
    </div>
  );
}

function UsuariosTab({ currentUserId, currentUsername, flash }) {
  const [usuarios, setUsuarios] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(null); // null | "add" | "edit"
  const [sel, setSel] = useState(null);

  const fetchUsuarios = async () => {
    setLoading(true);
    const { data, error } = await sb.from("usuarios").select("*").order("created_at");
    if (!error) setUsuarios(data);
    setLoading(false);
  };

  useEffect(() => { fetchUsuarios(); }, []);

  const [resetModal, setResetModal] = useState(false);

  const deleteUsuario = async (id) => {
    const target = usuarios.find(u => u.id === id);
    if (target?.username === "admin") { flash("El administrador inicial no puede eliminarse 🔒", false); return; }
    if (id === currentUserId) { flash("No puedes eliminar tu propio usuario", false); return; }
    if (!confirm("¿Eliminar este usuario?")) return;
    const { error } = await sb.from("usuarios").delete().eq("id", id);
    if (error) { flash("Error: " + error.message, false); return; }
    setUsuarios(prev => prev.filter(u => u.id !== id));
    flash("Usuario eliminado");
  };

  const toggleActivo = async (u) => {
    if (u.username === "admin") { flash("El administrador inicial no puede modificarse 🔒", false); return; }
    if (u.id === currentUserId) { flash("No puedes desactivarte a ti mismo", false); return; }
    const { error } = await sb.from("usuarios").update({ activo: !u.activo }).eq("id", u.id);
    if (error) { flash("Error: " + error.message, false); return; }
    setUsuarios(prev => prev.map(x => x.id === u.id ? { ...x, activo: !x.activo } : x));
    flash(u.activo ? "Usuario desactivado" : "Usuario activado");
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div className="section-hdr" style={{ margin: 0 }}>🛡️ Gestión de Usuarios</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="ios-btn ios-btn-sm" style={{ background: "#FFF5F5", color: "#FF3B30", border: "1.5px solid #FFDEDE" }}
            onClick={() => setResetModal(true)}>
            🗑️ Restablecer app
          </button>
          <button className="ios-btn ios-btn-blue ios-btn-sm" onClick={() => { setSel(null); setModal("add"); }}>
            + Nuevo usuario
          </button>
        </div>
      </div>

      {/* ── Configuración de correo ── */}
      <EmailConfigCard flash={flash} />

      <div className="ios-card">
        {loading ? (
          <div style={{ padding: 32, textAlign: "center", color: "#8E8E93" }}>Cargando…</div>
        ) : usuarios.length === 0 ? (
          <div style={{ padding: 32, textAlign: "center", color: "#8E8E93" }}>Sin usuarios</div>
        ) : usuarios.map(u => {
          const isAdminRoot = u.username === "admin";
          return (
          <div key={u.id} className="list-row" style={{ flexDirection: "column", alignItems: "stretch", gap: 10 }}>
            {/* Info row */}
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 36, height: 36, borderRadius: 18,
                background: u.role === "admin" ? "#D9ECFF" : u.role === "almacenista" ? "#D1F2E0" : "#FFF0D9",
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0
              }}>
                {ROLE_ICON[u.role]}
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14, display: "flex", alignItems: "center", gap: 5 }}>
                  <span>{u.nombre || u.username}</span>
                  {!u.activo && <span style={{ background: "#FFDEDE", color: "#C0001A", borderRadius: 8, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>Inactivo</span>}
                  {u.id === currentUserId && <span style={{ background: "#D9ECFF", color: "#004A9E", borderRadius: 8, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>Tú</span>}
                </div>
                <div style={{ fontSize: 11, color: "#8E8E93", marginTop: 2, display: "flex", gap: 5, alignItems: "center" }}>
                  <span>@{u.username}</span>
                  <span>·</span>
                  <span className={`role-badge role-${u.role}`} style={{ fontSize: 10, padding: "1px 6px" }}>{ROLE_LABEL[u.role]}</span>
                  {isAdminRoot && <span style={{ fontSize: 10, color: "#C45200" }}>🔒 Protegido</span>}
                </div>
              </div>
            </div>
            {/* Buttons row */}
            {isAdminRoot ? (
              <span style={{ fontSize: 11, color: "#C7C7CC", fontStyle: "italic" }}>No editable</span>
            ) : (
              <div style={{ display: "flex", gap: 8 }}>
                <button className="ios-btn ios-btn-gray ios-btn-sm" style={{ flex: 1 }}
                  onClick={() => { setSel(u); setModal("edit"); }}>Editar</button>
                <button className="ios-btn ios-btn-sm"
                  style={{ flex: 1, background: u.activo ? "#FFF0D9" : "#D1F2E0", color: u.activo ? "#C45200" : "#1D7A3E" }}
                  onClick={() => toggleActivo(u)}>
                  {u.activo ? "Desactivar" : "Activar"}
                </button>
                {u.id !== currentUserId && (
                  <button className="ios-btn ios-btn-red ios-btn-sm" style={{ flex: 1 }}
                    onClick={() => deleteUsuario(u.id)}>Eliminar</button>
                )}
              </div>
            )}
          </div>
          );
        })}
      </div>

      {(modal === "add" || modal === "edit") && (
        <UsuarioModal
          usuario={modal === "edit" ? sel : null}
          currentUsername={currentUsername}
          onClose={() => { setModal(null); setSel(null); }}
          onSave={async (f) => {
            if (modal === "add") {
              const { data, error } = await sb.from("usuarios").insert([f]).select().single();
              if (error) { flash("Error: " + error.message, false); return; }
              setUsuarios(prev => [...prev, data]);
              flash("Usuario creado ✓");
            } else {
              const upd = { nombre: f.nombre, role: f.role, activo: f.activo };
              if (f.password) upd.password = f.password;
              const { error } = await sb.from("usuarios").update(upd).eq("id", sel.id);
              if (error) { flash("Error: " + error.message, false); return; }
              setUsuarios(prev => prev.map(u => u.id === sel.id ? { ...u, ...upd } : u));
              flash("Usuario actualizado ✓");
            }
            setModal(null); setSel(null);
          }}
        />
      )}

      {resetModal && (
        <ResetModal
          onClose={() => setResetModal(false)}
          flash={flash}
          onDone={() => { setResetModal(false); fetchUsuarios(); }}
        />
      )}
    </div>
  );
}

function UsuarioModal({ usuario, currentUsername, onClose, onSave }) {
  const isEdit = !!usuario;

  // Bloqueo mutuo: admin no puede cambiar contraseña de mburgos y viceversa
  const PROTECTED_PAIRS = { admin: "mburgos", mburgos: "admin" };
  const passwordBlocked = isEdit && usuario?.username === PROTECTED_PAIRS[currentUsername];
  const [f, setF] = useState({
    username: usuario?.username || "",
    password: "",
    nombre: usuario?.nombre || "",
    role: usuario?.role || "solicitante",
    activo: usuario?.activo ?? true,
  });
  const s = (k, v) => setF(p => ({ ...p, [k]: v }));
  const [saving, setSaving] = useState(false);

  const handleSave = async () => {
    if (!f.nombre) { return; }
    if (!isEdit && (!f.username || !f.password)) { return; }
    setSaving(true);
    const payload = {
      username: f.username.trim().toLowerCase(),
      password: passwordBlocked ? undefined : f.password,
      nombre: f.nombre,
      role: f.role,
      activo: f.activo,
    };
    await onSave(payload);
    setSaving(false);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e => e.stopPropagation()}>
        <div className="sheet-handle" />
        <div className="sheet-title">{isEdit ? "Editar Usuario" : "Nuevo Usuario"}</div>
        <div style={{ padding: "16px 20px 28px", display: "flex", flexDirection: "column", gap: 14 }}>

          <AlmField label="Nombre completo">
            <input className="ios-input" value={f.nombre} onChange={e => s("nombre", e.target.value)} placeholder="Ej: Juan López" />
          </AlmField>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <AlmField label="Usuario">
              <input className="ios-input" value={f.username} onChange={e => s("username", e.target.value)}
                placeholder="juan.lopez" disabled={isEdit}
                style={isEdit ? { opacity: 0.5 } : {}} />
            </AlmField>
            <AlmField label={isEdit ? "Nueva contraseña (opcional)" : "Contraseña"}>
              {passwordBlocked ? (
                <div style={{ background: "#F2F2F7", border: "1.5px solid var(--border)", borderRadius: 8, padding: "10px 14px", fontSize: 13, color: "#8E8E93", display: "flex", alignItems: "center", gap: 6 }}>
                  🔒 <span>Sin permiso para cambiar esta contraseña</span>
                </div>
              ) : (
                <input className="ios-input" type="password" value={f.password}
                  onChange={e => s("password", e.target.value)} placeholder={isEdit ? "Dejar vacío = no cambiar" : "••••••••"} />
              )}
            </AlmField>
          </div>

          <AlmField label="Rol">
            <div style={{ display: "flex", gap: 8 }}>
              {["admin", "almacenista", "solicitante"].map(r => (
                <button key={r} onClick={() => s("role", r)} style={{
                  flex: 1, padding: "10px 8px", border: "1.5px solid",
                  borderColor: f.role === r ? "var(--navy)" : "var(--border)",
                  borderRadius: 8, background: f.role === r ? "var(--light)" : "#fff",
                  cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4
                }}>
                  <span style={{ fontSize: 20 }}>{ROLE_ICON[r]}</span>
                  <span style={{ fontSize: 10, fontWeight: 700, color: f.role === r ? "var(--navy)" : "var(--gray)", fontFamily: "Montserrat,sans-serif", textTransform: "uppercase", letterSpacing: 0.5 }}>
                    {ROLE_LABEL[r]}
                  </span>
                </button>
              ))}
            </div>
          </AlmField>

          {isEdit && (
            <AlmField label="Estado">
              <div style={{ display: "flex", gap: 8 }}>
                {[true, false].map(v => (
                  <button key={String(v)} onClick={() => s("activo", v)} style={{
                    flex: 1, padding: "10px", border: "1.5px solid",
                    borderColor: f.activo === v ? (v ? "#34C759" : "#FF3B30") : "var(--border)",
                    borderRadius: 8, background: f.activo === v ? (v ? "#D1F2E0" : "#FFDEDE") : "#fff",
                    cursor: "pointer", fontWeight: 700, fontSize: 13,
                    color: f.activo === v ? (v ? "#1D7A3E" : "#C0001A") : "var(--gray)",
                    fontFamily: "Montserrat,sans-serif", textTransform: "uppercase", letterSpacing: 0.5
                  }}>
                    {v ? "✓ Activo" : "✗ Inactivo"}
                  </button>
                ))}
              </div>
            </AlmField>
          )}

          <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
            <button className="ios-btn ios-btn-gray" style={{ flex: 1, color: "#8E8E93" }} onClick={onClose}>Cancelar</button>
            <button className="ios-btn ios-btn-blue" style={{ flex: 2 }} onClick={handleSave} disabled={saving}>
              {saving ? "Guardando…" : isEdit ? "Guardar cambios" : "Crear usuario"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// Lee áreas y equipos desde localStorage de Bitácora (mismos datos)
function AnalisisTab({ items, equipos }) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    const fetchAll = async () => {
      setLoading(true);
      const [{ data: solis }, { data: movs }] = await Promise.all([
        sb.from("solicitudes").select("*"),
        sb.from("movimientos").select("*").order("created_at", { ascending: false }).limit(1000),
      ]);
      setData({ solis: solis || [], movs: movs || [] });
      setLoading(false);
    };
    fetchAll();
  }, []);

  if (loading) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12, padding: 60, color: "#8E8E93" }}>
      <div style={{ fontSize: 36 }}>📊</div>
      <div style={{ fontWeight: 600 }}>Calculando análisis…</div>
    </div>
  );

  const { solis, movs } = data;
  const salidas     = movs.filter(m => m.type === "salida");
  const entradas    = movs.filter(m => m.type === "entrada");
  const devoluciones= movs.filter(m => m.type === "devolucion");

  // ── KPIs ───────────────────────────────────────────────
  const totalSolis = solis.length;
  const solicitadaCompra = solis.filter(s => s.status === "solicitada_compra").length;
  const totalSalidas     = salidas.reduce((s, m) => s + (m.quantity || 0), 0);
  const totalEntradas    = entradas.reduce((s, m) => s + (m.quantity || 0), 0);
  const totalDevoluciones= devoluciones.reduce((s, m) => s + (m.quantity || 0), 0);
  const bajosStock = items.filter(i => i.quantity <= i.minStock).length;
  const sinStock = items.filter(i => i.quantity === 0).length;
  const saludPct = items.length ? Math.round(((items.length - bajosStock) / items.length) * 100) : 100;

  // ── Top repuestos más pedidos (solicitudes) ─────────────
  const solByItem = {};
  solis.forEach(s => {
    const k = s.item_name || "Sin nombre";
    solByItem[k] = (solByItem[k] || 0) + 1;
  });
  const topSolicitados = Object.entries(solByItem).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // ── Top repuestos más consumidos (salidas) ──────────────
  const consByItem = {};
  salidas.forEach(m => {
    const k = m.item_name || "Sin nombre";
    consByItem[k] = (consByItem[k] || 0) + (m.quantity || 0);
  });
  const topConsumidos = Object.entries(consByItem).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // ── Equipos con más solicitudes ─────────────────────────
  const solByEquipo = {};
  solis.forEach(s => {
    const k = s.equipo || s.equipo_name || "Sin equipo";
    if (k && k !== "") solByEquipo[k] = (solByEquipo[k] || 0) + 1;
  });
  const topEquipos = Object.entries(solByEquipo).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // ── Distribución por categoría ──────────────────────────
  const catCount = {};
  items.forEach(i => { catCount[i.category] = (catCount[i.category] || 0) + 1; });
  const catData = Object.entries(catCount).sort((a, b) => b[1] - a[1]);

  // ── Categorías por consumo ──────────────────────────────
  const catCons = {};
  salidas.forEach(m => {
    const item = items.find(i => i.name === m.item_name || i.code === m.item_code);
    const cat = item?.category || "Otro";
    catCons[cat] = (catCons[cat] || 0) + (m.quantity || 0);
  });
  const catConsData = Object.entries(catCons).sort((a, b) => b[1] - a[1]).slice(0, 6);

  // ── Últimos 7 días de actividad ─────────────────────────
  const now = new Date();
  const dias = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(now); d.setDate(d.getDate() - (6 - i));
    const key = d.toISOString().slice(0, 10);
    const label = d.toLocaleDateString("es-CO", { weekday: "short", timeZone: "America/Bogota" });
    const ent = entradas.filter(m => m.created_at?.slice(0, 10) === key).reduce((s, m) => s + (m.quantity || 0), 0);
    const sal = salidas.filter(m => m.created_at?.slice(0, 10) === key).reduce((s, m) => s + (m.quantity || 0), 0);
    const dev = devoluciones.filter(m => m.created_at?.slice(0, 10) === key).reduce((s, m) => s + (m.quantity || 0), 0);
    return { label, ent, sal, dev };
  });
  const maxDia = Math.max(...dias.map(d => Math.max(d.ent, d.sal, d.dev)), 1);

  // ── Colors ──────────────────────────────────────────────
  const CAT_COLORS = ["#0D2F5C","#2d7dd2","#34C759","#FF9500","#AF52DE","#FF3B30","#5AC8FA"];

  // ── Reusable bar chart ──────────────────────────────────
  const BarChart = ({ data: rows, color, unit = "" }) => {
    if (!rows.length) return <div style={{ color: "#C7C7CC", fontSize: 13, padding: "12px 0" }}>Sin datos suficientes aún</div>;
    const max = Math.max(...rows.map(r => r[1]), 1);
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {rows.map(([label, val], i) => (
          <div key={i}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: "#3C3C43", maxWidth: "70%", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color }}>{val}{unit}</span>
            </div>
            <div style={{ height: 8, background: "#F2F2F7", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${(val / max) * 100}%`, background: color, borderRadius: 4, transition: "width 0.6s cubic-bezier(0.25,0.46,0.45,0.94)" }} />
            </div>
          </div>
        ))}
      </div>
    );
  };

  const Card = ({ title, icon, children, accent }) => (
    <div className="ios-card" style={{ padding: "16px 18px" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
        <div style={{ width: 32, height: 32, borderRadius: 8, background: accent + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>{icon}</div>
        <div style={{ fontFamily: "Montserrat,sans-serif", fontWeight: 800, fontSize: 12, color: "#0D2F5C", textTransform: "uppercase", letterSpacing: 1 }}>{title}</div>
      </div>
      {children}
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

      {/* ── KPI Row ── */}
      <div className="stat-scroll">
        {[
          { label: "Solicitudes totales", value: totalSolis, color: "#0D2F5C", icon: "📨" },
          { label: "Sol. para compra", value: solicitadaCompra, color: solicitadaCompra > 0 ? "#004A9E" : "#34C759", icon: "🛒" },
          { label: "Unidades consumidas", value: totalSalidas, color: "#FF3B30", icon: "📤" },
          { label: "Unidades ingresadas", value: totalEntradas, color: "#34C759", icon: "📥" },
          { label: "Devoluciones", value: totalDevoluciones, color: "#b07d00", icon: "↩" },
          { label: "Bajo stock", value: bajosStock, color: bajosStock > 0 ? "#FF9500" : "#34C759", icon: "⚠️" },
          { label: "Sin stock", value: sinStock, color: sinStock > 0 ? "#FF3B30" : "#34C759", icon: "🔴" },
          { label: "Salud del inventario", value: saludPct + "%", color: saludPct >= 80 ? "#34C759" : saludPct >= 60 ? "#FF9500" : "#FF3B30", icon: "💚" },
        ].map((k, i) => (
          <div key={i} className="stat-card" style={{ padding: "12px 14px", display: "flex", flexDirection: "column", gap: 2 }}>
            <div style={{ fontSize: 11, marginBottom: 2 }}>{k.icon}</div>
            <div style={{ fontSize: 28, fontWeight: 700, letterSpacing: -0.5, color: k.color, lineHeight: 1 }}>{k.value}</div>
            <div style={{ fontSize: 10, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, fontFamily: "Montserrat,sans-serif" }}>{k.label}</div>
          </div>
        ))}
      </div>

      {/* ── Actividad últimos 7 días ── */}
      <Card title="Actividad — Últimos 7 días" icon="📅" accent="#2d7dd2">
        <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 80 }}>
          {dias.map((d, i) => (
            <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
              <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 2, height: 64, justifyContent: "flex-end" }}>
                <div title={`Entradas: ${d.ent}`} style={{ width: "100%", height: `${(d.ent / maxDia) * 50}%`, minHeight: d.ent ? 3 : 0, background: "#34C759", borderRadius: "3px 3px 0 0", transition: "height 0.5s" }} />
                <div title={`Salidas: ${d.sal}`} style={{ width: "100%", height: `${(d.sal / maxDia) * 50}%`, minHeight: d.sal ? 3 : 0, background: "#FF3B30", borderRadius: "3px 3px 0 0", transition: "height 0.5s" }} />
              </div>
              <div style={{ fontSize: 9, color: "#8E8E93", fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.3 }}>{d.label}</div>
            </div>
          ))}
        </div>
        <div style={{ display: "flex", gap: 16, marginTop: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: "#34C759" }} /><span style={{ fontSize: 11, color: "#8E8E93" }}>Entradas</span></div>
          <div style={{ display: "flex", alignItems: "center", gap: 5 }}><div style={{ width: 10, height: 10, borderRadius: 2, background: "#FF3B30" }} /><span style={{ fontSize: 11, color: "#8E8E93" }}>Salidas</span></div>
        </div>
      </Card>

      {/* ── Top solicitados y consumidos ── */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Card title="Más solicitados" icon="🛒" accent="#C45200">
          <BarChart data={topSolicitados} color="#C45200" unit=" sol." />
        </Card>
        <Card title="Más consumidos" icon="📤" accent="#FF3B30">
          <BarChart data={topConsumidos} color="#FF3B30" unit=" und." />
        </Card>
      </div>

      {/* ── Equipos con más solicitudes ── */}
      {topEquipos.length > 0 && (
        <Card title="Equipos con más solicitudes" icon="🏭" accent="#0D2F5C">
          <BarChart data={topEquipos} color="#0D2F5C" unit=" sol." />
        </Card>
      )}

      {/* ── Distribución por categoría ── */}
      <Card title="Artículos por categoría" icon="🗂️" accent="#2d7dd2">
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {catData.map(([cat, count], i) => {
            const pct = Math.round((count / items.length) * 100);
            return (
              <div key={i}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: "#3C3C43", display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ width: 8, height: 8, borderRadius: "50%", background: CAT_COLORS[i % CAT_COLORS.length], display: "inline-block" }} />
                    {cat}
                  </span>
                  <span style={{ fontSize: 12, color: "#8E8E93" }}>{count} art. · <strong style={{ color: CAT_COLORS[i % CAT_COLORS.length] }}>{pct}%</strong></span>
                </div>
                <div style={{ height: 6, background: "#F2F2F7", borderRadius: 3, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${pct}%`, background: CAT_COLORS[i % CAT_COLORS.length], borderRadius: 3, transition: "width 0.6s" }} />
                </div>
              </div>
            );
          })}
        </div>
      </Card>

      {/* ── Consumo por categoría ── */}
      {catConsData.length > 0 && (
        <Card title="Consumo por categoría" icon="📊" accent="#AF52DE">
          <BarChart data={catConsData} color="#AF52DE" unit=" und." />
        </Card>
      )}

      {/* ── Ratio balance ── */}
      <Card title="Balance stock" icon="⚖️" accent="#34C759">
        {(() => {
          const total = totalEntradas + totalSalidas + totalDevoluciones || 1;
          const entPct = Math.round((totalEntradas / total) * 100);
          const devPct = Math.round((totalDevoluciones / total) * 100);
          const salPct = 100 - entPct - devPct;
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ height: 20, borderRadius: 10, overflow: "hidden", display: "flex" }}>
                <div style={{ width: `${entPct}%`, background: "#34C759", transition: "width 0.6s" }} />
                <div style={{ width: `${devPct}%`, background: "#b07d00", transition: "width 0.6s" }} />
                <div style={{ width: `${salPct}%`, background: "#FF3B30", transition: "width 0.6s" }} />
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 6 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: "#34C759" }} />
                  <span style={{ fontSize: 12, color: "#8E8E93" }}>Entradas <strong style={{ color: "#34C759" }}>{entPct}%</strong></span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: "#b07d00" }} />
                  <span style={{ fontSize: 12, color: "#8E8E93" }}>Devoluciones <strong style={{ color: "#b07d00" }}>{devPct}%</strong></span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 12, color: "#8E8E93" }}>Salidas <strong style={{ color: "#FF3B30" }}>{salPct}%</strong></span>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: "#FF3B30" }} />
                </div>
              </div>
              <div style={{ textAlign: "center", fontSize: 12, color: "#C7C7CC" }}>
                {totalEntradas === 0 && totalSalidas === 0 && totalDevoluciones === 0 ? "Sin movimientos registrados aún" : `${totalEntradas} entradas · ${totalDevoluciones} devoluciones · ${totalSalidas} salidas`}
              </div>
            </div>
          );
        })()}
      </Card>

    </div>
  );
}

function Panel({items,movs,alerts,equipos,setTab,setOnlyAlerts,currentUser,flash,reloadHistorial}){
  const total=items.reduce((s,i)=>s+i.quantity,0);

  // Últimos movimientos — fetch propio para estar siempre actualizado
  const [recent,setRecent]=React.useState([]);
  const fetchRecent=React.useCallback(async()=>{
    const {data}=await sb.from("movimientos").select("*").order("created_at",{ascending:false}).limit(10);
    if(data) setRecent(data.map(r=>({
      id:r.id, type:r.type,
      itemName:r.item_name||"—",
      quantity:r.quantity||0,
      date:r.created_at,
    })));
  },[]);
  React.useEffect(()=>{
    fetchRecent();
    const h=()=>fetchRecent();
    window.addEventListener("historial-updated",h);
    return ()=>window.removeEventListener("historial-updated",h);
  },[fetchRecent]);

  // Meta por tipo de movimiento (igual que Historial)
  const MOV_META={
    entrada:          {icon:"↑",  bg:"#D1F2E0", color:"#1D7A3E", label:"Entrada"},
    salida:           {icon:"↓",  bg:"#FFDEDE", color:"#C0001A", label:"Salida"},
    devolucion:       {icon:"↩",  bg:"#FFF8DC", color:"#b07d00", label:"Devolución"},
    alta_articulo:    {icon:"＋", bg:"#D9ECFF", color:"#004A9E", label:"Alta artículo"},
    edicion_articulo: {icon:"✏️", bg:"#E8F0FB", color:"#0D2F5C", label:"Edición"},
    baja_articulo:    {icon:"🗑", bg:"#FFF0D9", color:"#C45200", label:"Baja artículo"},
    alta_equipo:      {icon:"🔧", bg:"#D9ECFF", color:"#004A9E", label:"Alta equipo"},
    edicion_equipo:   {icon:"✏️", bg:"#E8F0FB", color:"#0D2F5C", label:"Edición equipo"},
    baja_equipo:      {icon:"🗑", bg:"#FFF0D9", color:"#C45200", label:"Baja equipo"},
    nueva_solicitud:  {icon:"📋", bg:"#F3E8FF", color:"#7C3AED", label:"Solicitud"},
    estado_solicitud: {icon:"🔄", bg:"#EDE9FE", color:"#5B21B6", label:"Estado sol."},
    baja_solicitud:   {icon:"🗑", bg:"#FFDEDE", color:"#C0001A", label:"Sol. eliminada"},
    en_cotizacion:    {icon:"💬", bg:"#F3E8FF", color:"#7C3AED", label:"Cotización"},
  };
  const [solisPend,setSolisPend]=React.useState([]);
  const [solisCompra,setSolisCompra]=React.useState([]);
  const [solisCritico,setSolisCritico]=React.useState([]);
  const [loading,setLoading]=React.useState(true);
  const [alertTab,setAlertTab]=React.useState("stock");
  const [requesting,setRequesting]=React.useState({}); // {itemId: true} mientras envía

  const [diasSinUso, setDiasSinUso] = React.useState(null);
  React.useEffect(() => {
    if (currentUser?.role !== "admin") return;
    (async () => {
      const [{data:h},{data:m}] = await Promise.all([
        sb.from("historial").select("created_at").order("created_at",{ascending:false}).limit(1),
        sb.from("movimientos").select("created_at").order("created_at",{ascending:false}).limit(1),
      ]);
      const fechas=[h?.[0]?.created_at,m?.[0]?.created_at].filter(Boolean).map(f=>new Date(f));
      if(!fechas.length) return;
      const dias=Math.floor((new Date()-new Date(Math.max(...fechas)))/(864e5));
      setDiasSinUso(dias);
    })();
  },[currentUser]);

  React.useEffect(()=>{
    const fetchData = async () => {
      setLoading(true);
      const [
        {data:pend, error:e1},
        {data:compra, error:e2},
        {data:todasActivas, error:e3},
      ] = await Promise.all([
        sb.from("solicitudes").select("*").eq("status","pendiente").order("created_at",{ascending:false}),
        sb.from("solicitudes").select("*").eq("status","solicitada_compra").order("created_at",{ascending:false}),
        sb.from("solicitudes").select("*").not("status","in","(entregada,rechazada)").order("created_at",{ascending:false}),
      ]);
      setSolisPend(e1 ? [] : (pend||[]));
      setSolisCompra(e2 ? [] : (compra||[]));
      // Filtrar críticos client-side (tipo_material aún no existe en DB)
      setSolisCritico(e3 ? [] : (todasActivas||[]).filter(s=>s.tipo_material==="apoyo_critico"));
      setLoading(false);
    };
    fetchData();
    fetchRecent();
    const handler=()=>{ fetchData(); fetchRecent(); };
    window.addEventListener("historial-updated",handler);
    return ()=>window.removeEventListener("historial-updated",handler);
  },[]);

  const totalAlertas = alerts.length + solisPend.length + solisCompra.length;

  // Auto-seleccionar tab con más urgencia si el actual está vacío
  React.useEffect(()=>{
    if(!loading){
      if(alertTab==="stock"&&alerts.length===0&&solisPend.length>0) setAlertTab("pendientes");
      else if(alertTab==="stock"&&alerts.length===0&&solisCompra.length>0) setAlertTab("compra");
    }
  },[loading]);

  const fmtSoliDate = iso => {
    if(!iso) return "";
    const d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",timeZone:"America/Bogota"});
  };

  const quickRequest = async (a) => {
    if(requesting[a.id]) return;
    const needed = Math.max(1, a.minStock - a.quantity);
    setRequesting(p=>({...p,[a.id]:true}));
    const payload = {
      item_id: a.id,
      item_name: a.name,
      item_code: a.code||"",
      quantity: needed,
      status: "solicitada_compra",
      reason: "Reposición por stock bajo",
      solicitante_id: currentUser?.id||null,
      solicitante_name: currentUser?.nombre||currentUser?.username||"Sistema",
      equipo_name: "",
    };
    const {error} = await sb.from("solicitudes").insert([payload]);
    if(error){
      flash&&flash("Error al enviar solicitud: "+error.message, false);
    } else {
      flash&&flash(`✓ Solicitado para compra — ${needed} ${a.unit||"pza"} de ${a.name}`);
      registrarHistorial("nueva_solicitud",`Solicitado para compra: ${a.name} × ${needed} ${a.unit||"pza"} — stock bajo`,currentUser?.nombre||currentUser?.username||"Sistema")
        .then(()=>reloadHistorial&&reloadHistorial());
      // Refrescar conteos de solicitudes
      const [{data:pend,error:e1},{data:compra,error:e2}] = await Promise.all([
        sb.from("solicitudes").select("*").eq("status","pendiente").order("created_at",{ascending:false}),
        sb.from("solicitudes").select("*").eq("status","solicitada_compra").order("created_at",{ascending:false}),
      ]);
      setSolisPend(e1?[]:(pend||[]));
      setSolisCompra(e2?[]:(compra||[]));
      if(window._refreshPending) window._refreshPending();
    }
    setRequesting(p=>({...p,[a.id]:false}));
  };

  const TABS = [
    {key:"stock",    label:"Stock bajo",  icon:"🟠", count:alerts.length,       color:"#7A5200", bg:"#FFF0D9", activeBg:"#E8A838"},
    {key:"pendientes",label:"Pendientes", icon:"📨", count:solisPend.length,    color:"#6B3A1F", bg:"#FAEBD7", activeBg:"#C47B50"},
    {key:"compra",   label:"Para compra", icon:"🛒", count:solisCompra.length,  color:"#1A3D6B", bg:"#E8F0FB", activeBg:"#4A7AB5"},
  ];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {currentUser?.role==="admin"&&diasSinUso!==null&&(()=>{
        const cl=diasSinUso===0?"#34C759":diasSinUso<=3?"#FF9500":diasSinUso<=6?"#FF6B00":"#FF3B30";
        const bg=diasSinUso===0?"#E8FAF0":diasSinUso<=3?"#FFF4E0":diasSinUso<=6?"#FFF0E0":"#FFF0F0";
        return(<div style={{display:"inline-flex",alignItems:"center",gap:6,background:bg,
          border:`1.5px solid ${cl}33`,borderRadius:20,padding:"5px 14px",fontSize:12,
          fontFamily:"Inter,sans-serif",fontWeight:600,color:cl,alignSelf:"flex-start",marginBottom:2}}>
          <span>{diasSinUso===0?"✅":diasSinUso<=3?"🟡":"🔴"}</span>
          <span>{diasSinUso===0?"Actividad hoy":`Sin actividad: ${diasSinUso} día${diasSinUso!==1?"s":""}`}</span>
          {diasSinUso>=5&&<span style={{fontWeight:400,opacity:.7,fontSize:11}}> · Supabase puede pausarse</span>}
        </div>);
      })()}
      {/* Stat grid */}
      <div className="stat-scroll">
        <div className="stat-card">
          <div className="stat-value" style={{color:"#0D2F5C"}}>{items.length}</div>
          <div className="stat-label">Artículos</div>
        </div>
        <div className="stat-card">
          <div className="stat-value" style={{color:"#34C759"}}>{total}</div>
          <div className="stat-label">Unidades en stock</div>
        </div>
        <div className="stat-card"
          style={{cursor:totalAlertas>0?"pointer":"default",
            background:totalAlertas>0?"linear-gradient(135deg,#fff8f0,#fff)":"",
            borderColor:totalAlertas>0?"rgba(255,149,0,0.3)":"var(--border)"}}
          onClick={()=>{if(totalAlertas>0){document.getElementById("panel-alertas-section")?.scrollIntoView({behavior:"smooth"});}}}>
          <div className="stat-value" style={{color:totalAlertas>0?"#FF3B30":"#34C759"}}>{totalAlertas}</div>
          <div className="stat-label">Alertas totales{totalAlertas>0?" ↓":""}</div>
        </div>
        <div className="stat-card" style={{cursor:"pointer"}} onClick={()=>setTab("solicitudes")}>
          <div className="stat-value" style={{color:solisPend.length>0?"#C45200":"#34C759"}}>
            {loading?"…":solisPend.length}
          </div>
          <div className="stat-label">Pendientes{solisPend.length>0?" →":""}</div>
        </div>
        <div className="stat-card" style={{cursor:"pointer"}} onClick={()=>setTab("solicitudes")}>
          <div className="stat-value" style={{color:solisCompra.length>0?"#004A9E":"#34C759"}}>
            {loading?"…":solisCompra.length}
          </div>
          <div className="stat-label">🛒 Para compra{solisCompra.length>0?" →":""}</div>
        </div>
        <div className="stat-card" style={{cursor:"pointer"}} onClick={()=>setTab("equipos")}>
          <div className="stat-value" style={{color:"#2d7dd2"}}>{equipos.length}</div>

            {/* ── Stock bajo ── */}

                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontWeight:700,fontSize:18,color:"#C45200",letterSpacing:-0.5}}>{s.quantity||s.cantidad||"?"} <span style={{fontSize:12,fontWeight:500,color:"#8E8E93"}}>{s.unidad||""}</span></div>

                  ))}
                  <div style={{padding:"12px 16px",borderTop:"0.5px solid rgba(13,47,92,0.08)"}}>

                    </button>
                  </div>

            {/* ── Solicitudes para compra ── */}
            {alertTab==="compra"&&(
              solisCompra.length===0?(
                <div style={{padding:28,textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:6}}>✅</div>
                  <div style={{color:"#34C759",fontWeight:700,fontSize:15}}>Sin solicitudes para compra</div>

                </div>
              ):(
                <>
                  {solisCompra.map(s=>(
                    <div key={s.id} className="list-row" style={{cursor:"pointer"}} onClick={()=>setTab("solicitudes")}>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:40,height:40,borderRadius:10,background:"#D9ECFF",
                          display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                          🛒
                        </div>
                        <div style={{minWidth:0}}>
                          <div style={{fontWeight:600,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:180}}>
                            {s.item_name||s.item_code||"—"}
                          </div>
                          <div style={{fontSize:12,color:"#8E8E93",marginTop:1}}>
                            {s.solicitante_name||"—"}{s.equipo_name?" · "+s.equipo_name:s.equipo?" · "+s.equipo:""}
                          </div>
                        </div>
                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontWeight:700,fontSize:18,color:"#004A9E",letterSpacing:-0.5}}>{s.quantity||s.cantidad||"?"} <span style={{fontSize:12,fontWeight:500,color:"#8E8E93"}}>{s.unidad||""}</span></div>
                        <div style={{fontSize:11,color:"#8E8E93"}}>{fmtSoliDate(s.created_at)}</div>
                      </div>
                    </div>
                  ))}
                  <div style={{padding:"12px 16px",borderTop:"0.5px solid rgba(13,47,92,0.08)"}}>
                    <button className="ios-btn ios-btn-blue" style={{width:"100%",fontSize:12,padding:"10px"}}
                      onClick={()=>setTab("solicitudes")}>
                      Ir a solicitudes para compra →
                    </button>
                  </div>
                </>
              )
            )}


          </div>
        </div>
      )}

      {/* Recent movements */}
      {(()=>{
        const esSolicitante = currentUser?.role==="solicitante";
        const [vistaMovs, setVistaMovs] = React.useState("general");
        const [misSolis, setMisSolis] = React.useState([]);
        const [loadingMisSolis, setLoadingMisSolis] = React.useState(false);

        React.useEffect(()=>{
          if(!esSolicitante||vistaMovs!=="mis_solicitudes") return;
          setLoadingMisSolis(true);
          sb.from("solicitudes").select("*")
            .eq("solicitante_id", currentUser.id)
            .order("created_at",{ascending:false})
            .limit(20)
            .then(({data})=>{ setMisSolis(data||[]); setLoadingMisSolis(false); });
        },[vistaMovs]);

        return(
        <div>
          {/* Header con toggle para solicitantes */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div className="section-hdr" style={{margin:0}}>Últimos movimientos</div>
            {esSolicitante&&(
              <div style={{
                display:"flex",background:"rgba(13,47,92,0.07)",
                borderRadius:8,padding:2,gap:0,
              }}>
                {[["general","🗂️ General"],["mis_solicitudes","📋 Mis solicitudes"]].map(([val,lbl])=>(
                  <button key={val} onClick={()=>setVistaMovs(val)} style={{
                    border:"none",cursor:"pointer",borderRadius:6,
                    padding:"5px 10px",fontSize:11,fontWeight:700,
                    fontFamily:"Montserrat,sans-serif",textTransform:"uppercase",letterSpacing:0.3,
                    background:vistaMovs===val?"#0D2F5C":"transparent",
                    color:vistaMovs===val?"#fff":"#8E8E93",
                    transition:"all 0.15s",whiteSpace:"nowrap",
                  }}>{lbl}</button>
                ))}
              </div>
            )}
          </div>

          <div className="ios-card">
            {vistaMovs==="general"?(
              recent.length===0?(
                <div style={{padding:32,textAlign:"center",color:"#8E8E93",fontSize:15}}>Sin movimientos registrados</div>
              ):recent.map(m=>{
                const meta=MOV_META[m.type]||{icon:"·",bg:"#F2F2F7",color:"#8E8E93",label:m.type||"—"};
                const isStock=["entrada","salida","devolucion"].includes(m.type);
                const isEnt=m.type==="entrada"||m.type==="devolucion";
                const prefix=isEnt?"+":"-";
                return(
                <div key={m.id} className="list-row">
                  <div style={{display:"flex",alignItems:"center",gap:12,flex:1,minWidth:0}}>
                    <div style={{width:36,height:36,borderRadius:18,background:meta.bg,
                      display:"flex",alignItems:"center",justifyContent:"center",
                      fontSize:15,flexShrink:0,color:meta.color,fontWeight:700}}>
                      {meta.icon}
                    </div>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontWeight:600,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {m.itemName||"—"}
                      </div>
                      <div style={{fontSize:11,color:"#8E8E93",marginTop:1,display:"flex",gap:5,alignItems:"center"}}>
                        <span style={{background:meta.bg,color:meta.color,borderRadius:4,padding:"1px 5px",fontWeight:700,fontSize:10}}>{meta.label}</span>
                        <span>{fmtDate(m.date)}</span>
                      </div>
                    </div>
                  </div>
                  {isStock&&m.quantity>0&&(
                    <div style={{fontWeight:700,fontSize:17,color:meta.color,letterSpacing:-0.5,flexShrink:0}}>
                      {isEnt?"+":"-"}{m.quantity}
                    </div>
                  )}
                </div>
              );})
            ):(
              loadingMisSolis?(
                <div style={{padding:32,textAlign:"center",color:"#8E8E93"}}>Cargando…</div>
              ):misSolis.length===0?(
                <div style={{padding:32,textAlign:"center",color:"#8E8E93",fontSize:15}}>
                  <div style={{fontSize:32,marginBottom:8}}>📋</div>
                  No has enviado solicitudes aún
                </div>
              ):misSolis.map(s=>{
                const estado=ESTADOS.find(e=>e.key===(s.status||"pendiente"))||ESTADOS[0];
                const tipoIcon=s.tipo_material==="locativo"?"🏢":s.tipo_material==="apoyo_critico"?"⚡":"🔧";
                return(
                <div key={s.id} className="list-row">
                  <div style={{display:"flex",alignItems:"center",gap:12,minWidth:0,flex:1}}>
                    <div style={{width:36,height:36,borderRadius:18,
                      background:estado.color+"22",
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
                      {tipoIcon}
                    </div>
                    <div style={{minWidth:0,flex:1}}>
                      <div style={{fontWeight:600,fontSize:14,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                        {s.item_name||s.item_code||"—"}
                      </div>
                      <div style={{fontSize:11,color:"#8E8E93",marginTop:2}}>
                        {fmtDate(s.created_at)}{s.equipo_name?" · "+s.equipo_name:""}
                      </div>
                    </div>
                  </div>
                  <span style={{
                    flexShrink:0,fontSize:11,fontWeight:700,padding:"3px 9px",
                    borderRadius:12,background:estado.color,color:estado.text,
                    whiteSpace:"nowrap",marginLeft:8,
                  }}>{estado.icon} {estado.label}</span>
                </div>
              );})
            )}
          </div>
        </div>
        );
      })()}

      {/* ── Requerimientos Planta ── */}

    </div>
  );
}

function Historial(){
  const [historial, setHistorial] = React.useState([]);
  const [loadingH, setLoadingH] = React.useState(true);

  const fetchH = React.useCallback(async()=>{
    setLoadingH(true);
    const {data:rm} = await sb.from("movimientos").select("*").order("created_at",{ascending:false}).limit(300);
    const rows = (rm||[]).map(r=>{
      const isStock = ["entrada","salida","devolucion"].includes(r.type);
      const prefix = (r.type==="entrada"||r.type==="devolucion")?"+":"-";
      return {
        id: r.id,
        tipo: r.type,
        descripcion: isStock
          ? `${prefix}${r.quantity} ${r.item_name||""}${r.reason?" · "+r.reason:""}`
          : (r.item_name||""),
        usuario: r.usuario||"—",
        created_at: r.created_at,
      };
    });
    setHistorial(rows);
    setLoadingH(false);
  },[]);

  React.useEffect(()=>{
    fetchH();
    const handler = ()=>fetchH();
    window.addEventListener("historial-updated", handler);
    return ()=>window.removeEventListener("historial-updated", handler);
  },[fetchH]);

  const TIPO_META = {
    entrada:          {icon:"↑",  bg:"#D1F2E0", color:"#1D7A3E", label:"Entrada stock"},
    salida:           {icon:"↓",  bg:"#FFDEDE", color:"#C0001A", label:"Salida stock"},
    devolucion:       {icon:"↩",  bg:"#FFF8DC", color:"#b07d00", label:"Devolución"},
    alta_articulo:    {icon:"＋", bg:"#D9ECFF", color:"#004A9E", label:"Alta artículo"},
    edicion_articulo: {icon:"✏️", bg:"#E8F0FB", color:"#0D2F5C", label:"Edición artículo"},
    baja_articulo:    {icon:"🗑", bg:"#FFF0D9", color:"#C45200", label:"Baja artículo"},
    alta_equipo:      {icon:"🔧", bg:"#D9ECFF", color:"#004A9E", label:"Alta equipo"},
    edicion_equipo:   {icon:"✏️", bg:"#E8F0FB", color:"#0D2F5C", label:"Edición equipo"},
    baja_equipo:      {icon:"🗑", bg:"#FFF0D9", color:"#C45200", label:"Baja equipo"},
    nueva_solicitud:  {icon:"📋", bg:"#F3E8FF", color:"#7C3AED", label:"Nueva solicitud"},
    estado_solicitud: {icon:"🔄", bg:"#EDE9FE", color:"#5B21B6", label:"Cambio estado"},
    baja_solicitud:   {icon:"🗑", bg:"#FFDEDE", color:"#C0001A", label:"Solicitud eliminada"},
    en_cotizacion:    {icon:"💬", bg:"#F3E8FF", color:"#7C3AED", label:"En cotización"},
  };
  const CATEGORIAS = [
    {key:"todos",     label:"Todos"},
    {key:"stock",     label:"Stock",      tipos:["entrada","salida","devolucion"]},
    {key:"articulos", label:"Artículos",  tipos:["alta_articulo","edicion_articulo","baja_articulo"]},
    {key:"equipos",   label:"Equipos",    tipos:["alta_equipo","edicion_equipo","baja_equipo"]},
    {key:"solicitudes",label:"Solicitudes",tipos:["nueva_solicitud","estado_solicitud","baja_solicitud","en_cotizacion"]},
  ];
  const [cat,setCat]=useState("todos");
  const [search,setSearch]=useState("");

  const filtered = historial.filter(h=>{
    const mc = cat==="todos" || CATEGORIAS.find(c=>c.key===cat)?.tipos?.includes(h.tipo);
    const ms = search===""||h.descripcion.toLowerCase().includes(search.toLowerCase())||h.usuario.toLowerCase().includes(search.toLowerCase());
    return mc&&ms;
  });

  const fmtFecha = (iso) => {
    if(!iso) return "";
    const d = new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric",timeZone:"America/Bogota"})
      +" · "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit",hour12:true,timeZone:"America/Bogota"});
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10}} className="hist-stat-grid">
        <div className="stat-card" style={{padding:"14px 16px"}}>
          <div className="stat-value" style={{fontSize:26,color:"#1C1C1E"}}>{historial.length}</div>
          <div className="stat-label">Total</div>
        </div>
        <div className="stat-card" style={{padding:"14px 16px"}}>
          <div className="stat-value" style={{fontSize:26,color:"#1D7A3E"}}>{historial.filter(h=>h.tipo==="entrada").length}</div>
          <div className="stat-label">Entradas</div>
        </div>
        <div className="stat-card" style={{padding:"14px 16px"}}>
          <div className="stat-value" style={{fontSize:26,color:"#C0001A"}}>{historial.filter(h=>h.tipo==="salida").length}</div>
          <div className="stat-label">Salidas</div>
        </div>
        <div className="stat-card" style={{padding:"14px 16px"}}>
          <div className="stat-value" style={{fontSize:26,color:"#b07d00"}}>{historial.filter(h=>h.tipo==="devolucion").length}</div>
          <div className="stat-label">Devoluciones</div>
        </div>
      </div>

      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16,color:"#8E8E93"}}>🔍</span>
        <input className="ios-input" placeholder="Buscar acción o usuario…" value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:38}}/>
      </div>

      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:2}}>
        {CATEGORIAS.map(c=>(
          <button key={c.key} onClick={()=>setCat(c.key)} style={{
            border:"none",cursor:"pointer",padding:"7px 14px",borderRadius:20,flexShrink:0,
            background:cat===c.key?"#0D2F5C":"rgba(120,120,128,0.12)",
            color:cat===c.key?"#fff":"#3C3C43",fontSize:13,fontWeight:600,transition:"all 0.2s",
          }}>{c.label}</button>
        ))}
      </div>

      <div className="ios-card">
        {filtered.length===0?(
          <div style={{padding:40,textAlign:"center",color:"#8E8E93"}}>Sin registros</div>
        ):filtered.map(h=>{
          const m = TIPO_META[h.tipo]||{icon:"•",bg:"#F2F2F7",color:"#3C3C43",label:h.tipo};
          return(
            <div key={h.id} className="list-row" style={{gap:12,alignItems:"flex-start"}}>
              <div style={{width:38,height:38,borderRadius:19,background:m.bg,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:16,flexShrink:0,marginTop:2,color:m.color,fontWeight:700}}>
                {m.icon}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{fontWeight:600,fontSize:14,color:m.color}}>{m.label}</div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2,flexShrink:0}}>
                    <div style={{fontSize:11,color:"#0D2F5C",fontWeight:700,display:"flex",alignItems:"center",gap:3}}>
                      👤 {h.usuario}
                    </div>

function AlmField({label,children}){

    </div>

}

function EquiposCombobox({ equipos, selected, onChange }){
  var [query, setQuery]   = React.useState("");
  var [open,  setOpen]    = React.useState(false);

  var filtered = React.useMemo(function(){
    var q = query.trim().toLowerCase();
    if(!q) return equipos;
    return equipos.filter(function(eq){
      var name = (eq.name||eq.model||"").toLowerCase();
      return name.includes(q);
    });
  }, [query, equipos]);

  function toggle(eq){
    var exists = selected.some(function(e){ return e.id===eq.id; });
    onChange(exists
      ? selected.filter(function(e){ return e.id!==eq.id; })
      : [...selected, {id:eq.id, name:eq.name||eq.model||""}]
    );
  }

  function removeSelected(id){
    onChange(selected.filter(function(e){ return e.id!==id; }));
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {/* Tags de seleccionados */}
      {selected.length>0&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {selected.map(function(eq){
            return(
              <div key={eq.id} style={{display:"flex",alignItems:"center",gap:4,
                background:"var(--navy)",color:"#fff",borderRadius:20,
                padding:"3px 10px",fontSize:11,fontWeight:700,
                fontFamily:"Montserrat,sans-serif"}}>
                {eq.name}
                <button type="button" onClick={function(){ removeSelected(eq.id); }}
                  style={{background:"none",border:"none",color:"rgba(255,255,255,0.7)",
                    cursor:"pointer",fontSize:13,lineHeight:1,padding:"0 0 0 2px"}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      {/* Input buscador */}
      <div style={{position:"relative"}}>
        <input className="ios-input"
          placeholder="🔍 Buscar equipo…"
          value={query}
          onChange={function(e){ setQuery(e.target.value); setOpen(true); }}
          onFocus={function(){ setOpen(true); }}
          onBlur={function(){ setTimeout(function(){ setOpen(false); }, 180); }}
        />
        {open&&filtered.length>0&&(
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:300,
            background:"#fff",border:"1.5px solid var(--border)",borderRadius:10,
            boxShadow:"0 8px 24px rgba(13,47,92,0.13)",maxHeight:200,overflowY:"auto"}}>
            {filtered.map(function(eq){
              var isSel = selected.some(function(e){ return e.id===eq.id; });
              return(
                <div key={eq.id}
                  onMouseDown={function(){ toggle(eq); setQuery(""); }}
                  style={{padding:"9px 14px",cursor:"pointer",display:"flex",
                    alignItems:"center",gap:10,fontSize:13,color:"var(--navy)",
                    background:isSel?"var(--light)":"#fff",
                    borderBottom:"0.5px solid rgba(13,47,92,0.07)"}}
                  onMouseEnter={function(e){ e.currentTarget.style.background="var(--light)"; }}
                  onMouseLeave={function(e){ e.currentTarget.style.background=isSel?"var(--light)":"#fff"; }}>
                  <span style={{fontSize:15,flexShrink:0}}>{eq.icon||"⚙️"}</span>
                  <span style={{flex:1,fontWeight:500}}>{eq.name||eq.model||"Equipo"}</span>
                  {isSel&&<span style={{color:"var(--accent)",fontWeight:700,fontSize:12}}>✓</span>}
                </div>
              );
            })}
          </div>
        )}
        {open&&filtered.length===0&&query&&(
          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:300,
            background:"#fff",border:"1.5px solid var(--border)",borderRadius:10,
            padding:"12px 14px",fontSize:13,color:"var(--gray)",fontStyle:"italic"}}>
            Sin resultados para "{query}"
          </div>
        )}
      </div>
    </div>
  );
}

function MovModal({item,onClose,onSave}){
  const [type,setType]=useState("entrada");
  const [qty,setQty]=useState(1);
  const [reason,setReason]=useState("");
  const isPositive = type==="entrada"||type==="devolucion";
  const nq = isPositive ? item.quantity+qty : Math.max(0,item.quantity-qty);
  const diff = isPositive ? qty : -qty;
  const typeColor = type==="entrada"?"#34C759":type==="devolucion"?"#b07d00":"#FF3B30";
  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-title">Registrar Movimiento</div>
        <div style={{padding:"12px 20px 20px",display:"flex",flexDirection:"column",gap:16}}>

          {/* Item info */}
          <div className="ios-card-inset">
            <div style={{fontWeight:700,fontSize:16}}>{item.name}</div>
            <div style={{display:"flex",gap:12,marginTop:4,fontSize:13,color:"#8E8E93"}}>
              <span style={{color:"#0D2F5C"}}>{item.code}</span>
              <span>Stock actual: <strong style={{color:"#1C1C1E"}}>{item.quantity} {item.unit}</strong></span>
            </div>
          </div>

          {/* Type */}
          <div className="type-toggle">
            <button className={`type-btn ${type==="entrada"?"active-in":""}`} onClick={()=>setType("entrada")}>
              <span className="type-icon">↑</span>
              <span>Entrada</span>
            </button>
            <button className={`type-btn ${type==="salida"?"active-out":""}`} onClick={()=>setType("salida")}>
              <span className="type-icon">↓</span>
              <span>Salida</span>
            </button>
            <button className={`type-btn ${type==="devolucion"?"active-dev":""}`} onClick={()=>setType("devolucion")}>
              <span className="type-icon">↩</span>
              <span>Devolución</span>
            </button>
          </div>

          {/* Devolucion hint */}
          {type==="devolucion"&&(
            <div style={{background:"#fffbe6",border:"1px solid #ffe58f",borderRadius:10,padding:"10px 14px",fontSize:12,color:"#7d5a00",display:"flex",gap:8,alignItems:"flex-start"}}>
              <span style={{fontSize:16,flexShrink:0}}>↩</span>
              <span>Artículos que regresan al almacén. El stock <strong>aumenta</strong> igual que una entrada, pero queda registrado como devolución.</span>
            </div>
          )}

          {/* Quantity */}
          <AlmField label="Cantidad">
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <button onClick={()=>setQty(q=>Math.max(1,q-1))} style={{width:44,height:44,borderRadius:22,background:"rgba(120,120,128,0.12)",border:"none",cursor:"pointer",fontSize:22,color:"#0D2F5C",fontWeight:300,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>−</button>
              <input className="ios-input" type="number" min="1" value={qty} onChange={e=>setQty(parseInt(e.target.value)||1)} style={{textAlign:"center",fontSize:20,fontWeight:700}}/>
              <button onClick={()=>setQty(q=>q+1)} style={{width:44,height:44,borderRadius:22,background:"rgba(120,120,128,0.12)",border:"none",cursor:"pointer",fontSize:22,color:"#0D2F5C",fontWeight:300,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>+</button>
            </div>
          </AlmField>

          {/* Preview */}
          <div className="qty-preview">
            <div style={{fontSize:13,color:"#8E8E93"}}>Nuevo stock</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:15,color:"#8E8E93"}}>{item.quantity}</span>
              <span style={{fontSize:13,color:typeColor,fontWeight:700}}>
                {isPositive?`+${diff}`:diff}
              </span>
              <span style={{fontSize:13,color:"#8E8E93"}}>→</span>
              <span style={{fontSize:22,fontWeight:700,color:nq===0?"#FF3B30":nq<=item.minStock?"#FF9500":"#1C1C1E"}}>{nq} <span style={{fontSize:13,fontWeight:400,color:"#8E8E93"}}>{item.unit}</span></span>
            </div>
          </div>

          <AlmField label="Motivo (opcional)">
            <input className="ios-input" placeholder={type==="devolucion"?"Ej: Sobrante de producción…":"Ej: Mantenimiento preventivo…"} value={reason} onChange={e=>setReason(e.target.value)}/>
          </AlmField>

          <div style={{display:"flex",gap:10}}>
            <button className="ios-btn ios-btn-gray" style={{flex:1,color:"#8E8E93"}} onClick={onClose}>Cancelar</button>
            <button className="ios-btn ios-btn-blue" style={{flex:2,background:type==="devolucion"?"#b07d00":undefined}} onClick={()=>onSave({type,qty,reason})}>
              {type==="entrada"?"Registrar Entrada":type==="devolucion"?"Registrar Devolución":"Registrar Salida"}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

              <button className="ios-btn ios-btn-blue" style={{flexShrink:0,padding:"10px 16px",fontSize:14}} onClick={()=>addSpare(spareSel)}>
                + Agregar
              </button>
            </div>
            {linkedSpares.length>0&&(
              <div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:8}}>
                {linkedSpares.map(sp=>{
                  const low=sp.quantity<=sp.minStock;
                  return(
                    <div key={sp.id} style={{
                      display:"inline-flex",alignItems:"center",gap:6,
                      background:low?"#FFDEDE":"#D9ECFF",color:low?"#C0001A":"#004A9E",
                      borderRadius:20,padding:"5px 10px 5px 12px",fontSize:13,fontWeight:600,
                    }}>
                      {low&&<span style={{fontSize:12}}>⚠️</span>}
                      {sp.name}
                      <span style={{fontSize:11,opacity:0.7}}>({sp.quantity}{sp.unit})</span>
                      <button onClick={()=>removeSpare(sp.id)}
                        style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"inherit",opacity:0.7,padding:"0 2px",lineHeight:1}}>✕</button>
                    </div>
                  );
                })}
              </div>
            )}
            {linkedSpares.length===0&&(
              <div style={{fontSize:13,color:"#8E8E93",marginTop:4}}>Sin repuestos asociados aún</div>
            )}
          </AlmField>

          {/* Actions */}
          <div style={{display:"flex",gap:10,marginTop:4}}>
            <button className="ios-btn ios-btn-gray" style={{flex:1,color:"#8E8E93"}} onClick={onClose}>Cancelar</button>
            <button className="ios-btn ios-btn-blue" style={{flex:2}}
              onClick={()=>{if(!f.name)return;onSave(f);}}>
              {isEdit?"Guardar cambios":"Guardar equipo"}
            </button>
          </div>
          {isEdit&&onDelete&&(
            <button className="ios-btn" style={{background:"#FFF5F5",color:"#FF3B30",width:"100%"}} onClick={onDelete}>
              Eliminar equipo
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Supabase ──────────────────────────────────────────────────────────────────
const SB_URL=window._SUPA_URL;
const SB_KEY=window._SUPA_KEY;
const SB_H={"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"};

async function btkGet(k){
  try{
    const r=await fetch(SB_URL+"/rest/v1/bitacora_kv?key=eq."+k,{headers:SB_H});
    if(!r.ok)return null;
    const d=await r.json();
    return d.length>0?d[0].value:null;
  }catch(e){return null;}
}

async function btkSet(k,v){
  try{
    await fetch(SB_URL+"/rest/v1/bitacora_kv",{
      method:"POST",
      headers:{...SB_H,"Prefer":"resolution=merge-duplicates,return=minimal"},
      body:JSON.stringify({key:k,value:v})
    });
  }catch(e){}
}

// Persiste en localStorage Y Supabase
function save(k,v){ls(k,v);btkSet(k,v);}

// ── Imprimir últimas 12h ───────────────────────────────────────────────────────
function printLast12h(entries){
  const since=new Date(Date.now()-12*60*60*1000);
  const recent=entries.filter(function(e){return new Date(e.createdAt)>=since;})
    .sort(function(a,b){return new Date(a.createdAt)-new Date(b.createdAt);});
  if(!recent.length){alert("No hay reportes de las últimas 12 horas.");return;}

  const pcol={Alta:"#C0001A",Media:"#C45200",Baja:"#1D7A3E"};
  const fD2=function(iso){return new Date(iso).toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"});};
  const fT2=function(iso){return new Date(iso).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});};

  function entryHtml(e){
    const acts=e.realizadas||[];
    const pends=e.pendientes||[];
    return `
      <div class="entry">
        <div class="entry-hdr">
          <div>
            <div class="tec">${e.tecnico}</div>
            <div class="sub">${e.turno} &nbsp;·&nbsp; ${fD2(e.fecha+"T12:00:00")}</div>
          </div>
          <div class="reg">Reg. ${fT2(e.createdAt)}</div>
        </div>
        ${acts.length?`
        <div class="sec-lbl" style="color:#1D7A3E">Actividades Realizadas</div>
        ${acts.map(function(r,i){return `
          <div class="act-row">
            <span class="act-num">${String(i+1).padStart(2,"0")}</span>
            <div class="act-body">
              <div class="act-area">${r.area}${r.hi&&r.hf?" &nbsp;<span class='act-time'>"+r.hi+" – "+r.hf+"</span>":""}</div>
              ${r.desc?`<div class="act-desc">${r.desc}</div>`:""}
            </div>
          </div>`;}).join("")}`:""}
        ${pends.length?`
        <div class="sec-lbl" style="color:#C45200;margin-top:6px">Actividades Pendientes</div>
        ${pends.map(function(p,i){return `
          <div class="act-row">
            <span class="act-num">${String(i+1).padStart(2,"0")}</span>
            <div class="act-body">
              <div class="act-area">${p.area} &nbsp;<span class="prio" style="color:${pcol[p.p]||"#333"}">[${p.p||""}]</span></div>
              ${p.desc?`<div class="act-desc">${p.desc}</div>`:""}
            </div>
          </div>`;}).join("")}`:""}
        ${e.obs?`<div class="obs"><b>Observaciones:</b> ${e.obs}</div>`:""}
      </div>`;
  }

  const html=`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
  <title>Bitácora – últimas 12h</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;font-size:11px;color:#0D2F5C;padding:16px 20px;}
    .page-hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid #0D2F5C;padding-bottom:8px;margin-bottom:12px;}
    .page-title{font-family:'Montserrat',sans-serif;font-weight:800;font-size:15px;color:#0D2F5C;}
    .page-sub{font-size:10px;color:#666;margin-top:2px;}
    .page-meta{font-size:10px;color:#666;text-align:right;}
    .entry{border:1px solid #dde4f0;border-radius:6px;padding:10px 12px;margin-bottom:8px;break-inside:avoid;}
    .entry-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .tec{font-family:'Montserrat',sans-serif;font-weight:800;font-size:12px;}
    .sub{font-size:10px;color:#666;margin-top:2px;}
    .reg{font-size:10px;color:#999;white-space:nowrap;}
    .sec-lbl{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin:4px 0 3px;}
    .act-row{display:flex;gap:6px;padding:2px 0;border-bottom:.5px solid #eef0f6;}
    .act-row:last-child{border-bottom:none;}
    .act-num{font-family:'Montserrat',sans-serif;font-weight:700;font-size:9px;color:#999;min-width:16px;padding-top:1px;}
    .act-body{flex:1;min-width:0;}
    .act-area{font-weight:600;font-size:10.5px;}
    .act-time{font-size:9.5px;color:#2d7dd2;font-weight:600;}
    .act-desc{font-size:10px;color:#444;margin-top:1px;}
    .prio{font-size:9px;font-weight:700;}
    .obs{margin-top:6px;font-size:10px;color:#555;border-top:.5px solid #eee;padding-top:5px;}
    .footer{margin-top:10px;text-align:center;font-size:9px;color:#aaa;border-top:1px solid #eee;padding-top:6px;}
    @media print{body{padding:8px 12px;}@page{margin:10mm;}}
  </style></head><body>
  <div class="page-hdr">
    <div>
      <div class="page-title">Bussié · Bitácora de Turno</div>
      <div class="page-sub">Reportes de las últimas 12 horas &nbsp;·&nbsp; ${recent.length} reporte${recent.length!==1?"s":""}</div>
    </div>
    <div class="page-meta">Impreso: ${new Date().toLocaleString("es-CO",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"})}</div>
  </div>
  ${recent.map(entryHtml).join("")}
  <div class="footer">Bussié Mantenimiento · Bitácora de Turno</div>
  <script>window.onload=function(){window.print();}<\/script>
  </body></html>`;

  const w=window.open("","_blank","width=800,height=700");
  w.document.write(html);
  w.document.close();

// ── Mini bar chart SVG ─────────────────────────────────────────────────────────
function BarChart14({data}){
  const BW=26,GAP=5,BH=80,LH=36;
  const W=data.length*(BW+GAP)+GAP;
  const TH=BH+LH;
  const maxVal=Math.max.apply(null,data.map(function(d){return d.v;}),0)||1;
  return(
    <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
      <svg width={W} height={TH} style={{display:"block"}}>
        {data.map(function(d,i){
          const bh=Math.round((d.v/maxVal)*BH);
          const x=GAP+i*(BW+GAP);
          const y=BH-bh;
          const lx=x+BW/2; const ly=BH+8;
          return(
            <g key={i}>
              <rect x={x} y={y} width={BW} height={Math.max(bh,2)} rx="3"
                fill={d.v>0?NV:"#e8f0fb"}/>
              {d.v>0&&<text x={x+BW/2} y={y-3} textAnchor="middle" fontSize="9"
                fill={NV} fontWeight="700" fontFamily="Montserrat,sans-serif">{d.v}</text>}
              <text transform={"rotate(-45,"+lx+","+ly+")"}
                x={lx} y={ly} textAnchor="end" fontSize="9" fill="#8a96a8"
                fontFamily="Inter,sans-serif">{d.l}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

// ── PassModal ─────────────────────────────────────────────────────────────────
function PassModal({onOk,onClose}){
  const [v,setV]=useState("");
  const [show,setShow]=useState(false);
  const [err,setErr]=useState(false);
  const ref=useRef();
  useEffect(function(){setTimeout(function(){if(ref.current)ref.current.focus();},100);},[]);
  function go(){
    if(v===lg(KS.p,PASS_DEF)){onOk();}
    else{setErr(true);setV("");setTimeout(function(){setErr(false);},1400);}
  }
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={function(e){e.stopPropagation();}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{width:54,height:54,borderRadius:14,margin:"0 auto 12px",background:NV,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ico d={IC.lock} sz={22} c="#fff"/>
          </div>
          <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:17,color:NV}}>Acceso Admin</div>
          <div style={{color:"#8a96a8",fontSize:13,marginTop:4}}>Ingresa la contrasena</div>
        </div>
        <div style={{position:"relative",marginBottom:10}}>
          <input ref={ref} type={show?"text":"password"} className={"inp"+(err?" inp-err":"")}
            style={{paddingRight:42}} placeholder="Contrasena" value={v}
            onChange={function(e){setV(e.target.value);}}
            onKeyDown={function(e){if(e.key==="Enter")go();}}/>
          <button onClick={function(){setShow(!show);}}
            style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#8a96a8",padding:4}}>
            <Ico d={show?IC.eyeoff:IC.eye} sz={16}/>
          </button>
        </div>
        {err&&<div style={{color:"#C0001A",fontSize:13,fontWeight:600,textAlign:"center",marginBottom:8}}>Contrasena incorrecta</div>}
        <div style={{display:"flex",gap:10}}>
          <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Cancelar</button>
          <button className="btn btn-navy" onClick={go} style={{flex:1,opacity:v.trim()?1:0.4}}>Ingresar</button>
        </div>
      </div>
    </div>
  );
}

}

// ── EqManager ─────────────────────────────────────────────────────────────────
function EqManager({title,col,icon,items,onSave,placeholder,emptyMsg}){
  const [single,setSingle]=useState("");
  const [bulk,setBulk]=useState("");
  const [msg,setMsg]=useState(null);
  const [showBulk,setShowBulk]=useState(false);

  function flash(m,ok){setMsg({m,ok:ok!==false});setTimeout(function(){setMsg(null);},2200);}

  function addOne(){
    const v=single.trim();if(!v)return;
    if(items.indexOf(v)>=0){flash("Ya existe en la lista.",false);return;}
    onSave(items.concat([v]));setSingle("");flash("Agregado.");
  }
  function removeOne(x){
    if(!confirm("Eliminar:\n"+x))return;
    onSave(items.filter(function(i){return i!==x;}));
  }
  function importBulk(){
    const lines=bulk.split("\n").map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
    if(!lines.length){flash("No hay líneas válidas.",false);return;}
    const set=new Set(items);
    const nuevos=lines.filter(function(l){return !set.has(l);});
    if(!nuevos.length){flash("Todos ya existen en la lista.",false);return;}
    onSave(items.concat(nuevos));setBulk("");
    flash("Importados "+nuevos.length+" de "+lines.length+".");
  }
  function clearAll(){
    if(!confirm("¿Borrar TODA la lista de "+title+"?\nEsto no se puede deshacer."))return;
    onSave([]);flash("Lista vaciada.");
  }

  const btnStyle={background:col+"18",color:col,border:"1.5px solid "+col+"44"};

  return(
    <SCard title={title} col={col} icon={icon}>
      {/* Toolbar */}
      <div style={{padding:"8px 14px",borderBottom:"1px solid rgba(13,47,92,0.08)",background:"#f9fafc",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <span style={{fontSize:11,color:"#8a96a8",fontFamily:"Montserrat",fontWeight:700,letterSpacing:.5}}>
          {items.length} ítem{items.length!==1?"s":""} registrado{items.length!==1?"s":""}
        </span>
        <div style={{display:"flex",gap:6}}>
          <button className="btn btn-sm" style={btnStyle}
            onClick={function(){setShowBulk(function(b){return !b;});}}>
            {showBulk?"✕ Cerrar":"⬆ Carga masiva"}
          </button>
          {items.length>0&&(
            <button className="btn btn-sm" style={{background:"#FFDEDE",color:"#C0001A",border:"1.5px solid #f5b8b8"}}

        {items.length===0

          :items.map(function(x,i){return(
            <div key={i} className="list-row">
              <span style={{fontSize:13,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x}</span>

      <div style={{padding:"10px 14px",borderTop:"1px solid rgba(13,47,92,0.08)",display:"flex",gap:8,flexWrap:"wrap"}}>

          value={single} onChange={function(e){setSingle(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter")addOne();}}/>

        <div style={{margin:"0 14px 10px",padding:"7px 12px",borderRadius:7,fontSize:12,fontWeight:700,
