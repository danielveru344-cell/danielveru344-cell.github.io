function AnalisisView(props){
  const entries=props.entries;
  const [periodo,setPeriodo]=useState("todo");
  const [periodoDesde,setPeriodoDesde]=useState("");
  const [periodoHasta,setPeriodoHasta]=useState("");
  const [trendDesde,setTrendDesde]=useState("");
  const [trendHasta,setTrendHasta]=useState("");
  const [trendCustom,setTrendCustom]=useState(false);

  function dm(a,b){if(!a||!b)return 0;const p=function(s){const x=s.split(":");return parseInt(x[0])*60+parseInt(x[1]);};const d=p(b)-p(a);return d>0?d:0;}
  function fm(m){if(!m)return"--";const h=Math.floor(m/60),mn=m%60;return h>0?h+"h"+(mn>0?" "+mn+"min":""):mn+"min";}

  // ── Paleta de colores por equipo ──────────────────────────────
  const EQ_PALETTE=[
    "#0D2F5C","#C45200","#1D7A3E","#9333EA","#C0001A","#0A5A72",
    "#B45309","#2d7dd2","#D97706","#059669","#DC2626","#0891B2",
    "#7C3AED","#CA8A04","#16A34A","#0284C7","#DB2777","#4F46E5"
  ];
  const eqColorMap=useMemo(function(){
    const map={};
    const allKeys=new Set();
    entries.forEach(function(entry){
      entry.realizadas.forEach(function(r){
        var k=r.equipo&&r.equipo.trim()?r.equipo.trim():r.area&&r.area.trim()?r.area.trim():null;
        if(k&&k!=="✏ Otra actividad...")allKeys.add(k);
      });
      (entry.pendientes||[]).forEach(function(p){
        var k=p.equipo&&p.equipo.trim()?p.equipo.trim():p.area&&p.area.trim()?p.area.trim():null;
        if(k)allKeys.add(k);
      });
    });
    Array.from(allKeys).sort().forEach(function(k,i){map[k]=EQ_PALETTE[i%EQ_PALETTE.length];});
    return map;
  },[entries]);

  function eqColor(name){return eqColorMap[name]||EQ_PALETTE[0];}

  // ── Filtro de período global ───────────────────────────────────
  const hoy=new Date();
  const filtradas=entries.filter(function(e){
    if(periodo==="custom"){
      if(periodoDesde&&e.fecha<periodoDesde)return false;
      if(periodoHasta&&e.fecha>periodoHasta)return false;
      return true;
    }
    if(periodo==="todo")return true;
    const dias=periodo==="7d"?7:periodo==="30d"?30:90;
    const corte=new Date(hoy);corte.setDate(corte.getDate()-dias);
    const corteStr=corte.toLocaleDateString("en-CA",{timeZone:"America/Bogota"});
    return e.fecha>=corteStr;
  });

  // ── Solo reportes con tipo "fallo" (para métricas) ────────────
  const filtradasFallo=filtradas.filter(function(e){return e.tipo==="fallo";});

  const eqMap={};
  filtradasFallo.forEach(function(entry){
    entry.realizadas.forEach(function(r){
      var key=r.equipo&&r.equipo.trim()?r.equipo.trim():r.area&&r.area.trim()?r.area.trim():null;
      if(!key||key==="✏ Otra actividad...")return;
      if(!eqMap[key])eqMap[key]={area:key,iv:0,min:0,pend:0,alta:0};
      eqMap[key].iv++;eqMap[key].min+=dm(r.hi,r.hf);
    });
    (entry.pendientes||[]).forEach(function(p){
      var key=p.equipo&&p.equipo.trim()?p.equipo.trim():p.area&&p.area.trim()?p.area.trim():null;
      if(!key)return;
      if(!eqMap[key])eqMap[key]={area:key,iv:0,min:0,pend:0,alta:0};
      eqMap[key].pend++;if(p.p==="Alta")eqMap[key].alta++;
    });
  });
  const eqs=Object.values(eqMap);
  const topI=eqs.slice().sort(function(a,b){return b.iv-a.iv;}).slice(0,8);
  const topT=eqs.filter(function(e){return e.min>0;}).sort(function(a,b){return b.min-a.min;}).slice(0,8);
  const topP=eqs.filter(function(e){return e.pend>0;}).sort(function(a,b){return b.pend-a.pend;}).slice(0,6);
  const mxI=topI[0]?topI[0].iv:1;
  const mxT=topT[0]?topT[0].min:1;
  const mxP=topP[0]?topP[0].pend:1;

  const PARTES=["rodamiento","cojinete","correa","banda","cadena","sello","empaque","o-ring","filtro","aceite","lubricante","sensor","encoder","valvula","fusible","relay","contactor","breaker","variador","motor","bomba","compresor"];
  const pc={};
  filtradasFallo.forEach(function(entry){
    entry.realizadas.concat(entry.pendientes||[]).forEach(function(item){
      const txt=(item.desc||"").toLowerCase();
      const area=item.area||"Sin área";
      PARTES.forEach(function(p){
        if(txt.indexOf(p)>=0){
          if(!pc[p])pc[p]={total:0,areas:{}};
          pc[p].total++;
          pc[p].areas[area]=(pc[p].areas[area]||0)+1;
        }
      });
    });
  });
  const ptop=Object.entries(pc).sort(function(a,b){return b[1].total-a[1].total;}).slice(0,16);

  const tm={};filtradasFallo.forEach(function(e){tm[e.tecnico]=(tm[e.tecnico]||0)+1;});
  const ptec=Object.entries(tm).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  const mxTec=ptec[0]?ptec[0][1]:1;

  const [expandedPart,setExpandedPart]=useState(null);
  const [eqSeleccionado,setEqSeleccionado]=useState(null);
  const trMap={};
  filtradasFallo.forEach(function(e){trMap[e.turno]=(trMap[e.turno]||0)+1;});
  const trEntries=Object.entries(trMap).sort(function(a,b){return b[1]-a[1];});
  const totTr=trEntries.reduce(function(s,x){return s+x[1];},0)||1;
  const TR_COLS=["#2d7dd2","#C45200","#6366f1","#1D7A3E","#7C3AED","#B45309"];

  const totIv=filtradasFallo.reduce(function(a,e){return a+e.realizadas.length;},0);
  const totMin=filtradasFallo.reduce(function(a,e){return a+e.realizadas.reduce(function(b,r){return b+dm(r.hi,r.hf);},0);},0);
  const totP=filtradasFallo.reduce(function(a,e){return a+e.pendientes.length;},0);
  const totA=filtradasFallo.reduce(function(a,e){return a+(e.pendientes||[]).filter(function(p){return p.p==="Alta";}).length;},0);

  // ── Trend con rango propio (custom o derivado del período global) ──
  const trendDias=periodo==="7d"?7:periodo==="30d"?14:periodo==="90d"?30:14;

  // Rango de fechas del trend
  var trendIni=null, trendFin=null;
  if(trendCustom&&trendDesde){
    trendIni=new Date(trendDesde+"T00:00:00");
    trendFin=trendHasta?new Date(trendHasta+"T23:59:59"):hoy;
  }

  // Construir días del trend
  const trend14=(function(){
    if(trendCustom&&trendIni){
      var days=[];
      var cur=new Date(trendIni);
      var fin=trendFin||hoy;
      var totalDays=Math.min(Math.round((fin-cur)/(1000*60*60*24))+1, 60);
      for(var i=0;i<totalDays;i++){
        var d2=new Date(cur);d2.setDate(cur.getDate()+i);
        var k=d2.toLocaleDateString("en-CA",{timeZone:"America/Bogota"});
        var lbl=totalDays<=7
          ?d2.toLocaleDateString("es-CO",{weekday:"short",timeZone:"America/Bogota"})
          :d2.toLocaleDateString("es-CO",{day:"2-digit",month:"short",timeZone:"America/Bogota"});
        var cnt=entries.filter(function(e){return e.fecha===k;}).reduce(function(a,e){
          if(!eqSeleccionado)return a+e.realizadas.length;
          return a+e.realizadas.filter(function(r){
            var kk=r.area&&r.area.trim()?r.area.trim():null;
            return kk===eqSeleccionado;
          }).length;
        },0);
        days.push({l:lbl,v:cnt});
      }
      return days;
    }
    var result=[];
    for(var i=trendDias-1;i>=0;i--){
      var d2=new Date(hoy);d2.setDate(d2.getDate()-i);
      var k=d2.toLocaleDateString("en-CA",{timeZone:"America/Bogota"});
      var lbl=trendDias<=7
        ?d2.toLocaleDateString("es-CO",{weekday:"short",timeZone:"America/Bogota"})
        :d2.toLocaleDateString("es-CO",{day:"2-digit",month:"short",timeZone:"America/Bogota"});
      var cnt=filtradasFallo.filter(function(e){return e.fecha===k;}).reduce(function(a,e){
        if(!eqSeleccionado)return a+e.realizadas.length;
        return a+e.realizadas.filter(function(r){
          var kk=r.area&&r.area.trim()?r.area.trim():null;
          return kk===eqSeleccionado;
        }).length;
      },0);
      result.push({l:lbl,v:cnt});
    }
    return result;
  })();

  // Predicción
  const ms14=14*24*60*60*1000;
  const cut14=new Date(hoy-ms14);const cut28=new Date(hoy-2*ms14);
  const rcnt={};const ocnt={};
  filtradasFallo.forEach(function(entry){
    const d2=new Date(entry.createdAt);
    const isR=d2>=cut14;const isO=d2>=cut28&&d2<cut14;
    entry.realizadas.forEach(function(r){
      var key=r.equipo&&r.equipo.trim()?r.equipo.trim():null;if(!key)return;
      if(isR)rcnt[key]=(rcnt[key]||0)+1;
      if(isO)ocnt[key]=(ocnt[key]||0)+1;
    });
  });
  const eqArr=Object.values(eqMap);
  const mxIvP=eqArr.reduce(function(m,e){return Math.max(m,e.iv);},1);
  const mxPendP=eqArr.reduce(function(m,e){return Math.max(m,e.pend);},1);
  const mxAltaP=eqArr.reduce(function(m,e){return Math.max(m,e.alta);},1);
  const predictions=eqArr.map(function(e){
    let score=0;const reasons=[];
    if(e.alta>0){score+=(e.alta/mxAltaP)*38;reasons.push(e.alta+" pendiente"+(e.alta>1?"s":"")+" prioridad Alta");}
    if(e.pend>0){score+=(e.pend/mxPendP)*18;if(e.alta===0)reasons.push(e.pend+" pendiente"+(e.pend>1?"s":"")+" sin resolver");}
    if(e.iv>0){score+=(e.iv/mxIvP)*18;if(e.iv>=3)reasons.push("Alta frecuencia: "+e.iv+" intervenciones");}
    const rc=rcnt[e.area]||0;const oc=ocnt[e.area]||0;
    if(rc>oc&&rc>1){score+=Math.min((rc-oc)/Math.max(oc,1)*20,22);reasons.push("Intervenciones en aumento (últ. 14 días)");}
    const avgMin=e.iv>0?e.min/e.iv:0;
    if(avgMin>90){score+=12;reasons.push("Intervenciones prolongadas (prom. "+Math.round(avgMin)+"min)");}
    else if(avgMin>45){score+=6;}
    return Object.assign({},e,{score:Math.min(Math.round(score),100),reasons:reasons.slice(0,3)});
  }).filter(function(e){return e.score>12;}).sort(function(a,b){return b.score-a.score;}).slice(0,7);

  // ── Componente barra horizontal con ejes ──────────────────────
  if(!entries.length)return(
    <div style={{textAlign:"center",color:"#8a96a8",padding:"60px 20px",border:"2px dashed rgba(13,47,92,0.12)",borderRadius:14,background:"#fff"}}>
      <div style={{marginTop:10,fontSize:14,fontWeight:500}}>Sin datos. Registra actividades para ver el analisis.</div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>

      {/* ── Selector de período ── */}
      <div style={{background:"#fff",borderRadius:12,padding:"12px 14px",border:"1px solid rgba(13,47,92,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:10,fontFamily:"Montserrat",fontWeight:700,color:"#8a96a8",textTransform:"uppercase",letterSpacing:.8,flexShrink:0}}>Período</span>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1}}>
            {[["7d","7 días"],["30d","30 días"],["90d","90 días"],["todo","Todo"],["custom","Personalizado"]].map(function(op){return(
              <button key={op[0]} onClick={function(){setPeriodo(op[0]);}}
                style={{padding:"5px 12px",borderRadius:20,border:"1.5px solid",cursor:"pointer",
                  fontFamily:"Montserrat",fontWeight:700,fontSize:11,
                  borderColor:periodo===op[0]?NV:"rgba(13,47,92,0.12)",
                  background:periodo===op[0]?NV:"#f4f7fd",
                  color:periodo===op[0]?"#fff":"#8a96a8"}}>
                {op[1]}
              </button>
            );})}
          </div>
          <span style={{fontSize:11,color:"#8a96a8",flexShrink:0}}>{filtradas.length} reporte{filtradas.length!==1?"s":""} · {filtradasFallo.length} fallo{filtradasFallo.length!==1?"s":""}</span>
        </div>
        {periodo==="custom"&&(
          <div style={{display:"flex",gap:10,marginTop:10,flexWrap:"wrap"}}>
            <div style={{flex:1,minWidth:130}}>
              <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:9,color:"#8a96a8",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Desde</div>
              <input type="date" value={periodoDesde} onChange={function(e){setPeriodoDesde(e.target.value);}}
                style={{width:"100%",border:"1.5px solid rgba(13,47,92,0.15)",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"Montserrat",color:NV,background:"#fff"}}/>
            </div>
            <div style={{flex:1,minWidth:130}}>
              <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:9,color:"#8a96a8",textTransform:"uppercase",letterSpacing:.5,marginBottom:4}}>Hasta</div>
              <input type="date" value={periodoHasta} onChange={function(e){setPeriodoHasta(e.target.value);}}
                style={{width:"100%",border:"1.5px solid rgba(13,47,92,0.15)",borderRadius:8,padding:"7px 10px",fontSize:13,fontFamily:"Montserrat",color:NV,background:"#fff"}}/>
            </div>
            {(periodoDesde||periodoHasta)&&(
              <button onClick={function(){setPeriodoDesde("");setPeriodoHasta("");}}
                style={{alignSelf:"flex-end",background:"none",border:"1px solid rgba(13,47,92,0.15)",
                  borderRadius:8,cursor:"pointer",color:"#8a96a8",fontFamily:"Montserrat",
                  fontWeight:700,fontSize:11,padding:"7px 12px",whiteSpace:"nowrap"}}>
                Limpiar
              </button>
            )}
          </div>

            <BarHorizontal

                <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:10,

      {/* ── MTBF / MTTR ── */}
      {(function(){
        const falloEntries=filtradasFallo;
        const fallosByEq={};
        falloEntries.forEach(function(entry){
          var eqKeys=new Set();
          entry.realizadas.forEach(function(r){
            var k=r.area&&r.area.trim()?r.area.trim():null;
            if(k&&k!=="✏ Otra actividad...")eqKeys.add(k);
          });
          eqKeys.forEach(function(k){
            if(!fallosByEq[k])fallosByEq[k]={fallos:[],repairMins:[]};
            fallosByEq[k].fallos.push(new Date(entry.fecha+"T12:00:00"));
            // MTTR: solo minutos de actividades de ESTE equipo en el reporte
            var mins=entry.realizadas
              .filter(function(r){return r.area&&r.area.trim()===k;})
              .reduce(function(s,r){return s+dm(r.hi,r.hf);},0);
            if(mins>0)fallosByEq[k].repairMins.push(mins);
          });
        });

        const metricas=Object.entries(fallosByEq).map(function(kv){
          const name=kv[0];const d=kv[1];
          const col=eqColor(name);
          const fallos=d.fallos.slice().sort(function(a,b){return a-b;});
          var mtbfH=null;
          if(fallos.length>=2){
            var gaps=[];
            for(var i=1;i<fallos.length;i++) gaps.push((fallos[i]-fallos[i-1])/(1000*60*60));
            mtbfH=gaps.reduce(function(s,g){return s+g;},0)/gaps.length;
          } else if(fallos.length===1){
            var hoyNoon=new Date(todayS()+"T12:00:00");
            mtbfH=(hoyNoon-fallos[0])/(1000*60*60);
          }
          var mttrMin=d.repairMins.length>0?d.repairMins.reduce(function(s,m){return s+m;},0)/d.repairMins.length:null;
          var disp=(mtbfH!==null&&mttrMin!==null)?Math.round((mtbfH/(mtbfH+mttrMin/60))*1000)/10:null;
          return {name,col,nFallos:fallos.length,mtbfH,mttrMin,disp};
        }).sort(function(a,b){return b.nFallos-a.nFallos;});

        function fmH(h){
          if(h===null)return"--";
          if(h<24)return Math.round(h)+"h";
          return Math.floor(h/24)+"d"+(Math.round(h%24)>0?" "+Math.round(h%24)+"h":"");
        }
        function fmMin(m){
          if(m===null)return"--";
          if(m<60)return Math.round(m)+"min";
          return Math.floor(m/60)+"h"+(Math.round(m%60)>0?" "+Math.round(m%60)+"min":"");
        }

        if(falloEntries.length===0) return(
          <AnalCard title="MTBF / MTTR / Disponibilidad" icon={IC.clk} col="#6366f1">
            <div style={{textAlign:"center",padding:"16px 0",color:"#8a96a8",fontSize:13}}>
              Sin reportes tipo <strong>🔴 Fallo</strong> en este período.
              <div style={{fontSize:11,color:"#b0bac8",marginTop:4}}>Marca reportes como Fallo al crearlos para ver estos indicadores.</div>
            </div>
          </AnalCard>
        );

        // Si hay equipo seleccionado, filtrar métricas a ese equipo
        const metricasFiltradas=eqSeleccionado
          ?metricas.filter(function(m){return m.name===eqSeleccionado;})
          :metricas;

        const mtbfData=metricasFiltradas.filter(function(m){return m.mtbfH!==null;})
          .sort(function(a,b){return b.mtbfH-a.mtbfH;})
          .map(function(m){return{lbl:m.name,val:Math.round(m.mtbfH),display:fmH(m.mtbfH),unit:"",color:m.col};});

        const mttrData=metricasFiltradas.filter(function(m){return m.mttrMin!==null;})
          .sort(function(a,b){return a.mttrMin-b.mttrMin;})
          .map(function(m){return{lbl:m.name,val:Math.round(m.mttrMin),display:fmMin(m.mttrMin),unit:"",color:m.col};});

        const dispData=metricasFiltradas.filter(function(m){return m.disp!==null;})
          .sort(function(a,b){return b.disp-a.disp;})
          .map(function(m){
            var col=m.disp>=95?"#1D7A3E":m.disp>=80?"#C45200":"#C0001A";
            return{lbl:m.name,val:m.disp,display:m.disp+"%",unit:"",color:col};
          });

        // KPIs: si hay equipo seleccionado mostrar ese, si no el global
        var kpiMtbf, kpiMttr, kpiLblMtbf, kpiLblMttr, kpiSub;
        if(eqSeleccionado&&metricasFiltradas.length>0){
          var mEq=metricasFiltradas[0];
          kpiMtbf=fmH(mEq.mtbfH);
          kpiMttr=fmMin(mEq.mttrMin);
          kpiLblMtbf="MTBF · "+eqSeleccionado.slice(0,16);
          kpiLblMttr="MTTR · "+eqSeleccionado.slice(0,16);
          kpiSub=mEq.nFallos+" fallo"+(mEq.nFallos!==1?"s":"")+" registrados";
        } else {
          var allMtbf=metricas.filter(function(m){return m.mtbfH!==null;}).map(function(m){return m.mtbfH;});
          var allMttr=metricas.filter(function(m){return m.mttrMin!==null;}).map(function(m){return m.mttrMin;});
          kpiMtbf=fmH(allMtbf.length>0?allMtbf.reduce(function(s,v){return s+v;},0)/allMtbf.length:null);
          kpiMttr=fmMin(allMttr.length>0?allMttr.reduce(function(s,v){return s+v;},0)/allMttr.length:null);
          kpiLblMtbf="MTBF Global";
          kpiLblMttr="MTTR Global";
          kpiSub=falloEntries.length+" reporte"+(falloEntries.length!==1?"s":"")+" tipo Fallo";
        }

        return(<>
          <AnalCard title={"Confiabilidad"+(eqSeleccionado?" · "+eqSeleccionado:" — Resumen")} icon={IC.clk} col="#6366f1">
            {!eqSeleccionado&&(
              <div style={{background:"rgba(99,102,241,0.06)",borderRadius:10,padding:"10px 12px",marginBottom:14}}>
                <div style={{fontSize:11,color:"#4338ca",fontWeight:700,fontFamily:"Montserrat",marginBottom:4}}>¿Qué miden?</div>
                <div style={{fontSize:11,color:"#555",lineHeight:1.6}}>
                  <b>MTBF</b> — tiempo promedio entre fallos. Mayor = más confiable.<br/>
                  <b>MTTR</b> — tiempo promedio de reparación. Menor = más ágil.<br/>
                  <b>Disponibilidad</b> = MTBF ÷ (MTBF + MTTR). Más cerca de 100% = mejor.
                </div>
              </div>
            )}
            {eqSeleccionado&&metricasFiltradas.length===0&&(
              <div style={{fontSize:12,color:"#8a96a8",textAlign:"center",padding:"8px 0 4px"}}>
                Sin reportes tipo Fallo para <b>{eqSeleccionado}</b> en este período.
              </div>
            )}
            <div style={{fontSize:10,color:"#8a96a8",marginBottom:10}}>{kpiSub}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[
                {lbl:kpiLblMtbf,val:kpiMtbf,col:"#6366f1",sub:"entre fallos"},
                {lbl:kpiLblMttr,val:kpiMttr,col:"#0A5A72",sub:"por reparación"},
                {lbl:"Equipos",val:eqSeleccionado?(metricasFiltradas.length>0?"1 sel.":"--"):metricas.length,col:NV,sub:eqSeleccionado?"seleccionado":"analizados"},
              ].map(function(k){return(
                <div key={k.lbl} style={{background:k.col+"11",borderRadius:10,padding:"10px 10px",border:"1px solid "+k.col+"33",textAlign:"center"}}>
                  <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:20,color:k.col,lineHeight:1}}>{k.val}</div>
                  <div style={{fontSize:9,color:k.col,fontFamily:"Montserrat",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginTop:3,wordBreak:"break-word"}}>{k.lbl}</div>
                  <div style={{fontSize:9,color:"#b0bac8",marginTop:1}}>{k.sub}</div>
                </div>
              );})}
            </div>
          </AnalCard>

          <div className="a2">
            <AnalCard title="MTBF por equipo" icon={IC.clk} col="#6366f1">
              <div style={{fontSize:11,color:"#8a96a8",marginBottom:10}}>
                Tiempo promedio entre fallos consecutivos. <b style={{color:"#6366f1"}}>Mayor = más confiable.</b>
              </div>
              {mtbfData.length===0
                ?<span style={{color:"#b0bac8",fontSize:13}}>{eqSeleccionado?"Sin datos de MTBF para este equipo.":"Registra al menos 2 fallos por equipo para calcular."}</span>
                :<BarHorizontal data={mtbfData} unitY="Tiempo entre fallos"/>
              }
            </AnalCard>

            <AnalCard title="MTTR por equipo" icon={IC.wrench} col="#0A5A72">
              <div style={{fontSize:11,color:"#8a96a8",marginBottom:10}}>
                Tiempo promedio de reparación por fallo. <b style={{color:"#0A5A72"}}>Menor = más ágil.</b>
              </div>
              {mttrData.length===0
                ?<span style={{color:"#b0bac8",fontSize:13}}>{eqSeleccionado?"Sin datos de MTTR para este equipo.":"Registra horas inicio/fin en los reportes de fallo."}</span>
                :<BarHorizontal data={mttrData} unitY="Tiempo de reparación"/>
              }
            </AnalCard>
          </div>

          {/* Disponibilidad */}
          {dispData.length>0&&(
            <AnalCard title="Disponibilidad estimada por equipo" icon={IC.bar} col="#1D7A3E">
              <div style={{fontSize:11,color:"#8a96a8",marginBottom:10}}>
                Disponibilidad = MTBF ÷ (MTBF + MTTR). <b style={{color:"#1D7A3E"}}>≥95% Alta · ≥80% Media · &lt;80% Baja.</b>
              </div>
              <BarHorizontal data={dispData} unitY="Disponibilidad %" maxVal={100}/>
              {/* Línea de referencia 95% */}
              <div style={{display:"flex",gap:12,marginTop:8,flexWrap:"wrap"}}>
                {[["#1D7A3E","≥95% Alta"],["#C45200","≥80% Media"],["#C0001A","<80% Baja"]].map(function(x){return(
                  <div key={x[0]} style={{display:"flex",alignItems:"center",gap:5}}>
                    <div style={{width:10,height:10,borderRadius:2,background:x[0]}}/>
                    <span style={{fontSize:10,color:"#8a96a8",fontFamily:"Montserrat",fontWeight:600}}>{x[1]}</span>
                  </div>
                );})}
              </div>
            </AnalCard>
          )}
        </>);
      })()}
      {topP.length>0&&(
        <AnalCard id="ac-pend" title="Pendientes por equipo" icon={IC.alert} col="#C45200">
          <BarHorizontal
            data={topP.map(function(e){return{lbl:e.area,val:e.pend,unit:"pend.",
              display:e.alta>0?e.pend+" ("+e.alta+"↑)":String(e.pend),color:eqColor(e.area)}})}
            unitY="No. pendientes" maxVal={mxP}/>
          <div style={{fontSize:10,color:"#b0bac8",marginTop:6,fontStyle:"italic"}}>
            (N↑) = pendientes de prioridad Alta
          </div>
        </AnalCard>
      )}

      {/* Predicción */}
      <AnalCard title="Predicción de próximos fallos" icon={IC.alert} col="#C0001A">
        {predictions.length===0
          ?<div style={{color:"#8a96a8",fontSize:13,textAlign:"center",padding:"8px 0"}}>
            Sin suficientes datos para predecir. Registra más reportes con pendientes y actividades.
           </div>
          :<div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:11,color:"#8a96a8",marginBottom:2}}>
              Eje: Puntaje de riesgo 0–100% · Mayor puntaje = mayor probabilidad de intervención próxima.
            </div>
            {predictions.map(function(e,idx){
              const nivel=e.score>=65?"Alto":e.score>=35?"Medio":"Bajo";
              const col=e.score>=65?"#C0001A":e.score>=35?"#C45200":"#1D7A3E";
              const bg=e.score>=65?"#FFDEDE":e.score>=35?"#FFF0D9":"#D1F2E0";
              return(
                <div key={e.area} style={{border:"1px solid "+col+"33",borderRadius:12,overflow:"hidden"}}>
                  <div style={{padding:"10px 14px",background:bg,display:"flex",alignItems:"flex-start",gap:10}}>
                    <div style={{width:28,height:28,borderRadius:8,background:col,display:"flex",
                      alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                      <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:13}}>{idx+1}</span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:13,color:NV,lineHeight:1.3,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:5}}>
                        {e.area}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{flex:1,height:7,background:"rgba(0,0,0,0.08)",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:e.score+"%",background:col,borderRadius:4,transition:"width .6s"}}/>
                        </div>
                        <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:11,color:col,flexShrink:0,minWidth:64}}>
                          {nivel} · {e.score}%
                        </span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        {e.reasons.map(function(r,ri){return(
                          <div key={ri} style={{display:"flex",alignItems:"flex-start",gap:5}}>
                            <span style={{color:col,fontSize:11,flexShrink:0,marginTop:1}}>▸</span>
                            <span style={{fontSize:11,color:"#555",lineHeight:1.4}}>{r}</span>
                          </div>
                        );})}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:10,color:"#b0bac8",textAlign:"center",marginTop:4,fontStyle:"italic"}}>
              Orientativo. Úsala como apoyo, no como diagnóstico definitivo.
            </div>
          </div>
        }
      </AnalCard>

      {/* Pendientes */}
      {/* Partes */}
      <AnalCard title="Partes y repuestos detectados" icon={IC.tag} col="#1D7A3E">
        {ptop.length===0
          ?<span style={{color:"#8a96a8",fontSize:13}}>No se detectaron palabras clave aun.</span>
          :<div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{fontSize:11,color:"#8a96a8",marginBottom:6}}>
              Toca un repuesto para ver en qué equipos se usó.
            </div>
            {ptop.map(function(kv){
              const nombre=kv[0];const datos=kv[1];
              const isOpen=expandedPart===nombre;
              const areasSorted=Object.entries(datos.areas).sort(function(a,b){return b[1]-a[1];});
              return(
                <div key={nombre} style={{border:"1px solid rgba(13,47,92,0.10)",borderRadius:10,overflow:"hidden"}}>
                  <div onClick={function(){setExpandedPart(isOpen?null:nombre);}}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"10px 14px",cursor:"pointer",background:isOpen?"#f0faf4":"#fff"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:13,color:NV,textTransform:"capitalize"}}>{nombre}</span>
                      <span style={{background:"#D1F2E0",color:"#1D7A3E",borderRadius:8,padding:"2px 9px",fontSize:11,fontWeight:800,fontFamily:"Montserrat"}}>{datos.total}x</span>
                      <span style={{fontSize:11,color:"#8a96a8",fontFamily:"Montserrat",fontWeight:600}}>{areasSorted.length} equipo{areasSorted.length!==1?"s":""}</span>
                    </div>
                    <div style={{color:"#8a96a8",transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none",display:"flex"}}>
                      <Ico d={IC.chev} sz={14} c="#8a96a8"/>
                    </div>
                  </div>
                  {isOpen&&(
                    <div style={{borderTop:"1px solid rgba(13,47,92,0.08)",background:"#f9fafb",padding:"8px 14px 10px",display:"flex",flexDirection:"column",gap:6}}>
                      {areasSorted.map(function(av){
                        const pct=Math.round(av[1]/datos.total*100);
                        return(
                          <div key={av[0]} style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:11,color:"#555",flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={av[0]}>{av[0]}</span>
                            <div style={{width:60,height:6,background:"#e8f0fb",borderRadius:3,flexShrink:0}}>
                              <div style={{height:"100%",width:pct+"%",background:"#1D7A3E",borderRadius:3}}/>
                            </div>
                            <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:11,color:"#1D7A3E",minWidth:24,textAlign:"right",flexShrink:0}}>{av[1]}x</span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        }
      </AnalCard>

      {/* Técnicos — análisis detallado */}
      <TecnicosCard entries={entries} eqColorFn={eqColor} fmFn={fm} dmFn={dm}/>

      {/* Tabla resumen */}
      <AnalCard id="ac-resumen" title="Resumen por equipo" icon={IC.list} col="#8a96a8">
        <div style={{overflowX:"auto"}}>
          <table className="atbl">
            <thead><tr>
              {[["Equipo",""],["Interv.","nº"],["Tiempo","h:min"],["Pendientes","nº"],["Pend. Alta","nº"]].map(function(h){return(
                <th key={h[0]}>
                  {h[0]}
                  {h[1]&&<span style={{display:"block",fontSize:9,color:"#b0bac8",fontWeight:500,textTransform:"lowercase"}}>{h[1]}</span>}
                </th>
              );})}
            </tr></thead>
            <tbody>
              {eqs.slice().sort(function(a,b){return b.iv-a.iv;}).map(function(e){return(
                <tr key={e.area}>
                  <td style={{fontWeight:700,color:NV,fontFamily:"Montserrat"}}>{e.area}</td>
                  <td style={{fontFamily:"Montserrat",color:NV,fontWeight:800}}>{e.iv}</td>
                  <td style={{fontFamily:"Montserrat",color:"#2d7dd2",fontSize:12,fontWeight:700}}>{e.min>0?fm(e.min):"--"}</td>
                  <td style={{fontFamily:"Montserrat",color:e.pend>0?"#C45200":"#8a96a8",fontWeight:e.pend>0?700:400}}>{e.pend||"--"}</td>
                  <td>{e.alta>0?<span style={{background:"#FFDEDE",color:"#C0001A",padding:"2px 7px",borderRadius:10,fontSize:11,fontWeight:800,fontFamily:"Montserrat"}}>{e.alta}</span>:<span style={{color:"#8a96a8"}}>--</span>}</td>
                </tr>
              );})}
            </tbody>
          </table>
        </div>
      </AnalCard>


    </div>
  );
}
// ── App ───────────────────────────────────────────────────────────────────────
function BitacoraApp({onBack, initialUser}){
  const [entries,setEntries]=useState([]);
  const [eqs,setEqs]=useState(AREAS_DEF);
  const [tecs,setTecs]=useState([]);
  const [metEqs,setMetEqs]=useState([]);
  const [locEqs,setLocEqs]=useState(AREAS_LOC);
  const [turnos,setTurnos]=useState(TURNOS_DEF);
  const [tab,setTab]=useState("home");
  const [filtroInicial,setFiltroInicial]=useState(null);
  const [detail,setDetail]=useState(null);
  const [showPass,setShowPass]=useState(false);
  const [adminOk,setAdminOk]=useState(false);
  const [loading,setLoading]=useState(true);
  const [sync,setSync]=useState(null);
  const [confToast,setConfToast]=useState(null);
  const [sessionEntries,setSessionEntries]=useState([]); // solo en memoria, se borra al salir del tab

  // Limpiar sesión al salir del tab "nuevo"
  const prevTab=React.useRef("home");
  useEffect(function(){
    if(prevTab.current==="nuevo"&&tab!=="nuevo") setSessionEntries([]);
    prevTab.current=tab;
  },[tab]);

  useEffect(function(){
    async function init(){
      const safetyTimer = setTimeout(()=>setLoading(false), 6000);
      try{
        const [eVal,tVal,eqVal,pVal,metVal,locVal,turVal]=await Promise.all([
          btkGet(KS.e),btkGet(KS.tec),btkGet(KS.eq),btkGet(KS.p),btkGet(KS.met),btkGet(KS.loc),btkGet(KS.tur)
        ]);
        if(eVal!==null) setEntries(eVal);
        else setEntries(lg(KS.e,[]));
        if(tVal!==null){
          const raw=tVal;
          if(raw.length>0&&typeof raw[0]==="string") setTecs([]);
          else setTecs(raw);
        } else {
          const raw=lg(KS.tec,[]);
          if(raw.length>0&&typeof raw[0]==="string") setTecs([]);
          else setTecs(raw);
        }
        if(eqVal!==null) setEqs(eqVal.length>0?eqVal:AREAS_DEF);
        else setEqs(lg(KS.eq,AREAS_DEF));
        if(metVal!==null) setMetEqs(metVal);
        else setMetEqs(lg(KS.met,[]));
        if(locVal!==null&&locVal.length>0) setLocEqs(locVal);
        else setLocEqs(lg(KS.loc,AREAS_LOC));
        if(turVal!==null&&turVal.length>0) setTurnos(turVal);
        else setTurnos(lg(KS.tur,TURNOS_DEF));
        if(pVal!==null) ls(KS.p,pVal);
        setSync("ok");
      }catch(ex){
        console.warn("Supabase init error",ex);
        setEntries(lg(KS.e,[]));
        const raw=lg(KS.tec,[]);
        setTecs(raw.length>0&&typeof raw[0]==="string"?[]:raw);
        setEqs(lg(KS.eq,AREAS_DEF));
        setMetEqs(lg(KS.met,[]));
        setLocEqs(lg(KS.loc,AREAS_LOC));
        setTurnos(lg(KS.tur,TURNOS_DEF));
        setSync("err");
      }finally{
        clearTimeout(safetyTimer);
        setLoading(false);
        setTimeout(function(){setSync(null);},2500);
      }
    }
    init();
  },[]);

  const tapN=useRef(0); const tapTm=useRef(null);
  function logoTap(){
    tapN.current++;clearTimeout(tapTm.current);
    tapTm.current=setTimeout(function(){tapN.current=0;},3000);
    if(tapN.current>=5){tapN.current=0;clearTimeout(tapTm.current);
      if(adminOk)setTab("admin");else setShowPass(true);}
  }

  async function doSave(entry){
    // Fetch latest from Supabase first to avoid overwriting other users' reports
    let remoto=null;
    try{ remoto=await btkGet(KS.e); }catch(ex){}
    setEntries(function(p){
      // Merge: start from remote (authoritative), add any local entries not in remote, then prepend new entry
      const base=Array.isArray(remoto)&&remoto.length>0?remoto:p;
      // Include local entries that might not be in remote yet (created in this session before sync)
      const localIds=new Set(base.map(function(e){return e.id;}));
      const localOnly=p.filter(function(e){return !localIds.has(e.id);});
      const merged=[entry].concat(localOnly).concat(base);
      save(KS.e,merged);
      return merged;
    });
    setSessionEntries(function(p){return [entry].concat(p);});
    // NO cambiar de tab — quedarse en "nuevo" con form reseteado
  }

  async function reloadEntries(){
    try{
      const remoto=await btkGet(KS.e);
      if(Array.isArray(remoto)&&remoto.length>0){
        setEntries(function(local){
          const remoteIds=new Set(remoto.map(function(e){return e.id;}));
          const localOnly=local.filter(function(e){return !remoteIds.has(e.id);}); 
          const merged=localOnly.concat(remoto);
          ls(KS.e,merged);
          return merged;
        });
      }
    }catch(ex){console.warn("reloadEntries error",ex);}
  }

  useEffect(function(){
    var id=setInterval(reloadEntries,60000);
    return function(){clearInterval(id);};
  },[]);

  function confirmarLectura(entryId){
    if(!initialUser) return;
    const ahora = new Date();
    setEntries(function(prev){
      const n=prev.map(function(e){
        if(e.id!==entryId) return e;
        const conf=e.confirmaciones||[];
        if(conf.some(function(c){return c.username===initialUser.username;})) return e;
        const nueva={
          username: initialUser.username,
          nombre:   initialUser.nombre||initialUser.username,
          fecha:    ahora.toISOString()
        };
        return Object.assign({},e,{confirmaciones:conf.concat([nueva])});
      });
      save(KS.e,n);
      return n;
    });
    // Mostrar toast
    setConfToast({
      nombre: initialUser.nombre||initialUser.username,
      fecha:  ahora.toLocaleString("es-CO",{timeZone:"America/Bogota",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})
    });
    setTimeout(function(){setConfToast(null);}, 4000);
  }
  function doDel(id){
    setEntries(function(p){
      const n=p.filter(function(e){return e.id!==id;});
      save(KS.e,n);
      return n;
    });
    setDetail(null);
  }

  function agregarSeguimiento(entryId, pendId, seguimiento){
    setEntries(function(prev){
      const n=prev.map(function(e){
        if(e.id!==entryId) return e;
        const newPends=(e.pendientes||[]).map(function(p){
          if(p.id!==pendId) return p;
          return Object.assign({},p,{seguimientos:(p.seguimientos||[]).concat([seguimiento])});
        });
        return Object.assign({},e,{pendientes:newPends,updatedAt:seguimiento.ts});
      });
      save(KS.e,n);
      return n;
    });
  }

  function cerrarPendiente(entryId, pendId, seguimientoCierre){
    setEntries(function(prev){
      const n=prev.map(function(e){
        if(e.id!==entryId) return e;
        const newPends=(e.pendientes||[]).map(function(p){
          if(p.id!==pendId) return p;
          return Object.assign({},p,{
            seguimientos:(p.seguimientos||[]).concat([seguimientoCierre]),
            cerrado:true,
            fechaCierre:seguimientoCierre.ts
          });
        });
        return Object.assign({},e,{pendientes:newPends,updatedAt:seguimientoCierre.ts});
      });
      save(KS.e,n);
      return n;
    });
  }

  function agregarComentario(entryId, comentario){
    setEntries(function(prev){
      const n=prev.map(function(e){
        if(e.id!==entryId) return e;
        const coms=(e.comentarios||[]).concat([comentario]);
        return Object.assign({},e,{comentarios:coms,updatedAt:comentario.ts});
      });
      save(KS.e,n);
      return n;
    });
  }

  // ── Reacciones: toggle emoji en reporte o en comentario ─────────────────────
  function toggleReaccionEntry(entryId, emoji){
    if(!initialUser) return;
    const uname=initialUser.username;
    setEntries(function(prev){
      const n=prev.map(function(e){
        if(e.id!==entryId) return e;
        var reacs=Object.assign({},e.reacciones||{});
        var lista=reacs[emoji]?reacs[emoji].slice():[];
        var idx=lista.indexOf(uname);
        if(idx>=0) lista.splice(idx,1); else lista.push(uname);
        reacs[emoji]=lista;
        return Object.assign({},e,{reacciones:reacs});
      });
      save(KS.e,n);
      return n;
    });
  }

  function toggleReaccionComment(entryId, comId, emoji){
    if(!initialUser) return;
    const uname=initialUser.username;
    setEntries(function(prev){
      const n=prev.map(function(e){
        if(e.id!==entryId) return e;
        var coms=(e.comentarios||[]).map(function(c){
          if(c.id!==comId) return c;
          var reacs=Object.assign({},c.reacciones||{});
          var lista=reacs[emoji]?reacs[emoji].slice():[];
          var idx=lista.indexOf(uname);
          if(idx>=0) lista.splice(idx,1); else lista.push(uname);
          reacs[emoji]=lista;
          return Object.assign({},c,{reacciones:reacs});
        });
        return Object.assign({},e,{comentarios:coms});
      });
      save(KS.e,n);
      return n;
    });
  }

  const totP=entries.reduce(function(a,e){return a+(e.pendientes||[]).filter(function(p){return !p.cerrado;}).length;},0);
  const altaP=entries.reduce(function(a,e){return a+(e.pendientes||[]).filter(function(p){return !p.cerrado&&p.p==="Alta";}).length;},0);

  const TABS=[
    {id:"home",lbl:"Inicio",ic:IC.home},
    {id:"reportes",lbl:"Reportes",ic:IC.docs},
    {id:"analisis",lbl:"Analisis",ic:IC.bar},
    {id:"nuevo",lbl:"Nuevo",ic:IC.plus},
  ];

  return(
    <div className="btk-app" style={{minHeight:"100vh",background:"#f4f7fd"}}>

      {/* Loading inicial */}
      {loading&&(
        <div style={{position:"fixed",inset:0,background:"#f4f7fd",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <img src={LOGO} alt="B" style={{height:54,borderRadius:10,objectFit:"contain"}} onError={function(e){e.target.style.display="none";}}/>
          <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:15,color:NV,letterSpacing:1}}>Cargando…</div>
          <div style={{width:36,height:36,border:"3px solid rgba(13,47,92,0.15)",borderTop:"3px solid #0D2F5C",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
        </div>
      )}

      {/* Indicador de sync Supabase */}
      {sync&&(
        <div style={{position:"fixed",bottom:74,right:14,zIndex:300,background:sync==="ok"?"#1D7A3E":"#C0001A",color:"#fff",borderRadius:8,padding:"6px 12px",fontSize:11,fontFamily:"Montserrat",fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,0.18)",display:"flex",alignItems:"center",gap:6}}>
          {sync==="ok"?"✓ Sincronizado con Supabase":"⚠ Sin conexión — modo local"}
        </div>
      )}

      {showPass&&<PassModal onOk={function(){setShowPass(false);setAdminOk(true);setTab("admin");}} onClose={function(){setShowPass(false);}}/>}

      <header className="brand-bar">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {onBack&&<button onClick={onBack} className="btk-back" style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",padding:"6px 10px",display:"flex",alignItems:"center",gap:5,fontFamily:"Montserrat",fontWeight:700,fontSize:11,marginRight:4}}>← Suite</button>}
          <img src={LOGO} alt="B" onClick={logoTap}
            style={{height:36,borderRadius:7,objectFit:"contain",cursor:"pointer",userSelect:"none"}}
            onError={function(e){e.target.style.display="none";}}/>
          <div>
            <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:14,color:"#fff",letterSpacing:0.3}}>Bitacora de Turno</div>
            <div style={{fontFamily:"Montserrat",fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginTop:1}}>Bussie - Mantenimiento</div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center"}}>
          <button onClick={reloadEntries}
            title="Actualizar reportes"
            style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,color:"#fff",cursor:"pointer",padding:"5px 10px",display:"flex",alignItems:"center",gap:4,fontFamily:"Montserrat",fontSize:11,fontWeight:700}}>
            <Ico d={IC.reset} sz={13} c="#fff"/>
          </button>
          {adminOk&&tab!=="admin"&&(
            <button onClick={function(){setTab("admin");}}
              style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,color:"#fff",cursor:"pointer",padding:"5px 12px",display:"flex",alignItems:"center",gap:5,fontFamily:"Montserrat",fontSize:11,fontWeight:700}}>
              <Ico d={IC.cog} sz={13} c="#fff"/>Admin
            </button>
          )}
        </div>
      </header>

      <main style={{maxWidth:860,margin:"0 auto",padding:"20px 14px 82px"}}>
        {detail?(
          <EntryDetail entry={entries.find(function(e){return e.id===detail.id;})||detail} onBack={function(){setDetail(null);}} onDel={doDel}/>
        ):tab==="home"?(
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <div className="stat-grid">
              {[{lbl:"Reportes",val:entries.length,col:NV,ic:IC.docs,accion:function(){setFiltroInicial(null);setTab("reportes");}},
                {lbl:"Pendientes",val:totP,col:"#C45200",ic:IC.alert,accion:function(){setFiltroInicial("pendientes");setTab("reportes");}},
                {lbl:"Prio. Alta",val:altaP,col:"#C0001A",ic:IC.alert,accion:function(){setTab("analisis");}}].map(function(s){return(
                <div key={s.lbl} className="stat-card" onClick={s.accion}
                  style={{cursor:"pointer",transition:"transform .12s,box-shadow .12s"}}
                  onMouseEnter={function(e){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(13,47,92,0.13)";}}
                  onMouseLeave={function(e){e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
                  <Ico d={s.ic} sz={18} c={s.col}/>
                  <div className="stat-val" style={{color:s.col,marginTop:8}}>{pad(s.val)}</div>
                  <div className="stat-lbl">{s.lbl}</div>
                  <div style={{fontSize:9,color:"#b0bac8",marginTop:4,fontFamily:"Montserrat",fontWeight:600,letterSpacing:.3}}>
                    {s.lbl==="Prio. Alta"?"VER ANÁLISIS →":"VER REPORTES →"}
                  </div>
                </div>
              );})}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className="stitle">Ultimos reportes</div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {entries.length>0&&(
                  <button onClick={function(){printLast12h(entries);}}
                    style={{background:"none",border:"1.5px solid rgba(13,47,92,0.18)",borderRadius:8,color:NV,cursor:"pointer",fontSize:11,fontFamily:"Montserrat",fontWeight:700,padding:"5px 11px",display:"flex",alignItems:"center",gap:5}}>
                    <Ico d={IC.print} sz={13} c={NV}/>Imprimir 12h
                  </button>
                )}
                {entries.length>0&&<button onClick={function(){setTab("reportes");}} style={{background:"none",border:"none",color:"#2d7dd2",cursor:"pointer",fontSize:13,fontFamily:"Montserrat",fontWeight:700}}>Ver todos</button>}
              </div>
            </div>
            {entries.length===0
              ?<div style={{textAlign:"center",color:"#8a96a8",padding:"50px 20px",border:"2px dashed rgba(13,47,92,0.12)",borderRadius:14,background:"#fff"}}>
                  <div style={{fontSize:14,fontWeight:500}}>No hay reportes aun. Crea el primero!</div>
                </div>
              :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {entries.slice().sort(function(a,b){return new Date(b.updatedAt||b.createdAt)-new Date(a.updatedAt||a.createdAt);}).slice(0,5).map(function(e){return <EntryExpanded key={e.id} entry={e} initialUser={initialUser} onConfirmar={confirmarLectura} onAgregarComentario={agregarComentario} onToggleReaccionEntry={toggleReaccionEntry} onToggleReaccionComment={toggleReaccionComment} onPrint={function(en){window.print();}}/>;}) }
                  {entries.length>5&&<button onClick={function(){setTab("reportes");}} style={{background:"#fff",border:"1.5px dashed rgba(13,47,92,0.15)",borderRadius:12,padding:13,cursor:"pointer",color:"#8a96a8",fontFamily:"Montserrat",fontSize:12,fontWeight:700,width:"100%"}}>Ver los {entries.length-5} restantes</button>}
                </div>
            }
          </div>
        ):tab==="reportes"?(
          <ReportesView entries={entries} turnos={turnos} onDetail={function(e){setDetail(e);}} initialUser={initialUser} onConfirmar={confirmarLectura} filtroInicial={filtroInicial} onClearFiltro={function(){setFiltroInicial(null);}} onAgregarSeguimiento={agregarSeguimiento} onCerrarPendiente={cerrarPendiente} onAgregarComentario={agregarComentario} onToggleReaccionEntry={toggleReaccionEntry} onToggleReaccionComment={toggleReaccionComment}/>
        ):tab==="analisis"?(
          <AnalisisView entries={entries}/>
        ):tab==="nuevo"?(
          <NewForm onSave={doSave} onCancel={function(){setTab("home");}} eqs={eqs} tecs={tecs} metEqs={metEqs} locEqs={locEqs} turnos={turnos} initialUser={initialUser} sessionEntries={sessionEntries} allEntries={entries}/>
        ):tab==="admin"&&adminOk?(
          <AdminPanel eqs={eqs} tecs={tecs} metEqs={metEqs} locEqs={locEqs} turnos={turnos} entries={entries} setEqs={setEqs} setTecs={setTecs} setMetEqs={setMetEqs} setLocEqs={setLocEqs} setTurnos={setTurnos} onDel={doDel} onLogout={function(){setAdminOk(false);setTab("home");}}/>
        ):null}
      </main>

      {!detail&&tab!=="admin"&&(
        <nav className="bnav">
          {TABS.map(function(t){return(
            <button key={t.id} className={"ntab"+(tab===t.id?" on":"")} onClick={function(){setTab(t.id);}}>
              <div className="nicon"><Ico d={t.ic} sz={20} c={tab===t.id?NV:"#8a96a8"}/></div>
              {t.lbl}
            </button>
          );})}
        </nav>
      )}

      {/* Toast de confirmación de lectura */}
      {confToast&&(
        <div style={{
          position:"fixed",bottom:80,right:16,zIndex:9999,
          background:"#1C1C1E",color:"#fff",borderRadius:14,
          padding:"10px 14px",maxWidth:260,
          boxShadow:"0 8px 28px rgba(0,0,0,0.35)",
          animation:"slideInRight .25s ease",
          display:"flex",gap:10,alignItems:"flex-start"
        }}>
          <style>{`@keyframes slideInRight{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}`}</style>
          <span style={{fontSize:20,flexShrink:0,marginTop:1}}>✅</span>
          <div>
            <div style={{fontWeight:700,fontSize:13,fontFamily:"Montserrat"}}>Reporte verificado</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.6)",marginTop:3,lineHeight:1.4}}>
              {confToast.nombre}<br/>{confToast.fecha}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// MÓDULO MANTENIMIENTOS · Cronograma F-MAN-012 + Órdenes F-MAN-008
// ═══════════════════════════════════════════════════════════════════════════
const MTTO_MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const MTTO_MESES_C = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MTTO_FREQ = {M:"Mensual",T:"Trimestral",S:"Semestral",A:"Anual"};
const MTTO_FREQ_STYLE = {
  M:{bg:"#E5E0FF",col:"#4A3ACF"},
  T:{bg:"#D6EBFF",col:"#0A66C2"},
  S:{bg:"#FFF0D9",col:"#C45200"},
  A:{bg:"#D1F2E0",col:"#1D7A3E"},
};
const MTTO_ESTADO = {
  programado:  {label:"Programado",  cls:"badge-blue"},
  ejecutado:   {label:"Ejecutado",   cls:"badge-green"},
  reprogramado:{label:"Reprogramado",cls:"badge-orange"},
};

// ── Parser del F-MAN-012 (xlsm/xlsx) ─────────────────────────────────────────
function parseFMAN012(arrayBuffer){
  var wb = XLSX.read(arrayBuffer,{type:"array"});
  var name = wb.SheetNames.indexOf("F-MAN-012")>=0 ? "F-MAN-012" : wb.SheetNames[0];
  var ws = wb.Sheets[name];
  var rows = XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  // Detectar año en el encabezado ("AÑO: 2026 ...")
  var anio = new Date().getFullYear();
  for(var i=0;i<8;i++){
    var joined = (rows[i]||[]).map(function(c){return c==null?"":String(c);}).join(" ");
    var m = joined.match(/A[ÑN]O:\s*(\d{4})/i);
    if(m){ anio = parseInt(m[1],10); break; }
  }
  var seccion = "";
  var acts = [];
  for(var r=6;r<rows.length;r++){
    var row = rows[r]||[];
    var cod  = row[0]==null?"":String(row[0]).trim();
    var desc = row[1]==null?"":String(row[1]).trim();
    if(!cod && !desc) continue;
    if(/PORCENTAJE|EJECUTADO/i.test(desc)) continue;
    if(cod==="0"||cod==="1") continue;
    var marks = [];
    for(var mm=0;mm<12;mm++){
      var v = row[2+mm];
      var mk = v==null?"":String(v).trim().toUpperCase();
      if(["M","T","S","A"].indexOf(mk)>=0) marks.push({mes:mm+1,frecuencia:mk});
    }
    // Fila sin descripción y sin marcas = encabezado de sección
    if(!desc && marks.length===0){ seccion = cod; continue; }
    if(!cod) continue;
    marks.forEach(function(mk){
      acts.push({
        anio:anio, seccion:seccion,
        equipo_codigo:cod, equipo_desc:desc,
        mes:mk.mes, frecuencia:mk.frecuencia,
        estado:"programado",
      });
    });
  }
  return {anio:anio, actividades:acts};
}

              <div><b>Nuevo mes:</b> {ord.mes_reprogramado?MTTO_MESES[ord.mes_reprogramado-1]:"—"}</div>
              {ord.observaciones&&<div style={{marginTop:4,color:"#7a5a2e"}}>{ord.observaciones}</div>}
            </div>
          )}
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            {canEdit&&ord.estado!=="ejecutado"&&(
              <button className="ios-btn ios-btn-blue" style={{padding:"13px",fontSize:14}}
                onClick={function(){setModal("ejecutar");}}>✓ Marcar ejecutada</button>
            )}
            {canEdit&&ord.estado==="programado"&&(
              <button className="ios-btn" style={{padding:"13px",fontSize:14,background:"var(--light)",color:"var(--navy)"}}
                onClick={function(){setModal("reprogramar");}}>↻ Reprogramar</button>
            )}
            <button className="ios-btn" style={{padding:"13px",fontSize:14,background:"var(--navy-deep)",color:"#fff"}}
              onClick={function(){printFMAN008(ord);}}>🖨️ Imprimir F-MAN-008</button>
            {canEdit&&ord.estado==="ejecutado"&&(
              <button className="ios-btn" style={{padding:"11px",fontSize:13,background:"transparent",color:"#C0001A"}}
                onClick={async function(){ await onUpdate({estado:"programado",fecha_ejecucion:null,ejecutor:null,observaciones:null}); }}>
                Revertir a programada</button>
            )}
          </div>
        </div>
        {modal==="ejecutar"&&<MttoEjecutarModal ord={ord} currentUser={currentUser}
          onClose={function(){setModal(null);}}
          onSave={async function(patch){ await onUpdate(patch); setModal(null); }}/>}
        {modal==="reprogramar"&&<MttoReprogramarModal ord={ord}
          onClose={function(){setModal(null);}}
          onSave={async function(patch){ await onUpdate(patch); setModal(null); }}/>}
      </div>
    </div>
  );
}

// ── App principal del módulo ─────────────────────────────────────────────────
function MantenimientosApp({onBack, initialUser}){
  var t = React.useState("calendario"); var tab=t[0],setTab=t[1];
  var y = React.useState(new Date().getFullYear()); var anio=y[0],setAnio=y[1];
  var mo = React.useState(new Date().getMonth()+1); var mes=mo[0],setMes=mo[1];
  var d = React.useState([]); var ordenes=d[0],setOrdenes=d[1];
  var ld = React.useState(true); var loading=ld[0],setLoading=ld[1];
  var q = React.useState(""); var busca=q[0],setBusca=q[1];
  var sel = React.useState(null); var selOrd=sel[0],setSelOrd=sel[1];
  var im = React.useState(false); var importing=im[0],setImporting=im[1];
  var fl = React.useState(null); var flashMsg=fl[0],setFlashMsg=fl[1];
  var us = React.useState([]); var usuarios=us[0],setUsuarios=us[1];
  var ft = React.useState(""); var filtroTec=ft[0],setFiltroTec=ft[1];
  var fileRef = React.useRef(null);
  var canImport = initialUser&&initialUser.role==="admin";
  var hoyMes = new Date().getMonth()+1;
  var hoyAnio = new Date().getFullYear();

  function flash(msg, ok){
    setFlashMsg({msg:msg,ok:ok!==false});
    setTimeout(function(){setFlashMsg(null);},3500);
  }

  async function load(){
    setLoading(true);
    var r = await sb.from("mtto_ordenes").select("*").eq("anio",anio)
      .order("seccion").order("equipo_codigo").order("mes");
    if(r.error){ flash("Error cargando: "+r.error.message,false); setLoading(false); return; }
    setOrdenes(r.data||[]);
    setLoading(false);
  }
  React.useEffect(function(){ load(); },[anio]);
  React.useEffect(function(){
    sb.from("usuarios").select("id,username,nombre,role").eq("activo",true).order("nombre")
      .then(function(r){ if(!r.error) setUsuarios(r.data||[]); });
  },[]);

  // ── Import F-MAN-012 ──
  async function handleImport(ev){
    var file = ev.target.files&&ev.target.files[0];
    ev.target.value = "";
    if(!file) return;
    setImporting(true);
    try{
      var buf = await file.arrayBuffer();
      var parsed = parseFMAN012(buf);
      if(parsed.actividades.length===0){ flash("No se encontraron actividades en el archivo.",false); setImporting(false); return; }
      // Traer existentes del año para no duplicar ni borrar ejecuciones
      var ex = await sb.from("mtto_ordenes").select("equipo_codigo,equipo_desc,mes").eq("anio",parsed.anio);
      if(ex.error) throw ex.error;
      var mkey = function(o){ return o.equipo_codigo+"|"+(o.equipo_desc||"")+"|"+o.mes; };
      var existentes = {};
      (ex.data||[]).forEach(function(o){ existentes[mkey(o)]=true; });
      var nuevas = [];
      parsed.actividades.forEach(function(a){
        var k = mkey(a);
        if(existentes[k]) return;
        existentes[k] = true; // dedupe también dentro del mismo archivo
        nuevas.push(a);
      });
      // Consecutivos
      var base = (ex.data||[]).length;
      nuevas.forEach(function(a,i){
        a.consecutivo = "OT-"+parsed.anio+"-"+String(base+i+1).padStart(4,"0");
      });
      if(nuevas.length===0){
        flash("Cronograma "+parsed.anio+" ya estaba importado ("+parsed.actividades.length+" actividades). Sin cambios.");
      } else {
        // Insertar por lotes de 200
        for(var i=0;i<nuevas.length;i+=200){
          var ins = await sb.from("mtto_ordenes").insert(nuevas.slice(i,i+200));
          if(ins.error) throw ins.error;
        }
        flash("Importadas "+nuevas.length+" actividades del cronograma "+parsed.anio+" ✓");
        registrarHistorial("mtto_import","Import F-MAN-012 "+parsed.anio+" ("+nuevas.length+" órdenes)",initialUser&&(initialUser.nombre||initialUser.username));
      }
      if(parsed.anio!==anio) setAnio(parsed.anio); else load();
    }catch(e){
      flash("Error al importar: "+(e.message||JSON.stringify(e)),false);
    }
    setImporting(false);
  }

  async function updateOrden(ord, patch){
    var r = await sb.from("mtto_ordenes").update(patch).eq("id",ord.id).select();
    if(r.error){ flash("Error: "+r.error.message,false); return; }
    var upd = r.data&&r.data[0];
    setOrdenes(function(prev){ return prev.map(function(o){ return o.id===ord.id?(upd||Object.assign({},o,patch)):o; }); });
    if(upd) setSelOrd(upd);
    if(patch.estado==="ejecutado"){
      flash("Orden ejecutada ✓");
      registrarHistorial("mtto_ejecutada",ord.equipo_codigo+" "+ord.equipo_desc+" ("+MTTO_MESES[ord.mes-1]+")",patch.ejecutor);
    } else if(patch.estado==="reprogramado"){
      flash("Orden reprogramada ↻");
    }
  }

  // ── Derivados ──
  var esVencida = function(o){ return o.estado==="programado" && o.anio<=hoyAnio && (o.anio<hoyAnio || o.mes<hoyMes); };
  var porMes = React.useMemo(function(){
    var arr = [];
    for(var m=1;m<=12;m++){
      var os = ordenes.filter(function(o){return o.mes===m;});
      arr.push({
        mes:m, total:os.length,
        ejec:os.filter(function(o){return o.estado==="ejecutado";}).length,
        venc:os.filter(esVencida).length,
        repr:os.filter(function(o){return o.estado==="reprogramado";}).length,
      });
    }
    return arr;
  },[ordenes]);

  var delMes = React.useMemo(function(){
    var lista = ordenes.filter(function(o){return o.mes===mes;});
    if(filtroTec){
      lista = lista.filter(function(o){return (o.asignado_a||"")===filtroTec;});
    }
    if(busca.trim()){
      var b = busca.trim().toLowerCase();
      lista = lista.filter(function(o){
        return (o.equipo_codigo||"").toLowerCase().indexOf(b)>=0 ||
               (o.equipo_desc||"").toLowerCase().indexOf(b)>=0 ||
               (o.seccion||"").toLowerCase().indexOf(b)>=0;
      });
    }
    return lista;
  },[ordenes,mes,busca,filtroTec]);

  var secciones = React.useMemo(function(){
    var map = {};
    delMes.forEach(function(o){
      var s = o.seccion||"SIN SECCIÓN";
      (map[s]=map[s]||[]).push(o);
    });
    return Object.keys(map).map(function(s){return {seccion:s,items:map[s]};});
  },[delMes]);

  var totAnio = ordenes.length;
  var totEjec = ordenes.filter(function(o){return o.estado==="ejecutado";}).length;
  var totVenc = ordenes.filter(esVencida).length;

  return(
    <div style={{minHeight:"100vh",background:"var(--lighter)",paddingBottom:40}}>
      <style>{`
        .mtto-hdr{background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:60;box-shadow:0 2px 12px rgba(13,47,92,0.28);}
        .mtto-hdr-back{background:rgba(255,255,255,0.12);border:none;border-radius:8px;color:#fff;cursor:pointer;padding:6px 10px;display:flex;align-items:center;gap:5px;font-family:Montserrat,sans-serif;font-weight:700;font-size:11px;flex-shrink:0;}
        .mtto-hdr-logo{height:40px;width:auto;display:block;border-radius:10px;flex-shrink:0;}
        .mtto-hdr-title{font-family:Montserrat,sans-serif;font-weight:800;font-size:14px;color:#fff;letter-spacing:0.3px;}
        .mtto-hdr-sub{font-family:Montserrat,sans-serif;font-size:9px;color:rgba(255,255,255,0.45);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
        .mtto-hdr-spacer{flex:1;}
        .mtto-hdr-import{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.22);border-radius:8px;color:#fff;cursor:pointer;padding:7px 12px;display:flex;align-items:center;gap:6px;font-family:Montserrat,sans-serif;font-weight:700;font-size:11px;white-space:nowrap;}
        .mtto-hdr-import:disabled{opacity:0.65;cursor:default;}
        .mtto-toolbar{background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:2px solid var(--navy);padding:12px 20px 10px;position:sticky;top:60px;z-index:55;}
      `}</style>

      {/* Header (siempre visible, mismo diseño en móvil y escritorio) */}
      <div className="mtto-hdr">
        {onBack&&<button className="mtto-hdr-back" onClick={onBack}>← Suite</button>}
        <img className="mtto-hdr-logo" src={LOGO_SRC} alt="Bussié"/>
        <div>
          <div className="mtto-hdr-title">Mantenimientos</div>
          <div className="mtto-hdr-sub">Bussié · Preventivos</div>
        </div>
        <div className="mtto-hdr-spacer"/>
        {canImport&&(
          <React.Fragment>
            <input ref={fileRef} type="file" accept=".xlsm,.xlsx" style={{display:"none"}} onChange={handleImport}/>
            <button className="mtto-hdr-import" disabled={importing}
              onClick={function(){fileRef.current&&fileRef.current.click();}}>
              <span>{importing?"⏳":"⬆"}</span>
              <span>{importing?"Importando…":"Importar F-MAN-012"}</span>
            </button>
          </React.Fragment>
        )}
      </div>

      {/* Barra de herramientas: año + tabs */}
      <div className="mtto-toolbar">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--gray)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,fontFamily:"Montserrat,sans-serif"}}>Cronograma preventivo · F-MAN-012</div>
          <select className="ios-input" value={anio} style={{padding:"7px 10px",fontSize:13,fontWeight:700,width:"auto"}}
            onChange={function(ev){setAnio(parseInt(ev.target.value,10));}}>
            {[hoyAnio-1,hoyAnio,hoyAnio+1].map(function(a){return <option key={a} value={a}>{a}</option>;})}
          </select>
        </div>
        <div className="mtto-tabs" style={{maxWidth:460}}>
          {[["calendario","Calendario"],["ordenes","Órdenes"],["cumplimiento","Cumplimiento"]].map(function(tb){
            return <button key={tb[0]} className={"mtto-tab-btn"+(tab===tb[0]?" active":"")}
              onClick={function(){setTab(tb[0]);}}>{tb[1]}</button>;
          })}
        </div>
      </div>

      {flashMsg&&(
        <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:500,
          background:flashMsg.ok?"var(--navy)":"#C0001A",color:"#fff",padding:"11px 20px",borderRadius:12,
          fontSize:13,fontWeight:600,boxShadow:"0 8px 30px rgba(0,0,0,0.25)",maxWidth:"90vw"}}>
          {flashMsg.msg}
        </div>
      )}

      <div style={{maxWidth:860,margin:"0 auto",padding:"18px 16px"}}>

        {/* Selector de año */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          <div style={{fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:800,color:"var(--gray)",
            textTransform:"uppercase",letterSpacing:1}}>
            Cronograma preventivo · F-MAN-012
          </div>
          <select className="ios-input" value={anio} style={{padding:"7px 10px",fontSize:13,fontWeight:700,width:"auto"}}
            onChange={function(ev){setAnio(parseInt(ev.target.value,10));}}>
            {[hoyAnio-1,hoyAnio,hoyAnio+1].map(function(a){return <option key={a} value={a}>{a}</option>;})}
          </select>
        </div>

        {loading?(
          <div style={{textAlign:"center",padding:60,color:"var(--gray)",fontWeight:600}}>Cargando cronograma…</div>
        ):totAnio===0?(
          <div style={{textAlign:"center",padding:"70px 20px",color:"var(--gray)"}}>
            <div style={{fontSize:44,marginBottom:12}}>🗓️</div>
            <div style={{fontWeight:700,color:"var(--navy)",fontSize:16,marginBottom:6}}>Sin cronograma para {anio}</div>
            <div style={{fontSize:13}}>{canImport?"Importa el archivo F-MAN-012 para cargar las actividades programadas.":"Aún no se ha importado el cronograma de este año."}</div>
          </div>
        ):(
          <React.Fragment>
            {/* ── TAB CALENDARIO ── */}
            {tab==="calendario"&&(
              <React.Fragment>
                <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
                  <div className="stat-card" style={{flex:1,minWidth:120}}>
                    <div style={{fontSize:24,fontWeight:800,color:"var(--navy)"}}>{totAnio}</div>
                    <div style={{fontSize:11,color:"var(--gray)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Programadas {anio}</div>
                  </div>
                  <div className="stat-card" style={{flex:1,minWidth:120}}>
                    <div style={{fontSize:24,fontWeight:800,color:"#1D7A3E"}}>{totEjec}</div>
                    <div style={{fontSize:11,color:"var(--gray)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Ejecutadas</div>
                  </div>
                  <div className="stat-card" style={{flex:1,minWidth:120}}>
                    <div style={{fontSize:24,fontWeight:800,color:totVenc>0?"#C0001A":"var(--gray)"}}>{totVenc}</div>
                    <div style={{fontSize:11,color:"var(--gray)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>Vencidas</div>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10}}>
                  {porMes.map(function(pm){
                    var actual = pm.mes===hoyMes&&anio===hoyAnio;
                    var pct = pm.total>0?Math.round(pm.ejec/pm.total*100):null;
                    return(
                      <button key={pm.mes} onClick={function(){setMes(pm.mes);setTab("ordenes");}}
                        className="stat-card"
                        style={{cursor:"pointer",textAlign:"left",border:actual?"2px solid var(--accent)":"1px solid var(--border)",
                          background:"#fff",padding:"13px 14px"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontFamily:"Montserrat,sans-serif",fontWeight:800,fontSize:13,color:"var(--navy)",textTransform:"uppercase"}}>
                            {MTTO_MESES_C[pm.mes-1]}
                          </span>
                          {actual&&<span style={{fontSize:9,fontWeight:800,color:"var(--accent)",letterSpacing:0.8}}>HOY</span>}
                        </div>
                        <div style={{fontSize:22,fontWeight:800,color:"var(--navy)",marginTop:4}}>{pm.total}</div>
                        <div style={{display:"flex",gap:8,marginTop:5,fontSize:11,fontWeight:700}}>
                          <span style={{color:"#1D7A3E"}}>✓ {pm.ejec}</span>
                          {pm.venc>0&&<span style={{color:"#C0001A"}}>⚠ {pm.venc}</span>}
                          {pm.repr>0&&<span style={{color:"#C45200"}}>↻ {pm.repr}</span>}
                        </div>
                        {pct!==null&&(
                          <div style={{height:5,background:"var(--light)",borderRadius:3,marginTop:8,overflow:"hidden"}}>
                            <div style={{height:"100%",width:pct+"%",background:pct>=100?"#1D9A50":"var(--accent)",borderRadius:3}}/>
                          </div>
                        )}
                      </button>
                    );
                  })}
                </div>
              </React.Fragment>
            )}

            {/* ── TAB ÓRDENES ── */}
            {tab==="ordenes"&&(
              <React.Fragment>
                <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
                  <select className="ios-input" value={mes} style={{width:"auto",padding:"9px 12px",fontWeight:700,fontSize:13}}
                    onChange={function(ev){setMes(parseInt(ev.target.value,10));}}>
                    {MTTO_MESES.map(function(mn,i){
                      var pm = porMes[i];
                      return <option key={i} value={i+1}>{mn} ({pm.total})</option>;
                    })}
                  </select>
                  <input className="ios-input" placeholder="Buscar equipo, código o sección…" value={busca}
                    onChange={function(ev){setBusca(ev.target.value);}} style={{flex:1,minWidth:180,padding:"9px 12px",fontSize:13}}/>
                  <select className="ios-input" value={filtroTec} style={{width:"auto",maxWidth:180,padding:"9px 12px",fontSize:13,fontWeight:600}}
                    onChange={function(ev){setFiltroTec(ev.target.value);}}>
                    <option value="">👤 Todos</option>
                    {usuarios.map(function(u){
                      var n = u.nombre||u.username;
                      return <option key={u.id} value={n}>{n}</option>;
                    })}
                  </select>
                </div>
                {delMes.length===0?(
                  <div style={{textAlign:"center",padding:"50px 20px",color:"var(--gray)",fontSize:13,fontWeight:600}}>
                    Sin actividades {busca?"que coincidan con la búsqueda":"programadas en "+MTTO_MESES[mes-1]}.
                  </div>
                ):secciones.map(function(sec){
                  return(
                    <div key={sec.seccion} style={{marginBottom:18}}>
                      <div style={{fontFamily:"Montserrat,sans-serif",fontSize:11,fontWeight:800,color:"var(--gray)",

                        {sec.seccion} · {sec.items.length}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:8}}>
                        {sec.items.map(function(o){
                          var fq = MTTO_FREQ_STYLE[o.frecuencia]||MTTO_FREQ_STYLE.T;
                          var venc = esVencida(o);
                          var est = MTTO_ESTADO[o.estado]||MTTO_ESTADO.programado;
                          return(
                            <button key={o.id} onClick={function(){setSelOrd(o);}}
                              style={{background:"#fff",border:"1px solid var(--border)",borderRadius:14,
                                padding:"12px 14px",cursor:"pointer",textAlign:"left",display:"flex",
                                alignItems:"center",gap:12,boxShadow:"0 1px 8px rgba(13,47,92,0.05)"}}>
                              <div style={{width:42,height:42,borderRadius:11,background:fq.bg,color:fq.col,
                                display:"flex",alignItems:"center",justifyContent:"center",
                                fontFamily:"Montserrat,sans-serif",fontWeight:800,fontSize:15,flexShrink:0}}>
                                {o.frecuencia}
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontSize:13.5,fontWeight:700,color:"var(--navy)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                                  {o.equipo_desc}
                                </div>
                                <div style={{fontSize:11.5,color:"var(--gray)",fontWeight:600,marginTop:2}}>
                                  {o.equipo_codigo}{o.consecutivo?" · "+o.consecutivo:""}
                                </div>
                                {o.asignado_a&&(
                                  <div style={{fontSize:11,color:"var(--accent)",fontWeight:700,marginTop:3}}>
                                    👤 {o.asignado_a}
                                  </div>
                                )}
                              </div>
                              <span className={"badge "+(venc?"badge-red":est.cls)} style={{flexShrink:0}}>
                                {venc?"Vencida":est.label}
                              </span>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </React.Fragment>
            )}

            {/* ── TAB CUMPLIMIENTO ── */}
            {tab==="cumplimiento"&&(
              <React.Fragment>
                <div className="stat-card" style={{marginBottom:16,textAlign:"center",padding:"20px"}}>
                  <div style={{fontSize:36,fontWeight:800,color:"var(--navy)"}}>
                    {totAnio>0?Math.round(totEjec/totAnio*100):0}%
                  </div>
                  <div style={{fontSize:11,color:"var(--gray)",fontWeight:700,textTransform:"uppercase",letterSpacing:0.8}}>
                    Cumplimiento anual {anio} · {totEjec}/{totAnio} órdenes
                  </div>
                </div>
                <div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:16,padding:"18px 16px"}}>
                  {porMes.map(function(pm){
                    var pct = pm.total>0?Math.round(pm.ejec/pm.total*100):0;
                    var pasado = anio<hoyAnio||(anio===hoyAnio&&pm.mes<hoyMes);
                    var col = pm.total===0?"var(--light)":(pct>=100?"#1D9A50":(pasado&&pct<100?"#E0483E":"var(--accent)"));
                    return(
                      <div key={pm.mes} style={{display:"flex",alignItems:"center",gap:10,marginBottom:9}}>
                        <div style={{width:34,fontSize:11,fontWeight:800,color:"var(--gray)",fontFamily:"Montserrat,sans-serif",textTransform:"uppercase"}}>
                          {MTTO_MESES_C[pm.mes-1]}
                        </div>
                        <div style={{flex:1,height:16,background:"var(--light)",borderRadius:8,overflow:"hidden"}}>
                          <div style={{height:"100%",width:(pm.total>0?pct:0)+"%",background:col,borderRadius:8,

      return function(){ window.removeEventListener("popstate",handler); };
    } else {
      if(!window.history.state||!window.history.state.bussie){
        window.history.replaceState({bussie:"suite"},"");
      }
    }
  },[mod]);

  var lk=React.useRef(0);
  if(!rootUser) return <LoginScreen key={lk.current} onLogin={function(user){setMod(null);setRootUser(user);}}/>;
  if(!mod) return <SuiteSelector onSelect={setMod} currentUser={rootUser} onLogout={function(){lk.current++;setRootUser(null);setMod(null);}}/>;

  function handleLogout(){lk.current++;setRootUser(null);setMod(null);}

  if(mod==="almacen") return <AlmacenApp onBack={handleLogout} initialUser={rootUser}/>;
  if(mod==="bitacora") return <BitacoraApp onBack={function(){setMod(null);}} initialUser={rootUser}/>;
  if(mod==="mantenimientos") return <MantenimientosApp onBack={function(){setMod(null);}} initialUser={rootUser}/>;
  return null;
}
ReactDOM.render(React.createElement(RootApp),document.getElementById("root"));

// ── Swipe-down global para cerrar cualquier .sheet ───────────────────────────
(function(){
  var sheet=null, startY=0, startScrollTop=0;
  document.addEventListener("touchstart",function(e){
    var el=e.target.closest(".sheet");
    if(!el) return;
    sheet=el;
    startY=e.touches[0].clientY;
    startScrollTop=el.scrollTop;
  },{passive:true});
  document.addEventListener("touchmove",function(e){
    if(!sheet||startScrollTop>0) return;
    var dy=e.touches[0].clientY-startY;
    if(dy>0){
      sheet.style.transform="translateY("+Math.min(dy*0.5,120)+"px)";
      sheet.style.transition="none";
    }
  },{passive:true});
  document.addEventListener("touchend",function(e){
    if(!sheet) return;
    var dy=e.changedTouches[0].clientY-startY;
    if(dy>80&&startScrollTop===0){
      sheet.style.transform="translateY(110%)";
      sheet.style.transition="transform 0.28s cubic-bezier(0.32,0.72,0,1)";
      var overlay=sheet.closest(".overlay")||sheet.parentElement;
      setTimeout(function(){
        if(overlay) overlay.click();
        sheet.style.transform="";
        sheet.style.transition="";
        sheet=null;
      },260);
    } else {
      sheet.style.transform="";
      sheet.style.transition="transform 0.2s ease";
      sheet=null;
    }
  },{passive:true});
})();

</script>
