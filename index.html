}

// ── EqManager ─────────────────────────────────────────────────────────────────
function EqManager({title,col,icon,items,onSave,placeholder,emptyMsg}){
  const [single,setSingle]=useState("");
  const [bulk,setBulk]=useState("");
  const [msg,setMsg]=useState(null);
  const [showBulk,setShowBulk]=useState(false);

  function flash(m,ok){setMsg({m,ok:ok!==false});setTimeout(function(){setMsg(null);},2200);}

  function addOne(){
    const v=single.trim();if(!v)return;
    if(items.indexOf(v)>=0){flash("Ya existe en la lista.",false);return;}
    onSave(items.concat([v]));setSingle("");flash("Agregado.");
  }
  function removeOne(x){
    if(!confirm("Eliminar:\n"+x))return;
    onSave(items.filter(function(i){return i!==x;}));
  }
  function importBulk(){
    const lines=bulk.split("\n").map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
    if(!lines.length){flash("No hay líneas válidas.",false);return;}
    const set=new Set(items);
    const nuevos=lines.filter(function(l){return !set.has(l);});
    if(!nuevos.length){flash("Todos ya existen en la lista.",false);return;}
    onSave(items.concat(nuevos));setBulk("");
    flash("Importados "+nuevos.length+" de "+lines.length+".");
  }
  function clearAll(){
    if(!confirm("¿Borrar TODA la lista de "+title+"?\nEsto no se puede deshacer."))return;
    onSave([]);flash("Lista vaciada.");
  }

  const btnStyle={background:col+"18",color:col,border:"1.5px solid "+col+"44"};

  return(
    <SCard title={title} col={col} icon={icon}>
      {/* Toolbar */}
      <div style={{padding:"8px 14px",borderBottom:"1px solid rgba(13,47,92,0.08)",background:"#f9fafc",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
        <span style={{fontSize:11,color:"#8a96a8",fontFamily:"Montserrat",fontWeight:700,letterSpacing:.5}}>
          {items.length} ítem{items.length!==1?"s":""} registrado{items.length!==1?"s":""}
        </span>
        <div style={{display:"flex",gap:6}}>
          <button className="btn btn-sm" style={btnStyle}
            onClick={function(){setShowBulk(function(b){return !b;});}}>
            {showBulk?"✕ Cerrar":"⬆ Carga masiva"}
          </button>
          {items.length>0&&(
            <button className="btn btn-sm" style={{background:"#FFDEDE",color:"#C0001A",border:"1.5px solid #f5b8b8"}}
              onClick={clearAll}>🗑 Borrar todo</button>
          )}
        </div>
      </div>

      {/* Bulk import */}
      {showBulk&&(
        <div style={{padding:"12px 14px",borderBottom:"1px solid rgba(13,47,92,0.08)",background:"#fafafa",display:"flex",flexDirection:"column",gap:8}}>
          <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:10,color:col,textTransform:"uppercase",letterSpacing:1}}>
            Carga masiva — un ítem por línea
          </div>
          <textarea className="inp" rows={6} style={{resize:"vertical",fontSize:12,fontFamily:"monospace"}}
            placeholder={placeholder||"Ítem 1\nÍtem 2\n..."}
            value={bulk} onChange={function(e){setBulk(e.target.value);}}/>
          <button className="btn btn-sm" style={btnStyle} onClick={importBulk}>
            ⬆ Importar ({bulk.split("\n").filter(function(l){return l.trim();}).length} líneas)
          </button>
        </div>
      )}

      {/* List */}
      <div style={{maxHeight:240,overflowY:"auto"}}>
        {items.length===0
          ?<div style={{padding:"16px",color:"#8a96a8",fontSize:13,textAlign:"center"}}>{emptyMsg||"Sin ítems"}</div>
          :items.map(function(x,i){return(
            <div key={i} className="list-row">
              <span style={{fontSize:13,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x}</span>
              <button onClick={function(){removeOne(x);}} className="del-btn">
                <Ico d={IC.trash} sz={12}/>Quitar
              </button>
            </div>
          );})}
      </div>

      {/* Single add */}
      <div style={{padding:"10px 14px",borderTop:"1px solid rgba(13,47,92,0.08)",display:"flex",gap:8,flexWrap:"wrap"}}>
        <input className="inp" style={{flex:1,minWidth:140,fontSize:13}} placeholder="Agregar individual..."
          value={single} onChange={function(e){setSingle(e.target.value);}}
          onKeyDown={function(e){if(e.key==="Enter")addOne();}}/>
        <button className="btn btn-sm" style={btnStyle} onClick={addOne}>+ Agregar</button>
      </div>

      {/* Feedback */}
      {msg&&(
        <div style={{margin:"0 14px 10px",padding:"7px 12px",borderRadius:7,fontSize:12,fontWeight:700,
          background:msg.ok?"#D1F2E0":"#FFDEDE",color:msg.ok?"#1D7A3E":"#C0001A"}}>
          {msg.m}
        </div>
      )}
    </SCard>
  );
}

// ── AdminPanel ────────────────────────────────────────────────────────────────
function AdminPanel({eqs,tecs,metEqs,locEqs,turnos,entries,setEqs,setTecs,setMetEqs,setLocEqs,setTurnos,onDel,onLogout}){
  const [ne,setNe]=useState("");
  // contraseña
  const [pmMode,setPmMode]=useState(false);
  const [op,setOp]=useState(""); const [np,setNp]=useState(""); const [np2,setNp2]=useState("");
  const [pmsg,setPmsg]=useState(null);

  function chPass(){
    if(op!==lg(KS.p,PASS_DEF)){setPmsg({ok:false,m:"Contrasena actual incorrecta"});return;}
    if(np.length<4){setPmsg({ok:false,m:"Minimo 4 caracteres"});return;}
    if(np!==np2){setPmsg({ok:false,m:"No coinciden"});return;}
    save(KS.p,np);setPmsg({ok:true,m:"Contrasena actualizada!"});
    setOp("");setNp("");setNp2("");
    setTimeout(function(){setPmsg(null);},2500);
  }

  return (
    <div>
      <div style={{background:NV,borderRadius:14,padding:"18px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:20}}>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",fontFamily:"Montserrat",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Panel de administracion</div>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:"Montserrat"}}>Configuracion</div>
        </div>
        <button className="btn btn-ghost" onClick={onLogout}>Cerrar sesion</button>
      </div>

      {/* ── Técnicos ── */}
      <EqManager
        title="Turnos" col="#0D2F5C" icon={IC.clk}
        items={turnos}
        onSave={function(n){setTurnos(n);save(KS.tur,n);}}
        placeholder={"6:00-14:00\n14:00-22:00\n22:00-6:00"}
        emptyMsg="Sin turnos — se usarán los predeterminados (A, B, C)"/>

      {/* ── Pendientes activos ── */}
      {(function(){
        var pendEntries=entries
          .filter(function(e){return (e.pendientes||[]).some(function(p){return !p.cerrado;});})
          .slice()
          .sort(function(a,b){
            var ta=a.updatedAt||a.createdAt||a.fecha;
            var tb=b.updatedAt||b.createdAt||b.fecha;
            return new Date(tb)-new Date(ta);
          });
        if(pendEntries.length===0) return null;
        function fmtRelTs(iso){
          if(!iso) return "";
          var d=new Date(iso);
          var now=new Date();
          var diff=Math.floor((now-d)/1000);
          if(diff<60) return "hace "+diff+"s";
          if(diff<3600) return "hace "+Math.floor(diff/60)+"min";
          if(diff<86400) return "hace "+Math.floor(diff/3600)+"h";
          return "hace "+Math.floor(diff/86400)+"d";
        }
        return(
          <div className="card" style={{marginBottom:16,border:"1.5px solid rgba(196,82,0,0.22)",borderRadius:12,overflow:"hidden"}}>
            <div className="card-hdr" style={{background:"linear-gradient(90deg,rgba(196,82,0,0.07),transparent)",borderBottom:"1px solid rgba(196,82,0,0.12)"}}>
              <Ico d={IC.alert} sz={15} c="#C45200"/>
              <span className="stitle" style={{color:"#C45200"}}>Pendientes activos</span>
              <span style={{marginLeft:"auto",background:"#FFF0D9",color:"#C45200",borderRadius:20,fontSize:10,fontWeight:800,fontFamily:"Montserrat",padding:"2px 10px"}}>
                {pendEntries.reduce(function(a,e){return a+(e.pendientes||[]).filter(function(p){return !p.cerrado;}).length;},0)} abiertos
              </span>
            </div>
            <div style={{maxHeight:400,overflowY:"auto"}}>
              {pendEntries.map(function(e){
                var abiertos=(e.pendientes||[]).filter(function(p){return !p.cerrado;});
                var updLabel=fmtRelTs(e.updatedAt||e.createdAt);
                return(
                  <div key={e.id} style={{padding:"12px 14px",borderBottom:"0.5px solid rgba(13,47,92,0.07)"}}>

                      <div style={{display:"flex",alignItems:"center",gap:7}}>
                        <div style={{width:28,height:28,borderRadius:8,background:"#0D2F5C",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:11}}>
                            {(e.tecnico||"?").split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2)}

                        </div>
                        <div>

                          <div style={{fontSize:10,color:"#8a96a8",marginTop:2,fontFamily:"Montserrat"}}>{fD(e.fecha+"T12:00:00")} · {e.turno}</div>

                      var segs=p.seguimientos||[];
                      var lastSeg=segs.length>0?segs[segs.length-1]:null;
                      return(

                              </div>
                              <div style={{fontSize:12,color:"#5C3A00",lineHeight:1.35}}>{p.desc}</div>

// ── EqSearch – combobox con búsqueda por código o nombre ─────────────────────
function EqSearch({value,onChange,list,cls}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef();
  const inputRef=useRef();

  useEffect(function(){
    if(!open)return;
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",handler);
    return function(){document.removeEventListener("mousedown",handler);};
  },[open]);

  useEffect(function(){
    if(open&&inputRef.current)setTimeout(function(){inputRef.current&&inputRef.current.focus();},30);
  },[open]);

  const filtered=q.trim()
    ?list.filter(function(a){return a.toLowerCase().indexOf(q.toLowerCase())>=0;})
    :list;

  function pick(a){onChange(a);setOpen(false);setQ("");}

  function hl(text,srch){
    if(!srch)return text;
    const lo=text.toLowerCase();const sq=srch.toLowerCase();
    const i=lo.indexOf(sq);
    if(i<0)return text;
    return [text.slice(0,i),React.createElement("mark",{key:"m",style:{background:"#fde68a",color:NV,borderRadius:2,padding:"0 1px"}},text.slice(i,i+srch.length)),text.slice(i+srch.length)];
  }

  return (
    <div ref={ref} style={{position:"relative",flex:1,minWidth:0}} className={cls||""}>
      <div className="inp"
        style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",
          gap:8,padding:"12px 14px",userSelect:"none",minHeight:48,
          background: open?"#fff":"var(--lighter)",
          border: open?"1.5px solid var(--navy)":"1.5px solid var(--border)",
          boxShadow: open?"0 0 0 3px rgba(13,47,92,0.10)":"none",
          transition:"all .15s"}}
        onClick={function(){setOpen(function(o){return !o;});setQ("");}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
          fontSize:14,fontWeight:value?600:400,flex:1,
          color:value?NV:"#8a96a8"}}>
          {value||"Seleccionar área / equipo…"}
        </span>
        <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          {value&&<div style={{width:6,height:6,borderRadius:"50%",background:"#34C759",flexShrink:0}}/>}
          <Ico d={IC.chev} sz={14} c={open?NV:"#8a96a8"}/>
        </div>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,minWidth:280,
          background:"#fff",border:"1.5px solid rgba(13,47,92,0.18)",borderRadius:12,
          boxShadow:"0 12px 40px rgba(13,47,92,0.20)",zIndex:1000,
          display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(13,47,92,0.08)",background:"#f4f7fd"}}>
            <input ref={inputRef} className="inp" style={{fontSize:14,padding:"9px 12px"}}
              placeholder="🔍  Buscar…" value={q}
              onChange={function(e){setQ(e.target.value);}}
              onClick={function(e){e.stopPropagation();}}/>
          </div>
          <div style={{overflowY:"scroll",maxHeight:260,
            scrollbarWidth:"thin",scrollbarColor:"rgba(13,47,92,0.25) transparent"}}>
            {filtered.length===0
              ?<div style={{padding:"14px 16px",color:"#8a96a8",fontSize:13,textAlign:"center"}}>Sin resultados</div>
              :filtered.map(function(a){
                const sel=a===value;
                return (
                  <div key={a}
                    style={{padding:"11px 16px",cursor:"pointer",fontSize:13,lineHeight:1.4,
                      color:sel?NV:"#334",fontWeight:sel?700:400,
                      background:sel?"#e8f0fb":"transparent",
                      borderBottom:".5px solid rgba(13,47,92,0.05)",
                      display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}
                    onMouseDown={function(e){e.preventDefault();pick(a);}}>
                    <span style={{flex:1,minWidth:0}}>{hl(a,q)}</span>
                    {sel&&<span style={{fontSize:14,color:NV,flexShrink:0}}>✓</span>}
                  </div>
                );
              })
            }
          </div>
          <div style={{padding:"7px 12px",fontSize:10,color:"#8a96a8",fontFamily:"Montserrat",
            fontWeight:700,letterSpacing:.5,borderTop:"1px solid rgba(13,47,92,0.07)",
            display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fafbfd"}}>
            <span>{filtered.length} resultado{filtered.length!==1?"s":""}</span>
            <span style={{color:"rgba(13,47,92,0.35)"}}>toca para seleccionar</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ── NewForm ───────────────────────────────────────────────────────────────────
function NewForm({onSave,onCancel,eqs,tecs,metEqs,locEqs,turnos,initialUser,sessionEntries,allEntries}){
  const turnosList=turnos&&turnos.length>0?turnos:TURNOS_DEF;
  const eqList=eqs.length>0?eqs:AREAS_DEF;
  const locList=locEqs&&locEqs.length>0?locEqs:AREAS_LOC;
  const OTRA="✏ Otra actividad...";

  function detectTurno(){
    const cm=new Date().getHours()*60+new Date().getMinutes();
    for(let i=0;i<turnosList.length;i++){
      const m=turnosList[i].match(/(\d+):(\d+)\s*[-–]\s*(\d+):(\d+)/);
      if(m){
        const s=parseInt(m[1])*60+parseInt(m[2]);
        const e=parseInt(m[3])*60+parseInt(m[4]);
        if(e>s){if(cm>=s&&cm<e)return turnosList[i];}
        else{if(cm>=s||cm<e)return turnosList[i];}
      }
    }
    return turnosList[0];
  }

  // Si el turno activo cruza medianoche (ej. 22:00-6:00) y todavía estamos dentro
  // de esa franja de madrugada, permitimos elegir "ayer" como fecha del reporte,
  // para poder registrar lo hecho antes de medianoche sin que quede como si fuera hoy.
  const permiteAyer=React.useMemo(function(){
    const cm=new Date().getHours()*60+new Date().getMinutes();
    for(let i=0;i<turnosList.length;i++){
      const m=turnosList[i].match(/(\d+):(\d+)\s*[-–]\s*(\d+):(\d+)/);
      if(m){
        const s=parseInt(m[1])*60+parseInt(m[2]);
        const e=parseInt(m[3])*60+parseInt(m[4]);
        if(e<s&&cm<e) return true; // turno nocturno y estamos en la madrugada (ya pasó medianoche)
      }
    }
    return false;
  },[turnosList]);
  const fechaMin=permiteAyer?ayerS():todayS();

  const tecMap={}; tecs.forEach(function(t){tecMap[t.code]=t;});

  // El técnico ES el usuario logueado — buscar su registro solo para cargo/áreas
  const tecNombreActivo = initialUser?(initialUser.nombre||initialUser.username||""):"";
  const matchCode = React.useMemo(function(){
    if(!initialUser||!tecs.length) return "";
    var uname=(initialUser.username||"").toLowerCase();
    var byUser=tecs.find(function(t){return t.username&&t.username.toLowerCase()===uname;});
    if(byUser) return byUser.code;
    var nombre=(initialUser.nombre||"").toLowerCase();
    var byName=tecs.find(function(t){return t.name&&t.name.toLowerCase().includes(nombre.split(" ")[0]);});
    return byName?byName.code:"";
  }, [initialUser, tecs]);

  const [tecCode]=useState(matchCode);
  const [turno,setTurno]=useState(function(){return detectTurno();});
  const [fecha,setFecha]=useState(new Date().toISOString().slice(0,10));
  const [tipo,setTipo]=useState(""); // "fallo" | "ajuste" | "preventivo" | ""
  const tecObj=tecMap[tecCode]||null;
  // Cargo: prioridad al cargo del usuario logueado, fallback al tecObj
  const cargoActivo = (initialUser&&initialUser.cargo) || (tecObj&&tecObj.cargo) || "";
  const isLocativo  = cargoActivo==="Auxiliar de Mantenimiento Locativo";
  const isMetrologia= cargoActivo==="Técnico de Metrología";
  const baseList=isLocativo?locList:isMetrologia?(metEqs.length>0?metEqs:eqList):eqList;
  const aList=baseList.concat([OTRA]);

  const emptyCard = function(){
    var area = (aList&&aList.length>0) ? aList[0] : "";
    return {id:gid(),area:area,otraArea:"",desc:"",hi:"",hf:"",pendiente:false,p:"Media"};
  };
  const [real,setReal]=useState([]);             // actividades ya confirmadas esta sesión
  const [current,setCurrent]=useState(emptyCard); // tarjeta activa

  // Resetear área solo si cambia el tecObj (no si ya tenemos cargo del initialUser)
  useEffect(function(){
    if(!tecObj || (initialUser&&initialUser.cargo)) return;
    var newBase=isLocativo?locList:isMetrologia?(metEqs.length>0?metEqs:eqList):eqList;
    var first=(newBase.concat([OTRA]))[0]||"";
    setCurrent(function(c){return Object.assign({},c,{area:first,otraArea:"",desc:"",hi:"",hf:"",pendiente:false,id:gid()});});
    setReal([]);
  },[tecObj]);

  function updC(k,v){setCurrent(function(c){return Object.assign({},c,{[k]:v});});}

  function agregarActividad(){
    const r=current;
    if(!r.desc.trim()){alert("Describe la actividad antes de agregar.");return;}
    if(!r.hi||!r.hf){alert("Completa hora de inicio y fin.");return;}
    if(r.hf<=r.hi){alert("Hora fin debe ser posterior a inicio.");return;}
    const hoy=fecha===todayS();const now=nowT();
    if(hoy&&r.hi>now){alert("Hora inicio no puede ser futura.");return;}
    if(hoy&&r.hf>now){alert("Hora fin no puede ser futura.");return;}
    function toMin(t){const p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
    const a1=toMin(r.hi),a2=toMin(r.hf);
    for(var i=0;i<real.length;i++){
      const b=real[i];
      const b1=toMin(b.hi),b2=toMin(b.hf);
      if(a1<b2&&b1<a2){
        alert("⚠️ Cruce de horario con actividad "+(i+1)+":\n"+b.hi+" – "+b.hf+" · "+b.desc.slice(0,40)+"\n\nEl inicio debe ser desde las "+b.hf+" en adelante.");
        return;
      }
    }
    const nuevaHi=r.hf; // la próxima actividad empieza donde esta termina
    setReal(function(prev){return prev.concat([Object.assign({},r,{area:resolveArea(r)})]);});
    setCurrent(Object.assign(emptyCard(),{hi:nuevaHi}));
  }

  function remReal(id){setReal(function(r){return r.filter(function(x){return x.id!==id;});});}

  function resolveArea(item){return item.area===OTRA?(item.otraArea.trim()||"Otra actividad"):item.area;}

  function doSave(){
    if(!tecNombreActivo){alert("No se pudo identificar al usuario.");return;}
    if(!tipo){alert("⚠️ Selecciona el tipo de reporte: Fallo o Ajuste.");return;}
    if(fecha>todayS()){alert("⚠️ La fecha del reporte no puede ser futura.");return;}
    // Intentar agregar la tarjeta actual si tiene contenido
    var allReal=real.slice();
    if(current.desc.trim()){
      var r=current;
      if(!r.hi||!r.hf){alert("Completa hora de inicio y fin de la actividad.");return;}
      if(r.hf<=r.hi){alert("Hora fin debe ser posterior a inicio.");return;}
      var hoy=fecha===todayS();var now=nowT();
      if(hoy&&r.hi>now){alert("Hora inicio no puede ser futura.");return;}
      if(hoy&&r.hf>now){alert("Hora fin no puede ser futura.");return;}
      function toMin(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
      var a1=toMin(r.hi),a2=toMin(r.hf);
      for(var i=0;i<allReal.length;i++){
        var b=allReal[i];var b1=toMin(b.hi),b2=toMin(b.hf);
        if(a1<b2&&b1<a2){alert("⚠️ Cruce de horario con actividad "+(i+1)+":\n"+b.hi+" – "+b.hf+" · "+b.desc.slice(0,40)+"\n\nEl inicio debe ser desde las "+b.hf+" en adelante.");return;}
      }
      allReal=allReal.concat([Object.assign({},r,{area:resolveArea(r)})]);
    }
    if(allReal.length===0){alert("⚠️ Completa al menos una actividad antes de guardar.");return;}
    // ── Validar cruces contra reportes anteriores del mismo técnico y fecha ──
    function toMin2(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
    var tecLabelCheck=tecCode?("M"+tecCode+" · "+tecNombreActivo):tecNombreActivo;
    var historial=(allEntries||[]).filter(function(e){
      return e.fecha===fecha && e.tecnico===tecLabelCheck;
    });
    for(var ni=0;ni<allReal.length;ni++){
      var nr=allReal[ni];
      if(!nr.hi||!nr.hf) continue;
      var na1=toMin2(nr.hi),na2=toMin2(nr.hf);
      for(var ei=0;ei<historial.length;ei++){
        var rep=historial[ei];
        var realizadas=rep.realizadas||[];
        for(var ri=0;ri<realizadas.length;ri++){
          var er=realizadas[ri];
          if(!er.hi||!er.hf) continue;
          var eb1=toMin2(er.hi),eb2=toMin2(er.hf);
          if(na1<eb2&&eb1<na2){
            alert("⚠️ Cruce con un reporte ya guardado:\n"+er.hi+" – "+er.hf+" · "+er.area+"\n\nEsta actividad se solapa con ese rango. Ajusta las horas.");
            return;
          }
        }
      }
    }
    var pends=allReal.filter(function(r){return r.pendiente;}).map(function(r){
      return {id:r.id,area:r.area,desc:r.desc,p:r.p||"Media"};
    });
    var tecLabel=tecCode?("M"+tecCode+" · "+tecNombreActivo):tecNombreActivo;
    onSave({id:gid(),createdAt:ts(),fecha:fecha,turno:turno,tipo:tipo,tecnico:tecLabel,
      realizadas:allReal,pendientes:pends,obs:""});
    // Resetear form para nuevo reporte en la misma sesión
    setReal([]);
    setTipo("");
    setCurrent(emptyCard());
  }
  // ── Formulario de reporte ─────────────────────────────────────────────────
  const sty=cargoActivo?(CARGO_STY[cargoActivo]||{bg:"#e8f0fb",col:NV}):{bg:"#e8f0fb",col:NV};
  const cargoLabel=cargoActivo;
  const maxT=fecha===todayS()?nowT():undefined;
  const minHi=React.useMemo(function(){
    if(real.length===0) return undefined;
    var mx="";
    real.forEach(function(r){if(r.hf&&r.hf>mx)mx=r.hf;});
    return mx||undefined;
  },[real]);
  const initials=tecNombreActivo.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase();

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Técnico banner */}
      <div style={{background:"#fff",border:"2px solid rgba(13,47,92,0.12)",borderRadius:16,padding:"14px 16px",
        display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:42,height:42,borderRadius:11,background:NV,display:"flex",alignItems:"center",
          justifyContent:"center",flexShrink:0}}>
          <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:16}}>{initials}</span>
        </div>
        <div>
          <div style={{fontWeight:700,fontSize:15,color:NV}}>{tecNombreActivo}</div>
          {cargoLabel&&<span style={{background:sty.bg,color:sty.col,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>{cargoLabel}</span>}
          {tecCode&&<span style={{background:"rgba(13,47,92,0.08)",color:NV,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat",marginLeft:cargoLabel?4:0}}>M{tecCode}</span>}
        </div>
      </div>

      {/* Fecha + Turno + Tipo */}
      <div style={{background:"#fff",border:"1.5px solid rgba(13,47,92,0.10)",borderRadius:16,overflow:"hidden"}}>
        <div style={{display:"flex"}}>
          <div style={{flex:1,padding:"12px 14px",borderRight:"1px solid rgba(13,47,92,0.08)"}}>
            <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,color:"#8a96a8",letterSpacing:.5,marginBottom:5}}>FECHA</div>
            <input type="date" className="inp" value={fecha} style={{border:"none",padding:0,background:"transparent",fontSize:14,fontWeight:600,color:NV}}
              min={fechaMin} max={todayS()}
              onChange={function(e){setFecha(e.target.value);}}/>
            {permiteAyer&&fecha===todayS()&&<div style={{fontSize:10,color:"#8a96a8",marginTop:3,fontFamily:"Montserrat"}}>🌙 Turno nocturno: puedes seleccionar ayer si tu actividad fue antes de medianoche</div>}
          </div>
          <div style={{flex:1,padding:"12px 14px",borderRight:"1px solid rgba(13,47,92,0.08)"}}>
            <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,color:"#8a96a8",letterSpacing:.5,marginBottom:5}}>TURNO</div>
            <select className="inp" value={turno} style={{border:"none",padding:0,background:"transparent",fontSize:13,fontWeight:600,color:NV,width:"100%"}}
              onChange={function(e){setTurno(e.target.value);}}>
              {turnosList.map(function(t){return <option key={t}>{t}</option>;})}
            </select>
          </div>
          <div style={{flex:1,padding:"12px 14px",background:!tipo?"rgba(192,0,26,0.03)":"transparent",transition:"background .2s"}}>
            <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,
              color:!tipo?"#C0001A":"#8a96a8",letterSpacing:.5,marginBottom:5}}>
              TIPO <span style={{color:"#C0001A"}}>*</span>
            </div>
            <div style={{display:"flex",gap:5}}>
              {[["fallo","🔴 Fallo","#C0001A","#FFDEDE"],["ajuste","🔧 Ajuste","#004A9E","#D9ECFF"],["preventivo","🔧 Prev.","#1A9647","#e8f5e9"],["otro","⚙️ Otro","#7C3AED","#EDE9FE"]].map(function(op){return(
                <button key={op[0]} onClick={function(){setTipo(tipo===op[0]?"":op[0]);}}
                  style={{flex:1,padding:"5px 0",borderRadius:8,border:"1.5px solid",cursor:"pointer",
                    borderColor:tipo===op[0]?op[2]:(!tipo?"rgba(192,0,26,0.35)":"rgba(13,47,92,0.12)"),
                    background:tipo===op[0]?op[3]:"transparent",
                    fontFamily:"Montserrat",fontWeight:700,fontSize:11,
                    color:tipo===op[0]?op[2]:(!tipo?"#C0001A":"#8a96a8"),transition:"all .15s"}}>
                  {op[1]}
                </button>
              );})}
            </div>
          </div>
        </div>
      </div>

      {/* Tarjeta única activa */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:4,height:18,borderRadius:4,background:"#1D7A3E"}}/>
          <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:13,color:"#1D7A3E",textTransform:"uppercase",letterSpacing:.5}}>Actividad</span>
          {real.length>0&&<span style={{background:"#1D7A3E",color:"#fff",borderRadius:20,fontSize:10,fontWeight:800,fontFamily:"Montserrat",padding:"2px 8px"}}>{real.length} registrada{real.length>1?"s":""}</span>}
        </div>
        <ActivityCard r={current} i={0} isTime={true} aList={aList} OTRA={OTRA} maxT={maxT} minT={minHi}
          onRem={null}
          onUpd={function(k,v){updC(k,v);}}/>
        {real.length>0&&(
          <button onClick={agregarActividad}
            style={{background:"none",border:"none",cursor:"pointer",color:"#2d7dd2",
              fontFamily:"Montserrat",fontWeight:700,fontSize:12,padding:"8px 0",
              textDecoration:"underline",display:"block",marginTop:6}}>
            + Agregar otra actividad
          </button>
        )}
      </div>

      {/* Visor de actividades registradas esta sesión */}
      {real.length>0&&(
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:4,height:18,borderRadius:4,background:"#2d7dd2"}}/>
            <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:13,color:"#2d7dd2",textTransform:"uppercase",letterSpacing:.5}}>Registradas esta sesión</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {real.map(function(r,i){
              return(
                <div key={r.id} style={{background:"#fff",borderRadius:12,
                  border:"1.5px solid "+(r.pendiente?"rgba(196,82,0,0.3)":"rgba(13,47,92,0.10)"),
                  padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
                  <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:11,color:"#8a96a8",
                    minWidth:22,flexShrink:0,paddingTop:2}}>{pad(i+1)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4,alignItems:"center"}}>
                      <span style={{background:"#e8f0fb",color:NV,borderRadius:6,padding:"2px 8px",
                        fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>{r.area}</span>
                      <span style={{background:"#dde8f8",color:"#2d7dd2",borderRadius:6,padding:"2px 8px",
                        fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>{r.hi} – {r.hf}</span>
                      {r.pendiente&&<span style={{background:"#FFF0D9",color:"#C45200",borderRadius:6,
                        padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>⏳ Pendiente</span>}
                      {r.pendiente&&r.p&&<span style={{background:PBG[r.p],color:PCOL[r.p],borderRadius:6,
                        padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>{r.p}</span>}
                    </div>
                    <p style={{margin:0,fontSize:13,color:NV,lineHeight:1.5}}>{r.desc}</p>
                  </div>
                  <button onClick={function(){remReal(r.id);}}
                    style={{background:"none",border:"none",cursor:"pointer",color:"#c7d0dd",
                      padding:2,flexShrink:0,lineHeight:1,fontSize:16}}>✕</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Actions */}
      <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:8}}>
        <button className="btn btn-navy" onClick={doSave}
          style={{padding:"14px",fontSize:14,borderRadius:12}}>
          ✓ Guardar Reporte
        </button>
        <button className="btn btn-ghost" onClick={onCancel}
          style={{padding:"12px",fontSize:13,borderRadius:12}}>
          Cancelar
        </button>
      </div>

      {/* ── Reportes guardados esta sesión ── */}
      {sessionEntries&&sessionEntries.length>0&&(
        <div style={{marginTop:4}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{width:4,height:18,borderRadius:4,background:"#1D7A3E"}}/>
            <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:12,color:"#1D7A3E",
              textTransform:"uppercase",letterSpacing:.5}}>Esta sesión</span>
            <span style={{background:"#1D7A3E",color:"#fff",borderRadius:20,fontSize:10,
              fontWeight:800,fontFamily:"Montserrat",padding:"2px 8px"}}>
              {sessionEntries.length} guardado{sessionEntries.length>1?"s":""}
            </span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {sessionEntries.map(function(e){
              var tipoBg=e.tipo==="fallo"?"#FFDEDE":e.tipo==="ajuste"?"#D9ECFF":e.tipo==="preventivo"?"#e8f5e9":e.tipo==="otro"?"#EDE9FE":"rgba(13,47,92,0.06)";
              var tipoCol=e.tipo==="fallo"?"#C0001A":e.tipo==="ajuste"?"#004A9E":e.tipo==="preventivo"?"#1A9647":e.tipo==="otro"?"#7C3AED":"#8a96a8";
              return(
                <div key={e.id} style={{background:"#fff",borderRadius:12,
                  border:"1.5px solid rgba(29,122,62,0.2)",
                  padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:12,color:NV,flex:1,minWidth:0,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.tecnico}</span>
                    <span style={{background:tipoBg,color:tipoCol,borderRadius:20,
                      fontSize:10,fontWeight:800,fontFamily:"Montserrat",padding:"2px 8px",flexShrink:0}}>
                      {e.tipo==="fallo"?"🔴 Fallo":e.tipo==="ajuste"?"🔧 Ajuste":e.tipo==="preventivo"?"🟢 Prev.":e.tipo==="otro"?"⚙️ Otro":"— Sin tipo"}
                    </span>
                  </div>
                  <div style={{fontSize:11,color:"#8a96a8",display:"flex",gap:8,flexWrap:"wrap"}}>
                    <span>{fD(e.fecha+"T12:00:00")}</span>
                    <span style={{opacity:.4}}>·</span>
                    <span>{e.turno}</span>
                    <span style={{opacity:.4}}>·</span>
                    <span>{fT(e.createdAt)}</span>
                  </div>
                  {e.realizadas.length>0&&(
                    <div style={{display:"flex",flexDirection:"column",gap:5,marginTop:2}}>
                      {e.realizadas.map(function(r,i){return(
                        <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",
                          background:"#f4f7fd",borderRadius:8,padding:"7px 10px"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:r.desc?3:0}}>
                              <span style={{background:"#e8f0fb",color:NV,borderRadius:5,
                                padding:"1px 7px",fontSize:10,fontWeight:700,fontFamily:"Montserrat",
                                whiteSpace:"nowrap",flexShrink:0}}>
                                {r.area}
                              </span>
                              {r.hi&&r.hf&&(
                                <span style={{fontSize:10,fontWeight:700,color:"#2d7dd2",
                                  fontFamily:"Montserrat",whiteSpace:"nowrap"}}>
                                  🕐 {r.hi} – {r.hf}
                                </span>
                              )}
                            </div>
                            {r.desc&&(
                              <p style={{margin:0,fontSize:12,color:"#4a5568",lineHeight:1.45,
                                wordBreak:"break-word"}}>{r.desc}</p>
                            )}
                          </div>
                        </div>
                      );})}
                      {e.pendientes.length>0&&(
                        <div style={{background:"#FFF7ED",borderRadius:8,padding:"6px 10px",
                          display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:11,fontWeight:700,fontFamily:"Montserrat",color:"#C45200"}}>
                            ⏳ {e.pendientes.length} pendiente{e.pendientes.length>1?"s":""}
                          </span>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Sec / ARow ────────────────────────────────────────────────────────────────

  return (
    <div className="card">
      <div className="card-hdr"><span style={{color:props.col,fontWeight:700,fontSize:11,letterSpacing:1,textTransform:"uppercase",fontFamily:"Montserrat"}}>{props.icon} {props.title}</span></div>
      <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:12}}>{props.children}</div>
    </div>
  );
}
function ARow(props){
  return (
    <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:800,color:"#8a96a8",minWidth:22,flexShrink:0,paddingTop:2}}>{pad(props.num)}</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:5}}>
          <ABadge label={props.area}/>
          {props.hi&&props.hf&&<ABadge label={props.hi+" - "+props.hf} col="#2d7dd2" bg="#dde8f8"/>}
          {props.badge}
        </div>
        <p style={{margin:0,color:NV,lineHeight:1.6,fontSize:14,wordBreak:"break-word"}}>{props.desc}</p>
      </div>
    </div>
  );

// ── PendienteThreadModal ──────────────────────────────────────────────────────
function PendienteThreadModal({pendiente, entryId, entryTecnico, entryFecha, initialUser, onAgregarSeguimiento, onCerrarPendiente, onClose}){
  const [desc,setDesc]=useState("");
  const [hi,setHi]=useState("");
  const [hf,setHf]=useState("");
  const [saving,setSaving]=useState(false);
  const segs=pendiente.seguimientos||[];
  const pCerrado=pendiente.cerrado;

  function fmtTs(iso){
    var d=new Date(iso);
    return d.toLocaleDateString("es-CO",{day:"2-digit",month:"short",timeZone:"America/Bogota"})
      +" "+d.toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit",timeZone:"America/Bogota"});
  }

  function hacerSeguimiento(cerrar){
    if(!desc.trim()){alert("Describe qué se hizo.");return;}
    if(!hi||!hf){alert("Ingresa hora de inicio y fin.");return;}
    if(hf<=hi){alert("Hora fin debe ser posterior a inicio.");return;}
    setSaving(true);
    const tecNombre=(initialUser&&(initialUser.nombre||initialUser.username))||"—";
    const seg={id:Math.random().toString(36).slice(2),tecnico:tecNombre,hi:hi,hf:hf,desc:desc.trim(),ts:new Date().toISOString(),cerro:cerrar};
    if(cerrar){
      onCerrarPendiente(entryId,pendiente.id,seg);
      setTimeout(function(){setSaving(false);onClose();},600);
    } else {
      onAgregarSeguimiento(entryId,pendiente.id,seg);
      setDesc("");setHi("");setHf("");setSaving(false);
    }
  }

  return(
    <div className="overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div className="sheet" style={{maxHeight:"88vh"}}>
        <div className="sheet-handle"/>
        <div style={{padding:"14px 18px 10px",borderBottom:"1px solid rgba(13,47,92,0.08)"}}>

              <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:5,flexWrap:"wrap"}}>
                <span style={{background:pCerrado?"#D1F2E0":"#FFF0D9",color:pCerrado?"#1D7A3E":"#C45200",borderRadius:20,fontSize:10,fontWeight:800,fontFamily:"Montserrat",padding:"2px 9px"}}>

              </div>
              <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:14,color:"#0D2F5C",lineHeight:1.35}}>{pendiente.area||pendiente.equipo||"Pendiente"}</div>
              <div style={{fontSize:12,color:"#5C3A00",marginTop:4,lineHeight:1.4}}>{pendiente.desc}</div>

            </div>
            <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:"#8a96a8",fontSize:20,padding:"2px 6px",flexShrink:0}}>×</button>
          </div>
        </div>

            <div style={{textAlign:"center",padding:"18px 0",color:"#b0bac8",fontSize:12,fontFamily:"Montserrat",fontWeight:600}}>Sin seguimientos aún. Sé el primero.</div>
          )}

            <div key={s.id||i} style={{display:"flex",gap:10,marginBottom:12}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>

                  <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:11}}>
                    {s.cerro?"✓":s.tecnico.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2)}
                  </span>
                </div>
                {i<segs.length-1&&<div style={{width:2,flex:1,minHeight:12,background:"rgba(13,47,92,0.10)",borderRadius:1,marginTop:4}}/>}
              </div>
              <div style={{flex:1,minWidth:0,paddingBottom:4}}>

// ── Emoji Reaction System (WhatsApp style) ────────────────────────────────────
var QUICK_EMOJIS=["👍","❤️","😂","😮","😢","🙏","🔥","✅","👀","💪","⚠️","🛠️"];

// Floating emoji picker triggered by long-press
function EmojiPicker({x, y, onSelect, onClose}){
  React.useEffect(function(){
    function handler(e){ onClose(); }
    setTimeout(function(){ document.addEventListener("click",handler,{once:true}); },0);
    return function(){ document.removeEventListener("click",handler); };
  },[]);

  // Keep picker inside viewport
  var style={
    position:"fixed",
    zIndex:99999,
    background:"#fff",
    borderRadius:32,
    boxShadow:"0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.12)",
    border:"1px solid rgba(13,47,92,0.10)",
    padding:"8px 10px",
    display:"flex",
    gap:2,
    flexWrap:"nowrap",
    animation:"emojiPickerIn 0.18s cubic-bezier(0.34,1.56,0.64,1)",
  };
  // position: try above the press point
  var top=y-70; var left=x-120;
  if(top<10) top=y+20;
  if(left<8) left=8;
  if(left+280>window.innerWidth) left=window.innerWidth-290;
  style.top=top; style.left=left;

  // Use portal to escape overflow:hidden and will-change:transform stacking contexts
  return ReactDOM.createPortal(
    <div style={style} onClick={function(ev){ev.stopPropagation();}}>
      {QUICK_EMOJIS.map(function(em){
        return(
          <button key={em} onClick={function(ev){ev.stopPropagation();onSelect(em);}}
            style={{background:"none",border:"none",cursor:"pointer",
              fontSize:26,lineHeight:1,padding:"4px 5px",borderRadius:12,
              transition:"transform 0.12s",
            }}
            onMouseEnter={function(e){e.currentTarget.style.transform="scale(1.35) translateY(-4px)";e.currentTarget.style.background="rgba(13,47,92,0.07)";}}
            onMouseLeave={function(e){e.currentTarget.style.transform="scale(1)";e.currentTarget.style.background="none";}}>
            {em}
          </button>
        );
      })}
    </div>,
    document.body
  );
}

// Hook: long-press → fires callback with pointer position
function useLongPress(onLongPress, ms){
  ms=ms||500;
  var timerRef=React.useRef(null);
  var posRef=React.useRef({x:0,y:0});
  var firedRef=React.useRef(false);

  function start(ev){
    var src=ev.touches?ev.touches[0]:ev;
    posRef.current={x:src.clientX,y:src.clientY};
    firedRef.current=false;
    timerRef.current=setTimeout(function(){
      firedRef.current=true;
      if(navigator.vibrate) navigator.vibrate(30);
      onLongPress(posRef.current.x,posRef.current.y);
    },ms);
  }
  function cancel(ev){
    clearTimeout(timerRef.current);
  }
  function click(ev){
    if(firedRef.current){ ev.preventDefault(); ev.stopPropagation(); }
  }
  return{
    onMouseDown:start, onMouseUp:cancel, onMouseLeave:cancel,
    onTouchStart:start, onTouchEnd:cancel, onTouchMove:cancel,
    onClick:click,
  };
}

                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{e.tecnico}</div>
              <span style={{
                background:e.tipo==="fallo"?"rgba(192,0,26,0.55)":e.tipo==="ajuste"?"rgba(0,74,158,0.55)":e.tipo==="preventivo"?"rgba(26,150,71,0.55)":e.tipo==="otro"?"rgba(124,58,237,0.55)":"rgba(255,255,255,0.12)",
                color:e.tipo==="fallo"?"#fca5a5":e.tipo==="ajuste"?"#93c5fd":e.tipo==="preventivo"?"#86efac":e.tipo==="otro"?"#c4b5fd":"rgba(255,255,255,0.4)",
                border:"1px solid "+(e.tipo==="fallo"?"rgba(252,165,165,0.35)":e.tipo==="ajuste"?"rgba(147,197,253,0.35)":e.tipo==="preventivo"?"rgba(134,239,172,0.35)":e.tipo==="otro"?"rgba(196,181,253,0.35)":"rgba(255,255,255,0.15)"),
                padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:800,fontFamily:"Montserrat",
                letterSpacing:0.3,flexShrink:0,whiteSpace:"nowrap"}}>
                {e.tipo==="fallo"?"🔴 Fallo":e.tipo==="ajuste"?"🔧 Ajuste":e.tipo==="preventivo"?"🟢 Prev.":e.tipo==="otro"?"⚙️ Otro":"— Sin tipo"}
              </span>
            </div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.5)",marginTop:2,display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>

              padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>
              ✓{e.realizadas.length}</span>}
            {pendientes.length>0&&<span style={{background:hiA>0?"rgba(192,0,26,0.4)":"rgba(196,82,0,0.4)",
              color:hiA>0?"#fca5a5":"#fdba74",
              padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>
              ⏳{pendientesAbiertos.length}</span>}
            {confs.length>0&&<span style={{background:"rgba(29,122,62,0.5)",color:"#6ee7a0",
              padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>
              ✓</span>}
            {comentarios.length>0&&<span style={{background:"rgba(45,125,210,0.45)",color:"#93c5fd",
              padding:"2px 7px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>
              💬{comentarios.length}</span>}
            <span style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginLeft:2}}>{open?"▲":"▼"}</span>
          </div>
        </div>
      </div>

      {/* ── Body colapsable ── */}
      {open&&(
        <div style={{padding:"12px 14px",display:"flex",flexDirection:"column",gap:12}}>

          {/* Actividades realizadas */}
          {e.realizadas.length>0&&(
            <div>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <div style={{width:3,height:12,borderRadius:2,background:"#1D7A3E"}}/>
                <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:10,color:"#1D7A3E",
                  textTransform:"uppercase",letterSpacing:.8}}>Realizadas</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:0}}>
                {e.realizadas.map(function(r,i){
                  var esPend=r.pendiente;
                  return(
                    <div key={r.id||i} style={{
                      display:"flex",gap:10,
                      padding:"8px 0",
                      borderBottom:i<e.realizadas.length-1?"1px solid rgba(13,47,92,0.05)":"none"}}>
                      {/* Número */}
                      <div style={{width:20,height:20,borderRadius:6,background:esPend?"#FFF0D9":"#e8f0fb",
                        display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                        <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:10,
                          color:esPend?"#C45200":NV}}>{i+1}</span>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        {/* Área + horas en una fila */}
                        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:r.desc?4:0}}>
                          <span style={{background:"#e8f0fb",color:NV,borderRadius:6,
                            padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>{r.area}</span>
                          {r.hi&&r.hf&&<span style={{background:"#dde8f8",color:"#2d7dd2",borderRadius:6,
                            padding:"2px 8px",fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>
                            {r.hi} – {r.hf}</span>}
                          {esPend&&<span style={{background:"#FFF0D9",color:"#C45200",borderRadius:6,
                            padding:"2px 8px",fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>⏳ Pendiente</span>}
                        </div>
                        {r.desc&&<p style={{margin:0,fontSize:13,color:"#3C3C43",lineHeight:1.5}}>{r.desc}</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Pendientes */}
          {pendientes.length>0&&(
            <div style={{background:"#FFF8F0",borderRadius:10,border:"1px solid rgba(196,82,0,0.15)",padding:"10px 12px"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                <div style={{width:3,height:12,borderRadius:2,background:"#C45200"}}/>
                <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:10,color:"#C45200",textTransform:"uppercase",letterSpacing:.8}}>Pendientes</span>
                {pendientesAbiertos.length<pendientes.length&&(
                  <span style={{marginLeft:"auto",background:"#D1F2E0",color:"#1D7A3E",borderRadius:20,fontSize:9,fontWeight:800,fontFamily:"Montserrat",padding:"1px 7px"}}>
                    {pendientes.length-pendientesAbiertos.length} cerrado{pendientes.length-pendientesAbiertos.length>1?"s":""}
                  </span>
                )}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {pendientes.map(function(p,i){
                  var cerrado=p.cerrado;
                  var segs=p.seguimientos||[];
                  var lastSeg=segs.length>0?segs[segs.length-1]:null;
                  function fmtRelTs(iso){
                    if(!iso) return "";
                    var d=new Date(iso);var now=new Date();
                    var diff=Math.floor((now-d)/1000);
                    if(diff<60) return "hace "+diff+"s";
                    if(diff<3600) return "hace "+Math.floor(diff/60)+"min";
                    if(diff<86400) return "hace "+Math.floor(diff/3600)+"h";
                    return "hace "+Math.floor(diff/86400)+"d";
                  }
                  return(
                    <div key={p.id||i} style={{background:cerrado?"rgba(29,122,62,0.05)":"rgba(196,82,0,0.04)",borderRadius:8,border:"1.5px solid "+(cerrado?"rgba(29,122,62,0.18)":"rgba(196,82,0,0.18)"),overflow:"hidden",borderLeft:"3px solid "+(cerrado?"#1D7A3E":p.p==="Alta"?"#C0001A":p.p==="Media"?"#C45200":"#8a96a8")}}>
                      <div style={{padding:"8px 10px"}}>
                        <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:p.desc?3:0,alignItems:"center"}}>
                              <span style={{background:cerrado?"#D1F2E0":"rgba(13,47,92,0.08)",color:cerrado?"#1D7A3E":"#0D2F5C",borderRadius:6,padding:"2px 7px",fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>
                                {cerrado?"✅ ":""}{p.equipo&&p.equipo.trim()?p.equipo:p.area}</span>
                              {!cerrado&&<span style={{background:PBG[p.p],color:PCOL[p.p],borderRadius:6,padding:"2px 7px",fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>{p.p}</span>}
                              {segs.length>0&&<span style={{background:"#e8f0fb",color:"#2d7dd2",borderRadius:6,padding:"1px 6px",fontSize:9,fontWeight:700,fontFamily:"Montserrat"}}>{segs.length} seg.</span>}
                            </div>
                            {p.desc&&<p style={{margin:0,fontSize:13,color:cerrado?"#5a6a7a":"#5C3A00",lineHeight:1.4}}>{p.desc}</p>}
                          </div>
                          {(onAgregarSeguimiento||onCerrarPendiente)&&(
                            <button onClick={function(){setThreadPend(p);}}
                              style={{background:cerrado?"#e8f0fb":"#FFF0D9",border:"1px solid "+(cerrado?"rgba(13,47,92,0.12)":"rgba(196,82,0,0.2)"),borderRadius:8,padding:"5px 10px",cursor:"pointer",color:cerrado?"#0D2F5C":"#C45200",fontFamily:"Montserrat",fontWeight:800,fontSize:10,flexShrink:0,whiteSpace:"nowrap"}}>
                              {cerrado?"Ver →":"Gestionar →"}
                            </button>
                          )}
                        </div>
                      </div>
                      {/* Último seguimiento inline */}
                      {lastSeg&&(
                        <div style={{background:cerrado?"rgba(29,122,62,0.05)":"rgba(255,255,255,0.7)",borderTop:"1px solid "+(cerrado?"rgba(29,122,62,0.10)":"rgba(196,82,0,0.08)"),padding:"6px 10px",display:"flex",gap:7,alignItems:"flex-start"}}>
                          <div style={{width:20,height:20,borderRadius:10,background:lastSeg.cerro?"#1D7A3E":"#0D2F5C",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                            <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:9}}>
                              {lastSeg.tecnico.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase().slice(0,2)}
                            </span>
                          </div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
                              <span style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,color:"#0D2F5C"}}>{lastSeg.tecnico}</span>
                              <span style={{background:"#e8f0fb",color:"#2d7dd2",borderRadius:4,padding:"0 5px",fontSize:9,fontWeight:700,fontFamily:"Montserrat"}}>{lastSeg.hi}–{lastSeg.hf}</span>
                              <span style={{fontSize:9,color:"#b0bac8",fontFamily:"Montserrat"}}>{fmtRelTs(lastSeg.ts)}</span>
                              {lastSeg.cerro&&<span style={{background:"#D1F2E0",color:"#1D7A3E",borderRadius:4,padding:"0 5px",fontSize:9,fontWeight:800,fontFamily:"Montserrat"}}>✅ Cerró</span>}
                            </div>
                            <div style={{fontSize:11,color:"#3C3C43",lineHeight:1.35,marginTop:1}}>{lastSeg.desc}</div>
                          </div>
                        </div>
                      )}
                      {!lastSeg&&!cerrado&&(
                        <div style={{background:"rgba(196,82,0,0.03)",borderTop:"1px solid rgba(196,82,0,0.08)",padding:"5px 10px",fontSize:10,color:"#b0bac8",fontFamily:"Montserrat",fontWeight:600,fontStyle:"italic"}}>
                          Sin seguimientos aún
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {threadPend&&(function(){
            var livePend=(e.pendientes||[]).find(function(p){return p.id===threadPend.id;})||threadPend;
            return(
              <PendienteThreadModal
                pendiente={livePend}
                entryId={e.id}
                entryTecnico={e.tecnico}
                entryFecha={e.fecha}
                initialUser={initialUser}
                onAgregarSeguimiento={onAgregarSeguimiento}
                onCerrarPendiente={onCerrarPendiente}
                onClose={function(){setThreadPend(null);}}
              />
            );
          })()}

          {/* Confirmaciones */}
          {(confs.length>0||puedeConfirmar)&&(
            <div style={{borderTop:"1px solid rgba(13,47,92,0.07)",paddingTop:10,
              display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              {confs.length>0&&(
                <div style={{display:"flex",gap:6,alignItems:"center",flex:1,flexWrap:"wrap"}}>
                  {confs.map(function(c,i){
                    var ini=c.nombre.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase();
                    return(
                      <div key={i} title={c.nombre+" · "+fmtConf(c.fecha)}
                        style={{display:"flex",alignItems:"center",gap:5,
                          background:"#D1F2E0",borderRadius:20,padding:"3px 10px 3px 4px"}}>
                        <div style={{width:20,height:20,borderRadius:10,background:"#1D7A3E",
                          display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:9}}>{ini}</span>
                        </div>
                        <span style={{fontSize:11,fontWeight:700,color:"#1D7A3E",fontFamily:"Montserrat"}}>{c.nombre.split(" ")[0]}</span>
                        <span style={{fontSize:10,color:"rgba(29,122,62,0.6)"}}>{fmtConf(c.fecha)}</span>
                      </div>
                    );
                  })}
                </div>
              )}
              {puedeConfirmar&&!yaConfirmó&&onConfirmar&&(
                <button onClick={function(){onConfirmar(e.id);}}
                  style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid #1D7A3E",
                    background:"#fff",color:"#1D7A3E",cursor:"pointer",
                    fontFamily:"Montserrat",fontWeight:800,fontSize:11,
                    display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
                  <span>✓</span> Confirmar lectura
                </button>
              )}
              {puedeConfirmar&&yaConfirmó&&confs.length===0&&(
                <span style={{fontSize:11,color:"#1D7A3E",fontWeight:700,fontFamily:"Montserrat"}}>✓ Confirmado</span>
              )}
            </div>
          )}

          {/* ── Reacciones del reporte (chips) ── */}
          {onToggleReaccionEntry&&(
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <ReactionChips
                reacciones={e.reacciones||{}}
                onToggle={function(em){onToggleReaccionEntry(e.id,em);}}
                initialUser={initialUser}
              />
              <button
                onClick={function(ev){
                  ev.stopPropagation();
                  var r=ev.currentTarget.getBoundingClientRect();
                  setPicker({type:"entry",x:r.left,y:r.top});
                }}
                title="Reaccionar"
                style={{background:"rgba(13,47,92,0.07)",border:"1.5px solid rgba(13,47,92,0.12)",
                  borderRadius:20,padding:"2px 8px",cursor:"pointer",fontSize:14,lineHeight:1,
                  color:"#8a96a8",display:"flex",alignItems:"center",gap:3,transition:"all 0.15s"}}
                onMouseEnter={function(ev){ev.currentTarget.style.background="rgba(13,47,92,0.14)";ev.currentTarget.style.color="#0D2F5C";}}
                onMouseLeave={function(ev){ev.currentTarget.style.background="rgba(13,47,92,0.07)";ev.currentTarget.style.color="#8a96a8";}}>
                <span>😊</span><span style={{fontSize:10,fontFamily:"Montserrat",fontWeight:700}}>+</span>
              </button>
            </div>
          )}

          {/* ── Comentarios / Respuestas ── */}
          {(comentarios.length>0||puedeCommentar)&&(
            <div onClick={function(ev){ev.stopPropagation();}} style={{borderTop:"1px solid rgba(13,47,92,0.07)",paddingTop:10}}>
              {/* Header toggle */}
              <button onClick={function(ev){ev.stopPropagation();setShowComments(function(v){return !v;});}}

                style={{background:"none",border:"none",cursor:"pointer",padding:"0 0 8px",
                  display:"flex",alignItems:"center",gap:7,width:"100%",textAlign:"left"}}>
                <span style={{fontSize:14}}>💬</span>
                <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:11,color:NV,
                  textTransform:"uppercase",letterSpacing:.6}}>
                  Comentarios
                  {comentarios.length>0&&(
                    <span style={{marginLeft:6,background:"#e8f0fb",color:NV,
                      borderRadius:10,padding:"1px 7px",fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>
                      {comentarios.length}
                    </span>
                  )}
                </span>
                <span style={{marginLeft:"auto",color:"#b0bac8",fontSize:11}}>{showComments?"▲":"▼"}</span>
              </button>

              {showComments&&(
                <div onClick={function(ev){ev.stopPropagation();}} style={{display:"flex",flexDirection:"column",gap:8}}>
                  {/* Lista de comentarios */}
                  {comentarios.map(function(c,i){
                    return(
                      <CommentBubble
                        key={c.id||i}
                        c={c}
                        i={i}
                        entryId={e.id}
                        initialUser={initialUser}
                        onToggleReaccionComment={onToggleReaccionComment}
                        fmtCom={fmtCom}
                        setPicker={setPicker}
                      />
                    );
                  })}

                  {/* Input nuevo comentario */}
                  {puedeCommentar&&(
                    <div style={{display:"flex",gap:8,alignItems:"flex-end",marginTop:4}}>
                      <textarea
                        value={nuevoComentario}
                        onChange={function(ev){setNuevoComentario(ev.target.value);}}
                        onKeyDown={function(ev){if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();enviarComentario();}}}
                        placeholder="Escribe un comentario…"
                        rows={2}
                        style={{flex:1,resize:"none",border:"1.5px solid rgba(13,47,92,0.15)",borderRadius:10,
                          padding:"8px 10px",fontSize:13,fontFamily:"Inter,sans-serif",color:NV,
                          background:"#f4f7fd",outline:"none",lineHeight:1.4}}
                      />
                      <button onClick={enviarComentario}
                        disabled={!nuevoComentario.trim()||sendingCom}
                        style={{
                          background:NV,border:"none",borderRadius:10,
                          width:40,height:40,flexShrink:0,cursor:"pointer",
                          display:"flex",alignItems:"center",justifyContent:"center",
                          opacity:!nuevoComentario.trim()||sendingCom?0.4:1,
                          transition:"opacity .15s"
                        }}>
                        <span style={{fontSize:16}}>↑</span>
                      </button>
                    </div>
                  )}

                </div>
              )}
            </div>
          )}

          {onPrint&&(
            <button onClick={function(){onPrint(e);}}
              style={{background:"none",border:"none",padding:"4px 0",cursor:"pointer",
                color:"#b0bac8",fontFamily:"Montserrat",fontSize:11,fontWeight:700,
                alignSelf:"flex-end",display:"flex",alignItems:"center",gap:4}}>
              <Ico d={IC.print} sz={11} c="#b0bac8"/>Imprimir
            </button>
          )}
        </div>
      )}
    </div>
  );
}

              color:e.tipo==="fallo"?"#C0001A":e.tipo==="preventivo"?"#1A9647":e.tipo==="otro"?"#7C3AED":"#004A9E",
              border:"1px solid "+(e.tipo==="fallo"?"rgba(192,0,26,0.2)":e.tipo==="preventivo"?"rgba(26,150,71,0.2)":e.tipo==="otro"?"rgba(124,58,237,0.2)":"rgba(0,74,158,0.2)"),
              padding:"2px 9px",borderRadius:20,fontSize:11,fontWeight:800,fontFamily:"Montserrat",letterSpacing:0.2}}>
              {e.tipo==="fallo"?"🔴 Fallo":e.tipo==="preventivo"?"🟢 Preventivo":e.tipo==="otro"?"⚙️ Otro":"🔧 Ajuste"}

          )}
          <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,color:"#1D7A3E",fontWeight:600}}>
            <Ico d={IC.check} sz={12} c="#1D7A3E"/>{e.realizadas.length} realizadas
          </span>
          {hp&&(
            <span style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,color:"#C45200",fontWeight:600}}>
              <Ico d={IC.alert} sz={12} c="#C45200"/>{e.pendientes.length} pendientes
              {hi>0&&<span style={{background:"#FFDEDE",color:"#C0001A",padding:"2px 7px",borderRadius:10,fontSize:10,fontWeight:800,fontFamily:"Montserrat"}}>{hi} alta</span>}
            </span>
          )}
        </div>
      </div>
    </div>
  );
}

// ── ReportesView ──────────────────────────────────────────────────────────────
function ReportesView(props){
  const [q,setQ]=useState("");
  const [trn,setTrn]=useState("Todos");
  const [ar,setAr]=useState("Todas");
  const [pr,setPr]=useState("Todas");
  const [sp,setSp]=useState(props.filtroInicial==="pendientes");
  const [sv,setSv]=useState(false);
  const [tp,setTp]=useState("todos"); // "todos"|"fallo"|"ajuste"|"sin_tipo" // solo no verificados
  const [de,setDe]=useState(""); const [ha,setHa]=useState("");
  const [exp,setExp]=useState({});
  const [sf,setSf]=useState(false);
  const [sortBy,setSortBy]=useState("fecha_desc");   // campo de orden
  // sortBy opciones: fecha_desc|fecha_asc|persona_az|persona_za|turno_az|turno_za|horas_desc|horas_asc

  function toggleExp(id){const n=Object.assign({},exp);n[id]=!n[id];setExp(n);}
  function reset(){setQ("");setTrn("Todos");setAr("Todas");setPr("Todas");setSp(false);setSv(false);setTp("todos");setDe("");setHa("");setSortBy("fecha_desc");}
  const fa=!!(q||trn!=="Todos"||ar!=="Todas"||pr!=="Todas"||sp||sv||tp!=="todos"||de||ha||sortBy!=="fecha_desc");

  const entries=props.entries;
  const allAreas=[];
  entries.forEach(function(e){
    e.realizadas.forEach(function(r){if(allAreas.indexOf(r.area)<0)allAreas.push(r.area);});
    e.pendientes.forEach(function(p){if(allAreas.indexOf(p.area)<0)allAreas.push(p.area);});
  });
  allAreas.sort();

  function getTotalHoras(e){
    var mins=0;
    (e.realizadas||[]).forEach(function(r){
      if(r.hi&&r.hf){
        var p1=r.hi.split(":"),p2=r.hf.split(":");
        var d=(parseInt(p2[0])*60+parseInt(p2[1]))-(parseInt(p1[0])*60+parseInt(p1[1]));
        if(d>0)mins+=d;
      }
    });
    return mins;
  }

  const fil=entries.slice().filter(function(e){
    const ql=q.toLowerCase();

      ||e.realizadas.some(function(r){return r.desc.toLowerCase().indexOf(ql)>=0||r.area.toLowerCase().indexOf(ql)>=0;})
      ||(e.pendientes||[]).some(function(p){return p.desc.toLowerCase().indexOf(ql)>=0;})
      ||(e.obs||"").toLowerCase().indexOf(ql)>=0))return false;
    if(trn!=="Todos"&&e.turno!==trn)return false;
    if(ar!=="Todas"&&!e.realizadas.some(function(r){return r.area===ar;})&&!(e.pendientes||[]).some(function(p){return p.area===ar;}))return false;
    if(pr!=="Todas"&&!(e.pendientes||[]).some(function(p){return p.p===pr;}))return false;
    if(sp&&(e.pendientes||[]).filter(function(p){return !p.cerrado;}).length===0)return false;
    if(sv&&(e.confirmaciones||[]).length>0)return false;
    if(tp==="fallo"&&e.tipo!=="fallo")return false;

    if(tp==="preventivo"&&e.tipo!=="preventivo")return false;
    if(tp==="otro"&&e.tipo!=="otro")return false;
    if(tp==="sin_tipo"&&e.tipo)return false;
    if(de&&e.fecha<de)return false;
    if(ha&&e.fecha>ha)return false;
    return true;
  }).sort(function(a,b){
    switch(sortBy){
      case "fecha_asc":   return new Date(a.createdAt)-new Date(b.createdAt);
      case "persona_az":  return a.tecnico.localeCompare(b.tecnico);
      case "persona_za":  return b.tecnico.localeCompare(a.tecnico);
      case "turno_az":    return (a.turno||"").localeCompare(b.turno||"");
      case "turno_za":    return (b.turno||"").localeCompare(a.turno||"");
      case "horas_desc":  return getTotalHoras(b)-getTotalHoras(a);
      case "horas_asc":   return getTotalHoras(a)-getTotalHoras(b);
      default:            return new Date(b.createdAt)-new Date(a.createdAt); // fecha_desc
    }
  });

  return (

function BarHorizontal({data, unitY, maxVal, onSelect, selected}){
  if(!data||data.length===0) return <span style={{color:"#8a96a8",fontSize:13}}>Sin datos</span>;
  const mx=maxVal||Math.max.apply(null,data.map(function(d){return d.val;}),1);
  const ticks=[0,Math.round(mx/4),Math.round(mx/2),Math.round(mx*3/4),mx].filter(function(v,i,a){return a.indexOf(v)===i;});
  return(
    <div>
      <div style={{fontSize:10,color:"#b0bac8",fontFamily:"Montserrat",fontWeight:700,
        textTransform:"uppercase",letterSpacing:.8,marginBottom:8,textAlign:"right"}}>
        {unitY}
      </div>
      {data.map(function(d,i){
        const pct=Math.round((d.val/mx)*100);
        const isSelected=selected===d.lbl;
        const isOther=selected&&!isSelected;
        const col=d.color||"#2d7dd2";
        return(
          <div key={d.lbl}
            onClick={function(){if(onSelect) onSelect(isSelected?null:d.lbl);}}
            style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,
              cursor:onSelect?"pointer":"default",
              opacity:isOther?0.4:1,
              transition:"opacity .2s"}}>
            {/* Chip de color del equipo */}
            <div style={{width:8,height:8,borderRadius:2,background:col,flexShrink:0,
              boxShadow:isSelected?"0 0 0 3px "+col+"44":"none",
              transition:"box-shadow .2s"}}/>
            <span style={{fontSize:11,color:isSelected?col:"#555",width:"36%",maxWidth:120,minWidth:0,
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
              flexShrink:0,textAlign:"right",fontWeight:isSelected?800:600,
              transition:"color .2s"}}
              title={d.lbl}>{d.lbl}</span>
            <div style={{flex:1,position:"relative",height:14,minWidth:0}}>
              <div style={{position:"absolute",inset:0,background:"#f0f4fa",borderRadius:7}}/>
              <div style={{position:"absolute",top:0,left:0,height:"100%",
                width:pct+"%",
                background:col,
                opacity:isOther?0.5:1,
                borderRadius:7,transition:"width .5s cubic-bezier(.25,.46,.45,.94)",
                boxShadow:isSelected?"0 0 0 2px "+col+"55":"none"}}/>
            </div>
            <span style={{fontFamily:"Montserrat",fontSize:12,fontWeight:800,
              color:isSelected?col:(col+"cc"),minWidth:52,textAlign:"left",
              flexShrink:0}}>{d.display||d.val} <span style={{fontWeight:500,fontSize:10,color:"#b0bac8"}}>{d.unit||""}</span></span>
          </div>
        );
      })}
      <div style={{display:"flex",justifyContent:"space-between",paddingLeft:"calc(38% + 24px)",marginTop:4}}>
        {ticks.map(function(t){return(
          <span key={t} style={{fontSize:9,color:"#c7d0dd",fontFamily:"Montserrat",fontWeight:600}}>{t}</span>
        );})}
      </div>
      <div style={{height:1,background:"#e8f0fb",marginLeft:"calc(38% + 24px)",marginTop:2}}/>
      <div style={{fontSize:9,color:"#c7d0dd",fontFamily:"Montserrat",marginLeft:"calc(38% + 24px)",marginTop:3}}>
        {unitY} →
      </div>
    </div>
  );
}

function TecnicosCard({entries, fmFn, dmFn}){
  const TURNO_COLS=["#2d7dd2","#C45200","#6366f1","#1D7A3E","#7C3AED","#B45309"];
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [custom,setCustom]=useState(false);

  const hoy=new Date();

  // Filtrar por fechas propias
  const filtered=entries.filter(function(e){
    if(!custom||(!desde&&!hasta))return true;
    var d=new Date(e.createdAt);
    if(desde&&d<new Date(desde+"T00:00:00"))return false;
    if(hasta&&d>new Date(hasta+"T23:59:59"))return false;
    return true;
  });

  // Turno únicos en el período
  const turnosUnicos=Array.from(new Set(filtered.map(function(e){return e.turno;}).filter(Boolean))).sort();

  // Mapa: técnico → turno → { reportes, min, dias }
  const tecMap={};
  filtered.forEach(function(entry){
    var tec=entry.tecnico||"Sin nombre";
    var turno=entry.turno||"Sin turno";
    if(!tecMap[tec])tecMap[tec]={};
    if(!tecMap[tec][turno])tecMap[tec][turno]={reportes:0,min:0,dias:new Set()};
    tecMap[tec][turno].reportes++;
    tecMap[tec][turno].dias.add(entry.fecha);
    entry.realizadas.forEach(function(r){tecMap[tec][turno].min+=dmFn(r.hi,r.hf);});
  });

  const tecList=Object.entries(tecMap).sort(function(a,b){
    var tA=Object.values(a[1]).reduce(function(s,v){return s+v.reportes;},0);
    var tB=Object.values(b[1]).reduce(function(s,v){return s+v.reportes;},0);
    return tB-tA;
  });

  const maxMin=Math.max.apply(null,tecList.map(function(kv){
    return Object.values(kv[1]).reduce(function(s,v){return s+v.min;},0);
  }),1);

  const labelPeriodo=custom&&desde
    ?(desde+(hasta?" al "+hasta:" en adelante"))
    :"Todo el historial";

  return(
    <AnalCard title="Técnicos por turno" icon={IC.user} col="#2d7dd2">

      {/* Selector de fechas interno */}
