<script>
  // ── EmailJS config ──────────────────────────────────────────────────────────
  // 1. Crea cuenta en https://www.emailjs.com  (gratis, 200 correos/mes)
  // 2. Crea un "Email Service" (Gmail, Outlook, etc.) → copia el Service ID
  // 3. Crea un "Email Template" con estas variables:
  //      {{to_email}}  {{item_name}}  {{solicitante}}  {{equipo}}  {{cantidad}}  {{unidad}}  {{notas}}  {{fecha}}
  // 4. Reemplaza los tres valores de abajo:
  const EMAILJS_PUBLIC_KEY  = "K47l1qYxSjCG5Es6A";
  const EMAILJS_SERVICE_ID  = "service_cshyh3p";
  const EMAILJS_TEMPLATE_ID = "template_tdd0svq";

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

  // ── Configuración de correo (persiste en localStorage) ──────────────────────
  const EMAIL_CONFIG_KEY = "bussie_email_config";
  window.getEmailConfig = function() {
    try {
      const raw = localStorage.getItem(EMAIL_CONFIG_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // Migrar formato antiguo (un solo correo)
        if(parsed.correo && !parsed.correos) {
          parsed.correos = [
            { email: parsed.correo, activo: true },
            { email: "", activo: false }
          ];
        }
        return parsed;
      }
    } catch(e) {}
    return {
      habilitado: true,
      correos: [
        { email: "victor.veru@bussie.com.co", activo: true },
        { email: "", activo: false }
      ]
    };
  };
  window.setEmailConfig = function(cfg) {
    localStorage.setItem(EMAIL_CONFIG_KEY, JSON.stringify(cfg));
  };

  window.notificarCompra = async function(soli) {
    const cfg = window.getEmailConfig();
    if (!cfg.habilitado) { console.log("📭 Notificación de correo desactivada."); return; }
    const destinos = (cfg.correos||[]).filter(c => c.activo && c.email && c.email.includes("@"));
    if (destinos.length === 0) { console.warn("⚠️ Sin correos destino activos."); return; }
    const payload = {
      item_name:   soli.item_name   || "—",
      solicitante: soli.solicitante_name || "—",
      equipo:      soli.equipo_name || "—",
      cantidad:    soli.quantity    || "—",
      unidad:      soli.unidad || soli.unit || "",
      notas:       (soli.consecutivo ? "Solicitud: " + soli.consecutivo + "\n" : "") + (soli.notes || "Sin notas"),
      fecha:       new Date().toLocaleString("es-CO",{timeZone:"America/Bogota"}),
    };
    await Promise.all(destinos.map(d =>
      emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { ...payload, to_email: d.email })
        .then(()  => console.log("✅ Correo enviado a", d.email))
        .catch(err => console.warn("⚠️ No se pudo enviar a", d.email, err))
    ));
  };

  window.notificarSolicitante = async function(tipo, soli, emailDestino) {
    if(!emailDestino || !emailDestino.includes("@")) return;
    const esConfirmacion = tipo === "confirmacion";
    const numSoli = soli.consecutivo || ("#" + (soli.id||"").toString().slice(-4));
    const payload = {
      to_email:    emailDestino,
      item_name:   soli.item_name   || "—",
      solicitante: soli.solicitante_name || soli.solicitante || "—",
      cantidad:    soli.quantity    || "—",
      unidad:      soli.unidad || soli.unit || "",
      equipo:      soli.equipo_name || "—",
      notas:       "Solicitud: " + numSoli + "\n" + (esConfirmacion
        ? "Tu solicitud fue recibida y está siendo procesada."
        : "Tu material ya está disponible en almacén. Pasa a recogerlo."),
      fecha:       new Date().toLocaleString("es-CO",{timeZone:"America/Bogota"}),
    };
    try {
      await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, payload);
      console.log("✅ Notificación solicitante enviada a:", emailDestino);
    } catch(err) {
      console.warn("⚠️ No se pudo notificar al solicitante:", err);
    }
  };
</script>
<style>
:root{
  --navy:#0D2F5C;
  --navy-deep:#091f3e;
  --navy-mid:#1a4a82;
  --accent:#2d7dd2;
  --light:#e8f0fb;
  --lighter:#f4f7fd;
  --gray:#8a96a8;
  --border:rgba(13,47,92,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:var(--lighter);
  font-family:'Inter','Helvetica Neue',sans-serif;
  color:var(--navy);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(13,47,92,0.2);border-radius:4px;}
input,select,textarea,button{font-family:inherit;outline:none;}

/* iOS Navigation Bar */
.brand-bar{
  background:var(--navy);
  padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand-bar-logo{height:56px;width:auto;display:block;}
.brand-bar-label{font-family:"Montserrat",sans-serif;font-size:10px;font-weight:700;
  color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:1.5px;}
.nav-bar{
  background:rgba(255,255,255,0.97);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:2px solid var(--navy);
  padding:12px 20px 10px;
}
.nav-title{font-size:22px;font-weight:800;letter-spacing:0.5px;color:var(--navy);font-family:"Montserrat",sans-serif;text-transform:uppercase;}
.nav-subtitle{font-size:11px;color:var(--gray);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:0.8px;}

/* Segmented Control (iOS tabs) */
.seg-ctrl{
  display:flex;background:var(--light);border-radius:9px;padding:2px;gap:0;
}
.seg-btn{
  flex:1;padding:7px 12px;border:none;background:transparent;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--navy);border-radius:7px;
  transition:all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);letter-spacing:0.3px;font-family:"Montserrat",sans-serif;text-transform:uppercase;
}
.seg-btn.active{
  background:var(--navy);color:#fff;
  box-shadow:0 2px 12px rgba(13,47,92,0.25);
}

/* Segmented control local a un módulo (p.ej. Mantenimientos: Calendario/Órdenes/Cumplimiento).
   Clases propias para que las reglas de escritorio del sidebar (.seg-ctrl/.seg-btn) no lo afecten. */
.mtto-tabs{
  display:flex;background:var(--light);border-radius:9px;padding:2px;gap:0;
}
.mtto-tab-btn{
  flex:1;padding:7px 12px;border:none;background:transparent;cursor:pointer;
  font-size:12px;font-weight:700;color:var(--navy);border-radius:7px;
  transition:all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);letter-spacing:0.3px;font-family:"Montserrat",sans-serif;text-transform:uppercase;
}
.mtto-tab-btn.active{
  background:var(--navy);color:#fff;
  box-shadow:0 2px 12px rgba(13,47,92,0.25);
}

/* Cards */
.ios-card{
  background:#fff;border-radius:12px;
  box-shadow:0 2px 16px rgba(13,47,92,0.08),0 0.5px 2px rgba(13,47,92,0.06);
  overflow:hidden;border:1px solid var(--border);
}
.ios-card-inset{
  background:var(--light);border-radius:10px;padding:14px 16px;border:1px solid var(--border);
}

/* List rows */
.list-row{
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:0.5px solid rgba(13,47,92,0.08);transition:background 0.15s;
  cursor:default;
}
.list-row:last-child{border-bottom:none;}
.list-row:hover{background:var(--light);}
.list-row:active{background:var(--lighter);}

/* iOS Buttons */
.ios-btn{
  border:none;cursor:pointer;border-radius:8px;font-weight:700;
  transition:all 0.15s cubic-bezier(0.25,0.46,0.45,0.94);
  font-size:14px;padding:12px 20px;letter-spacing:0.3px;font-family:"Montserrat",sans-serif;text-transform:uppercase;
}
.ios-btn:active{transform:scale(0.97);}
.ios-btn-blue{background:var(--navy);color:#fff;}
.ios-btn-blue:hover{background:var(--navy-mid);}
.ios-btn-red{background:#FF3B30;color:#fff;}
.ios-btn-red:hover{background:#D93025;}
.ios-btn-gray{background:var(--light);color:var(--navy);}
.ios-btn-gray:hover{background:var(--border);}
.ios-btn-sm{padding:7px 14px;font-size:11px;border-radius:6px;}

/* Input fields */
.ios-input{
  background:var(--lighter);border:1.5px solid var(--border);border-radius:8px;
  padding:10px 14px;font-size:14px;color:var(--navy);width:100%;
  transition:all 0.15s;
}
.ios-input:focus{background:#fff;border-color:var(--navy);box-shadow:0 0 0 3px rgba(13,47,92,0.12);}
.ios-input::placeholder{color:var(--gray);}
.ios-input-label{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:"Montserrat",sans-serif;opacity:0.7;}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:-0.1px;}
.badge-green{background:#D1F2E0;color:#1D7A3E;}
.badge-orange{background:#FFF0D9;color:#C45200;}
.badge-red{background:#FFDEDE;color:#C0001A;}
.badge-blue{background:var(--light);color:var(--navy);}

/* Stat cards */
.stat-card{
  background:#fff;border-radius:12px;padding:16px 18px;
  box-shadow:0 2px 16px rgba(13,47,92,0.08);border:1px solid var(--border);
  display:flex;flex-direction:column;gap:4px;
}
.stat-value{font-size:32px;font-weight:700;letter-spacing:-0.5px;line-height:1;}
.stat-label{font-size:11px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;font-family:"Montserrat",sans-serif;}

/* Modal / Sheet */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.4);
  z-index:300;display:flex;align-items:flex-end;justify-content:center;
  animation:fadeIn 0.2s ease;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.sheet{
  background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:600px;
  max-height:90vh;overflow-y:auto;
  animation:slideUp 0.35s cubic-bezier(0.32,0.72,0,1);
  padding-bottom:calc(env(safe-area-inset-bottom,16px) + 16px);
  touch-action:pan-y;
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.sheet-title{font-size:18px;font-weight:800;letter-spacing:0.3px;padding:16px 20px 0;font-family:"Montserrat",sans-serif;color:var(--navy);text-transform:uppercase;}

/* Alert bar */
.alert-bar{
  background:linear-gradient(135deg,#c0392b,#922b21);
  border-radius:14px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;cursor:pointer;
  box-shadow:0 4px 16px rgba(192,57,43,0.3);
  transition:transform 0.15s,box-shadow 0.15s;
}
.alert-bar:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,57,43,0.35);}
.alert-bar:active{transform:scale(0.99);}

/* Toast */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:var(--navy-deep);color:#fff;
  padding:12px 22px;border-radius:20px;font-size:14px;font-weight:500;
  z-index:200;animation:toastIn 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
  display:flex;align-items:center;gap:8px;
  box-shadow:0 8px 32px rgba(0,0,0,0.25);backdrop-filter:blur(10px);
  white-space:nowrap;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── Notification Popup ── */
.notif-popup{
  position:fixed;top:20px;right:20px;z-index:999;
  background:#fff;border-radius:18px;
  box-shadow:0 8px 40px rgba(13,47,92,0.22),0 2px 8px rgba(13,47,92,0.12);
  border:1.5px solid rgba(196,82,0,0.25);
  max-width:340px;width:calc(100% - 40px);
  animation:notifIn 0.45s cubic-bezier(0.32,0.72,0,1);
  overflow:hidden;
}
@keyframes notifIn{
  from{opacity:0;transform:translateX(40px) scale(0.95);}
  to{opacity:1;transform:translateX(0) scale(1);}
}
.notif-popup.notif-out{
  animation:notifOut 0.3s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
}
@keyframes notifOut{
  from{opacity:1;transform:translateX(0) scale(1);}
  to{opacity:0;transform:translateX(40px) scale(0.95);}
}
.notif-accent{height:4px;background:linear-gradient(90deg,#C45200,#FF9500);}
.notif-body{padding:14px 16px 16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;}
.notif-body:hover{background:var(--lighter);}
.notif-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,#FFF0D9,#FFE0C0);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.notif-content{flex:1;min-width:0;}
.notif-title{font-family:"Montserrat",sans-serif;font-size:13px;font-weight:800;
  color:var(--navy);letter-spacing:0.3px;text-transform:uppercase;}
.notif-msg{font-size:13px;color:#555;margin-top:3px;line-height:1.4;}
.notif-cta{font-size:11px;font-weight:700;color:#C45200;text-transform:uppercase;
  letter-spacing:0.8px;margin-top:6px;font-family:"Montserrat",sans-serif;}
.notif-close{
  background:none;border:none;cursor:pointer;color:var(--gray);
  font-size:18px;padding:2px 6px;line-height:1;border-radius:6px;
  flex-shrink:0;
}
.notif-close:hover{background:var(--light);color:var(--navy);}
/* Badge en tab de solicitudes */
.tab-badge{
  display:inline-flex;align-items:center;justify-content:center;
  background:#FF3B30;color:#fff;border-radius:10px;
  font-size:10px;font-weight:800;padding:1px 6px;
  margin-left:5px;min-width:18px;line-height:16px;
  font-family:"Montserrat",sans-serif;
}
/* Section header */
.section-hdr{font-size:14px;font-weight:800;letter-spacing:1px;margin-bottom:12px;color:var(--navy);text-transform:uppercase;font-family:"Montserrat",sans-serif;}

/* Separator */
.sep{height:0.5px;background:rgba(60,60,67,0.10);margin:0;}

/* Table */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;background:var(--lighter);border-bottom:1.5px solid var(--navy);font-family:"Montserrat",sans-serif;}
.tbl td{padding:13px 14px;border-bottom:0.5px solid rgba(60,60,67,0.08);font-size:14px;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--light);}

/* Type toggle */
.type-toggle{display:flex;gap:10px;}
.type-btn{
  flex:1;padding:14px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--lighter);cursor:pointer;font-size:13px;font-weight:700;color:var(--gray);
  transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:"Montserrat",sans-serif;text-transform:uppercase;letter-spacing:0.5px;
}
.type-btn.active-in{border-color:var(--navy);background:var(--light);color:var(--navy);}
.type-btn.active-out{border-color:#c0392b;background:#fff5f5;color:#c0392b;}
.type-btn.active-dev{border-color:#b07d00;background:#fffbe6;color:#b07d00;}
.type-icon{font-size:22px;}

/* Quantity preview */
.qty-preview{
  background:linear-gradient(135deg,var(--lighter),#fff);
  border:1px solid var(--border);border-radius:8px;
  padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
}

/* Location pill */
.loc-pill{
  background:var(--light);border-radius:4px;padding:2px 8px;
  font-size:11px;color:var(--navy);font-weight:600;letter-spacing:0.3px;

.eq-card{
  background:#fff;border-radius:12px;
  box-shadow:0 2px 16px rgba(13,47,92,0.08);border:1px solid var(--border);

.eq-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.10);}
.eq-card:active{transform:scale(0.98);}

.eq-img-placeholder{

  display:flex;align-items:center;justify-content:center;font-size:48px;

/* Image upload zone */
.img-upload-zone{
  border:2px dashed #C7C7CC;border-radius:14px;
  padding:24px;text-align:center;cursor:pointer;
  transition:all 0.2s;background:rgba(120,120,128,0.04);

.img-upload-zone:hover{border-color:#007AFF;background:rgba(0,122,255,0.04);}
.img-upload-zone.has-img{border-style:solid;border-color:#34C759;padding:0;overflow:hidden;}
.img-upload-zone.has-img img{width:100%;height:180px;object-fit:cover;display:block;}

.spare-chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--light);color:var(--navy);border-radius:20px;

}

.spare-chip button:hover{color:#FF3B30;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes emojiPickerIn{
  from{opacity:0;transform:scale(0.6) translateY(8px);}
  to{opacity:1;transform:scale(1) translateY(0);}
}
.login-wrap{
  min-height:100vh;background:var(--navy-deep);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
.login-card{
  background:#fff;border-radius:20px;width:100%;max-width:380px;
  box-shadow:0 24px 64px rgba(0,0,0,0.35);

  animation:slideUp 0.4s cubic-bezier(0.32,0.72,0,1);

  background:var(--navy);padding:28px 28px 22px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}

function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [showPw, setShowPw] = useState(false);

  const handleLogin = async () => {
    if (!username || !password) { setError("Ingresa usuario y contraseña"); return; }
    setLoading(true); setError("");
    try {
      const { data, error: err } = await sb
        .from("usuarios")
        .select("*")
        .eq("username", username.trim().toLowerCase())
        .eq("activo", true);
      if (err) { setError("Supabase error: " + JSON.stringify(err)); return; }
      if (!data || data.length === 0) { setError("No se encontró usuario activo. Datos: " + JSON.stringify(data)); return; }
      const user = data.find(u => u.password === password.trim());
      if (!user) { setError("Contraseña no coincide. Usuarios encontrados: " + data.map(u=>u.username+"(pw:"+u.password+")").join(",")); return; }
      onLogin(user);
    } catch(e) {
      setError("Error de conexión: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const handleKey = e => { if (e.key === "Enter") handleLogin(); };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-header">
          <img src={LOGO_SRC} alt="Bussié" style={{height:52,width:"auto",mixBlendMode:"screen",borderRadius:14}}/>
          <div style={{fontFamily:'"Montserrat",sans-serif',fontSize:10,fontWeight:700,color:"rgba(255,255,255,0.55)",textTransform:"uppercase",letterSpacing:2,marginTop:2}}>
            Gestión de Almacén Mantenimiento
          </div>
        </div>
        <div className="login-body">
          <div style={{fontFamily:'"Montserrat",sans-serif',fontWeight:800,fontSize:18,color:"var(--navy)",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>
            Iniciar sesión
          </div>
          <div style={{fontSize:13,color:"var(--gray)",marginBottom:20}}>Ingresa tus datos de acceso para continuar</div>

          {error && (
            <div className="login-error">
              <span>⚠️</span>{error}
            </div>
          )}

          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div>
              <div className="ios-input-label">Usuario</div>
              <input className="ios-input" placeholder="usuario" value={username}
                onChange={e=>setUsername(e.target.value)} onKeyDown={handleKey} autoCapitalize="none" autoCorrect="off"/>
            </div>
            <div>
              <div className="ios-input-label">Contraseña</div>
              <div style={{position:"relative"}}>
                <input className="ios-input" type={showPw?"text":"password"} placeholder="••••••••"
                  value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={handleKey}
                  style={{paddingRight:44}}/>
                <button onClick={()=>setShowPw(p=>!p)}
                  style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                  background:"none",border:"none",cursor:"pointer",fontSize:18,color:"var(--gray)",padding:0}}>
                  {showPw?"🙈":"👁️"}
                </button>
              </div>
            </div>
            <button className="ios-btn ios-btn-blue" style={{width:"100%",marginTop:4,padding:"14px",fontSize:15}}
              onClick={handleLogin} disabled={loading}>
              {loading ? (
                <span style={{display:"inline-flex",alignItems:"center",gap:8}}>
                  <span style={{display:"inline-block",animation:"spin 0.8s linear infinite"}}>⟳</span>
                  Verificando…
                </span>
              ) : "Entrar"}
            </button>
          </div>


        </div>
      </div>
    </div>
  );
}

function AlmacenApp({onBack, initialUser}){
  const [currentUser, setCurrentUser] = useState(initialUser||null);
  const [tab,setTab]=useState("panel");
  const [items,setItems]=useState([]);
  const [movs,setMovs]=useState([]);
  const [historial,setHistorial]=useState([]);
  const [equipos,setEquipos]=useState([]);
  const [cronograma,setCronograma]=useState([]);
  const [proveedoresPorItem,setProveedoresPorItem]=useState({});
  const [search,setSearch]=useState("");
  const [cat,setCat]=useState("Todas");
  const [onlyAlerts,setOnlyAlerts]=useState(false);
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState(null);
  const [toast,setToast]=useState(null);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);

  // Interceptar gesto/botón "atrás" cuando hay un modal abierto
  useEffect(()=>{
    if(modal){
      window.history.pushState({bussie:"modal",modal},"");
      const handler=()=>{
        setModal(null); setSel(null);
        window.history.pushState({bussie:"almacen"},"");
      };
      window.addEventListener("popstate",handler);
      return ()=>window.removeEventListener("popstate",handler);
    }
  },[modal]);

  // ── Expiración de sesión por inactividad (7 min) ────────────────────────────
  const SESSION_TIMEOUT = 7 * 60 * 1000;
  const sessionTimerRef = useRef(null);
  const [sessionWarning, setSessionWarning] = useState(false); // aviso 1 min antes

  const resetSessionTimer = useCallback(() => {
    setSessionWarning(false);
    if(sessionTimerRef.current) clearTimeout(sessionTimerRef.current);
    // Aviso a los 6 minutos
    sessionTimerRef.current = setTimeout(() => {
      setSessionWarning(true);
      // Cierre definitivo 1 minuto después
      sessionTimerRef.current = setTimeout(() => {
        setCurrentUser(null); setItems([]); setMovs([]); setEquipos([]);
        setSessionWarning(false);
      }, 60 * 1000);
    }, SESSION_TIMEOUT - 60 * 1000);
  }, []);

  useEffect(() => {
    if(!currentUser) return;
    const events = ["mousedown","mousemove","keydown","touchstart","scroll","click"];
    events.forEach(ev => window.addEventListener(ev, resetSessionTimer, {passive:true}));
    resetSessionTimer();
    return () => {
      events.forEach(ev => window.removeEventListener(ev, resetSessionTimer));
      if(sessionTimerRef.current) clearTimeout(sessionTimerRef.current);
    };
  }, [currentUser, resetSessionTimer]);
  const [notif,setNotif]=useState(null);          // {count,isNew}
  const [notifVisible,setNotifVisible]=useState(false);
  const [notifOut,setNotifOut]=useState(false);
  const [pendingCount,setPendingCount]=useState(0);
  const [osNotifPerm,setOsNotifPerm]=useState(
    typeof Notification!=="undefined"?Notification.permission:"denied"
  );
  const prevPendingRef=useRef(null);
  const notifTimerRef=useRef(null);

  // Solicitar permiso de notificaciones del SO
  const requestOsNotifPerm=async()=>{
    if(typeof Notification==="undefined") return "denied";
    if(Notification.permission==="granted"){ setOsNotifPerm("granted"); return "granted"; }
    if(Notification.permission==="denied"){ setOsNotifPerm("denied"); return "denied"; }
    const result=await Notification.requestPermission();
    setOsNotifPerm(result);
    return result;
  };

  // Enviar notificación nativa del SO
  const sendOsNotif=(title,body,isNew=false)=>{
    if(typeof Notification==="undefined"||Notification.permission!=="granted") return;

  entregada_almacen: "¿Estás seguro de que deseas marcar como Disponible?",

  );

function SolicitudesTab({ currentUser, items, equipos, flash, reloadHistorial, registerMovement }){
  const [solis,setSolis]   = useState([]);
  const [loading,setLoading] = useState(true);
  const [modal,setModal]   = useState(null);
  const [filtroEstado,setFiltroEstado] = useState("todos");
  const [filtroTipo,setFiltroTipo] = useState("todos"); // "todos"|"repuesto"|"locativo"|"apoyo_critico"
  const [search,setSearch] = useState("");
  const [cotizModal,setCotizModal] = useState(null);
  const [proveedorInput,setProveedorInput] = useState("");
  const [proveedoresList,setProveedoresList] = useState([]); // lista de proveedores registrados

  useEffect(()=>{
    sb.from("proveedores").select("id,nombre").order("nombre")
      .then(({data})=>{ if(data) setProveedoresList(data.map(p=>p.nombre)); });
  },[]);
  const [entregaModal,setEntregaModal] = useState(null);
  const [cantEntregada,setCantEntregada] = useState("");
  const [dispModal,setDispModal] = useState(null);       // modal marcar disponible
  const [dispProveedor,setDispProveedor] = useState(""); // proveedor del pedido
  const [dispRemision,setDispRemision] = useState("");   // número de remisión
  const [dispCantidad,setDispCantidad] = useState("");   // cantidad recibida en almacén

  // Unidad de la solicitud: usa la guardada o la busca en el inventario por item_id/código/nombre
  const unidadDe = (s) => {
    if(!s) return "";
    if(s.unidad) return s.unidad;
    const art = (items||[]).find(i=>
      (s.item_id&&i.id===s.item_id) ||
      (s.item_code&&i.code===s.item_code) ||
      (s.item_name&&i.name===s.item_name)
    );
    return art?.unit || "";
  };

  // Disponible: llega la mercancía → ENTRADA al almacén
  const handleDisponible = async (soli) => {
    const cant = parseInt(dispCantidad);
    if(isNaN(cant)||cant<=0){flash("Ingresa la cantidad recibida",false);return;}
    const art = items.find(i=>i.code===soli.item_code||i.name===soli.item_name);
    if(!art){flash("Artículo no encontrado en inventario",false);return;}
    if(registerMovement){
      await registerMovement(art,{
        type:"entrada",
        qty:cant,
        reason:`Entrada solicitud ${soli.consecutivo||("#"+soli.id)}${dispProveedor?" · "+dispProveedor:""}${dispRemision?" · Rem: "+dispRemision:""}`,
      });
    }
    await cambiarEstado(soli,"entregada_almacen",dispProveedor.trim(),cant,dispRemision.trim());
    setDispModal(null);
  };

  // Entregada: se despacha al solicitante → SALIDA del almacén
  const handleEntrega = async (soli) => {
    const cant = parseInt(cantEntregada);
    if(isNaN(cant)||cant<=0){flash("Ingresa la cantidad a entregar",false);return;}
    const art = items.find(i=>i.code===soli.item_code||i.name===soli.item_name);
    if(!art){flash("Artículo no encontrado en inventario",false);return;}
    if(registerMovement){
      await registerMovement(art,{
        type:"salida",
        qty:cant,
        reason:`Entrega solicitud ${soli.consecutivo||("#"+soli.id)} · ${soli.solicitante_name||""}`,
      });
    }
    await cambiarEstado(soli,"entregada","",null);
    setEntregaModal(null);
    setCantEntregada("");
  };

  const fetchSolis = async () => {
    setLoading(true);
    const {data,error} = await sb.from("solicitudes").select("*").order("created_at",{ascending:false});
    if(!error) setSolis(data||[]);
    setLoading(false);
  };
  useEffect(()=>{ fetchSolis(); },[]);

  const deleteSoli = async (id) => {
    if(!confirm("¿Eliminar esta solicitud?")) return;
    const {error} = await sb.from("solicitudes").delete().eq("id",id);
    if(error){flash("Error: "+error.message,false);return;}
    const soli = solis.find(s=>s.id===id);
    setSolis(prev=>prev.filter(s=>s.id!==id));
    flash("Solicitud eliminada");
    if(soli) registrarHistorial("baja_solicitud", "Solicitud eliminada: "+(soli.item_name||"")+" · "+soli.solicitante_name, currentUser?.nombre||currentUser?.username||"Sistema").then(()=>reloadHistorial&&reloadHistorial());
  };

  const cambiarEstado = async (soli,nuevoEstado,proveedor="",cantRec=null,remision="") => {
    const upd = {
      status: nuevoEstado,
      updated_by: currentUser.username,
      updated_at: new Date().toISOString()
    };
    if(proveedor) upd.proveedor = proveedor;
    if(cantRec !== null) upd.cantidad_recibida = cantRec;
    if(remision) upd.remision = remision;
    let {error} = await sb.from("solicitudes").update(upd).eq("id",soli.id);
    if(error){
      const fallback={status:nuevoEstado};
      if(proveedor) fallback.proveedor=proveedor;
      const res2 = await sb.from("solicitudes").update(fallback).eq("id",soli.id);
      if(res2.error){flash("Error: "+res2.error.message,false);return;}
    }
    setSolis(prev=>prev.map(s=>s.id===soli.id?{...s,status:nuevoEstado,updated_by:currentUser.username,...(proveedor?{proveedor}:{}),...(cantRec!==null?{cantidad_recibida:cantRec}:{}),...(remision?{remision}:{})}:s));
    const e=ESTADOS.find(x=>x.key===nuevoEstado);
    flash("Estado: "+e.label);
    if(nuevoEstado==="solicitada_compra" && typeof window.notificarCompra==="function"){
      window.notificarCompra({...soli, solicitante_name: soli.solicitante_name||currentUser.username});
    }
    // Notificar al solicitante cuando su pedido está disponible
    if(nuevoEstado==="entregada_almacen" && typeof window.notificarSolicitante==="function"){
      sb.from("usuarios").select("email").eq("username", soli.solicitante_username||soli.solicitante_name||"").single()
        .then(({data})=>{ if(data?.email) window.notificarSolicitante("disponible", soli, data.email); });
    }
    registrarHistorial("estado_solicitud", `Solicitud: ${soli.item_name||""} → ${e.label}${proveedor?" · Proveedor: "+proveedor:""}${remision?" · Rem: "+remision:""}`, currentUser?.nombre||currentUser?.username||"Sistema").then(()=>reloadHistorial&&reloadHistorial());
    if(window._refreshPending) window._refreshPending();
  };

  const filtered = solis.filter(s=>{
    const me=filtroEstado==="todos"||s.status===filtroEstado;
    const ms=search===""||
      s.item_name?.toLowerCase().includes(search.toLowerCase())||
      s.solicitante_name?.toLowerCase().includes(search.toLowerCase())||
      s.equipo_name?.toLowerCase().includes(search.toLowerCase());
    const mt=filtroTipo==="todos"||(s.tipo_material||"repuesto")===filtroTipo;
    return me&&ms&&mt;
  });

  const conteos={};
  ESTADOS.forEach(e=>{conteos[e.key]=solis.filter(s=>s.status===e.key).length;});
  const pendientes=conteos["pendiente"]||0;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div className="section-hdr" style={{margin:0}}>📋 Solicitudes de Repuestos</div>
        <button className="ios-btn ios-btn-blue ios-btn-sm" onClick={()=>setModal("add")}>
          + Nueva solicitud
        </button>
      </div>

      {/* Stats */}
      {(()=>{
        const pend = pendientes;
        const compra = conteos["solicitada_compra"]||0;
        const entregadas = conteos["entregada"]||0;
        const cardPend = (
          <div key="pend" className="stat-card" style={{padding:"10px 12px",cursor:"pointer"}}
            onClick={()=>setFiltroEstado(filtroEstado==="pendiente"?"todos":"pendiente")}>
            <div className="stat-value" style={{fontSize:22,color:pend>0?"#C45200":"#34C759"}}>{pend}</div>
            <div className="stat-label">Pendientes{pend>0?" →":""}</div>
          </div>
        );
        const cardCompra = (
          <div key="compra" className="stat-card" style={{padding:"10px 12px",cursor:"pointer"}}
            onClick={()=>setFiltroEstado(filtroEstado==="solicitada_compra"?"todos":"solicitada_compra")}>
            <div className="stat-value" style={{fontSize:22,color:compra>0?"#004A9E":"#34C759"}}>{compra}</div>
            <div className="stat-label">Para compra{compra>0?" →":""}</div>
          </div>
        );
        const [primero, segundo] = pend >= compra ? [cardPend, cardCompra] : [cardCompra, cardPend];
        return (
          <div className="soli-stat-scroll">
            {primero}
            {segundo}
            <div className="stat-card" style={{padding:"10px 12px"}}>
              <div className="stat-value" style={{fontSize:22,color:"#1D7A3E"}}>{entregadas}</div>
              <div className="stat-label">Entregadas</div>
            </div>
            <div className="stat-card" style={{padding:"10px 12px"}}>
              <div className="stat-value" style={{fontSize:22,color:"#1C1C1E"}}>{solis.length}</div>
              <div className="stat-label">Total</div>
            </div>
          </div>
        );
      })()}

      {/* Search */}
      <div style={{position:"relative"}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:16,color:"#8E8E93"}}>🔍</span>
        <input className="ios-input" placeholder="Buscar artículo, solicitante o equipo…"
          value={search} onChange={e=>setSearch(e.target.value)} style={{paddingLeft:38}}/>
      </div>

      {/* ── Filtros ── */}
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {/* Fila 1: Tipo */}
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
          {[
            ["todos",       null,   "Todos"],
            ["repuesto",    "🔧",   "Repuesto"],
            ["locativo",    "🏢",   "Locativo"],
            ["apoyo_critico","⚡",  "Apoyo Crítico"],
          ].map(([val,ic,lbl])=>{
            const cnt=val==="todos"?solis.length:solis.filter(s=>(s.tipo_material||"repuesto")===val).length;
            const isActive=filtroTipo===val;
            const activeBg=val==="apoyo_critico"?"#C0001A":val==="locativo"?"#1A6B38":"#0D2F5C";
            return(
              <button key={val} onClick={()=>setFiltroTipo(val)} style={{
                border:"none",cursor:"pointer",flexShrink:0,
                padding:"5px 11px",borderRadius:20,
                background:isActive?activeBg:"rgba(13,47,92,0.06)",
                color:isActive?"#fff":"#636366",
                fontSize:11,fontWeight:700,fontFamily:"Montserrat,sans-serif",
                display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap",
              }}>
                {ic&&<span>{ic}</span>}
                <span>{lbl}</span>
                {cnt>0&&<span style={{fontSize:9,opacity:.75}}>{cnt}</span>}
              </button>
            );
          })}
        </div>
        {/* Fila 2: Estado */}
        <div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:2}}>
          <button onClick={()=>setFiltroEstado("todos")} style={{
            border:"none",cursor:"pointer",padding:"5px 10px",borderRadius:14,flexShrink:0,
            background:filtroEstado==="todos"?"#0D2F5C":"rgba(13,47,92,0.06)",
            color:filtroEstado==="todos"?"#fff":"#636366",fontSize:11,fontWeight:700,
            fontFamily:"Montserrat,sans-serif",whiteSpace:"nowrap",
          }}>Todos{solis.length>0?` · ${solis.length}`:""}</button>
          {ESTADOS.map(e=>{
            const cnt=conteos[e.key]||0;
            const isActive=filtroEstado===e.key;
            return(
              <button key={e.key} onClick={()=>setFiltroEstado(e.key)} style={{
                border:"none",cursor:"pointer",padding:"5px 10px",borderRadius:14,flexShrink:0,
                background:isActive?e.text:"rgba(13,47,92,0.06)",
                color:isActive?"#fff":"#636366",fontSize:11,fontWeight:700,
                fontFamily:"Montserrat,sans-serif",whiteSpace:"nowrap",
                display:"flex",alignItems:"center",gap:3,
              }}>
                <span>{e.icon}</span>
                <span>{e.label}{cnt>0?` · ${cnt}`:""}</span>
              </button>
            );
          })}
        </div>
      </div>

      {/* Lista */}
      {loading?(
        <div style={{padding:40,textAlign:"center",color:"#8E8E93"}}>Cargando…</div>
      ):filtered.length===0?(
        <div style={{padding:40,textAlign:"center",color:"#8E8E93"}}>Sin solicitudes</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(s=>{
          const estado = ESTADOS.find(e=>e.key===(s.status||"pendiente"))||ESTADOS[0];
          return(
          <div key={s.id} style={{
            background:"#fff",borderRadius:14,
            border:"1px solid rgba(13,47,92,0.09)",
            boxShadow:"0 2px 10px rgba(13,47,92,0.07)",
            overflow:"hidden",
            display:"flex",
          }}>
            {/* Barra de color izquierda según estado */}
            <div style={{width:5,flexShrink:0,background:estado.text,borderRadius:"14px 0 0 14px"}}/>
            <div style={{flex:1,padding:"10px 12px",display:"flex",flexDirection:"column",gap:4}}>
              {/* Encabezado: nombre + badge */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{fontWeight:700,fontSize:14,color:"#1C1C1E",flex:1,minWidth:0}}>
                  {s.consecutivo&&(
                    <span style={{fontSize:11,fontWeight:800,color:"#fff",background:"var(--navy)",
                      borderRadius:6,padding:"1px 7px",marginRight:6,letterSpacing:.3,
                      fontFamily:"Montserrat,sans-serif",verticalAlign:"middle"}}>
                      {s.consecutivo}
                    </span>
                  )}
                  {s.item_name}
                </div>
                {estadoBadge(s.status||"pendiente")}
              </div>
              {/* Info secundaria */}
              <div style={{fontSize:12,color:"#636366",display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                {s.tipo_material&&s.tipo_material!=="repuesto"&&(
                  <span style={{
                    padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:700,
                    background:s.tipo_material==="apoyo_critico"?"#FFF0F0":"#e8f5e9",
                    color:s.tipo_material==="apoyo_critico"?"#C0001A":"#1A6B38",
                    fontFamily:"Montserrat,sans-serif",letterSpacing:0.3,
                  }}>
                    {s.tipo_material==="apoyo_critico"?"⚡ APOYO CRÍTICO":"🏢 LOCATIVO"}
                  </span>
                )}
                <span style={{fontWeight:600,color:"#1C1C1E"}}>×{s.quantity} {unidadDe(s)}</span>
                {s.item_code&&<><span style={{color:"#C7C7CC"}}>·</span><span style={{fontFamily:"monospace",fontSize:11,background:"#F2F2F7",padding:"1px 5px",borderRadius:4}}>{s.item_code}</span></>}
                {s.equipo_name&&<><span style={{color:"#C7C7CC"}}>·</span><span>🔧 {s.equipo_name}</span></>}
                
              </div>
              {/* Solicitante + fecha */}
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                <span style={{fontSize:11,color:"#8E8E93"}}>👤 {s.solicitante_name}{s.proveedor&&<><span style={{color:"#C7C7CC"}}> · </span><span>🏪 {s.proveedor}</span></>}</span>
                <span style={{fontSize:10,color:"#C7C7CC"}}>{fmtDate(s.created_at)}{s.updated_by?` · ${s.updated_by}`:""}</span>
              </div>
              {s.status==="en_cotizacion"&&s.proveedor&&<div style={{fontSize:12,color:"#0A5A72",fontWeight:600}}>💬 Cotizando con: {s.proveedor}</div>}
              {(s.status==="entregada_almacen"||s.status==="entregada")&&(s.proveedor||s.remision)&&(
                <div style={{display:"flex",gap:8,flexWrap:"wrap",fontSize:12}}>
                  {s.proveedor&&<span style={{background:"#E8F0FB",color:"#0D2F5C",borderRadius:6,padding:"2px 8px",fontWeight:600}}>🏪 {s.proveedor}</span>}
                  {s.remision&&<span style={{background:"#FFF8E1",color:"#7A5200",borderRadius:6,padding:"2px 8px",fontWeight:600}}>🧾 Rem. {s.remision}</span>}
                </div>
              )}
              {s.reason&&<div style={{fontSize:12,color:"#8E8E93",fontStyle:"italic",borderTop:"0.5px solid #F2F2F7",paddingTop:5}}>"{s.reason}"</div>}
              
              {/* Acciones */}
              {(currentUser.role==="admin"||currentUser.role==="almacenista")&&(()=>{
                const estadoActual = s.status||"pendiente";
                const mapa = currentUser.role==="almacenista" ? TRANSICIONES_ALMACENISTA : TRANSICIONES;
                const siguientes = mapa[estadoActual]||[];
                const acciones = ESTADOS.filter(e=>siguientes.includes(e.key));
                if(acciones.length===0) return(
                  <div style={{fontSize:11,color:"#C7C7CC",fontStyle:"italic"}}>
                    {estadoActual==="entregada"?"✅ Proceso completado":
                     estadoActual==="rechazada"?"❌ Solicitud rechazada":""}
                  </div>
                );
                return(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",borderTop:"0.5px solid #F2F2F7",paddingTop:8,marginTop:2,alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {acciones.map(e=>(
                      <button key={e.key} onClick={()=>{
                        if(e.key==="en_cotizacion"){ setCotizModal(s); setProveedorInput(""); return; }
                        if(e.key==="entregada"){ setEntregaModal(s); setCantEntregada(String(s.quantity||"")); return; }
                        if(e.key==="entregada_almacen"){ setDispModal(s); setDispProveedor(s.proveedor||""); setDispRemision(""); setDispCantidad(String(s.quantity||"")); return; }
                        const msg = CONFIRM_MSG[e.key]||("¿Estás seguro de que deseas cambiar el estado a \""+e.label+"\"?");
                        if(!confirm(msg)) return;
                        cambiarEstado(s,e.key);
                      }} style={{
                        border:"none",borderRadius:7,background:e.color,
                        color:e.text,fontSize:11,fontWeight:700,padding:"5px 11px",cursor:"pointer",
                      }}>{e.icon} {e.label}</button>
                    ))}
                    </div>
                    {currentUser.role==="admin"&&(
                      <button className="ios-btn ios-btn-red ios-btn-sm"
                        onClick={()=>deleteSoli(s.id)}>Eliminar</button>
                    )}
                  </div>
                );
              })()}
              {/* Eliminar si no hay acciones (estado final) */}
              {currentUser.role==="admin"&&(()=>{
                const mapa = TRANSICIONES;
                const siguientes = mapa[s.status||"pendiente"]||[];
                if(siguientes.length>0) return null;
                return(
                  <div style={{borderTop:"0.5px solid #F2F2F7",paddingTop:8,marginTop:2}}>
                    <button className="ios-btn ios-btn-red ios-btn-sm" onClick={()=>deleteSoli(s.id)}>Eliminar</button>
                  </div>
                );
              })()}
            </div>
          </div>
          );
        })}
        </div>
      )}
      <div style={{textAlign:"center",fontSize:13,color:"#C7C7CC"}}>{filtered.length} solicitud{filtered.length!==1?"es":""}</div>

      {entregaModal&&(()=>{
        const soli=entregaModal;
        const cantSoli=soli.quantity||0;
        const cant=parseInt(cantEntregada)||0;
        const art=items.find(i=>i.code===soli.item_code||i.name===soli.item_name);
        const stockActual=art?.quantity??null;
        const stockFinal=stockActual!==null?stockActual-cant:null;
        const bajoMinimo=stockFinal!==null&&art?.minStock>0&&stockFinal<art.minStock;
        const sinStock=stockFinal!==null&&stockFinal<0;
        return(
          <div className="overlay" onClick={()=>setEntregaModal(null)}>
            <div className="sheet" onClick={e=>e.stopPropagation()}>
              <div className="sheet-handle"/>
              <div className="sheet-title">✅ Entregar al solicitante</div>
              <div style={{padding:"16px 20px 28px",display:"flex",flexDirection:"column",gap:14}}>
                <div style={{background:"var(--light)",borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontWeight:700,fontSize:14,color:"var(--navy)"}}>{soli.item_name}</div>
                  <div style={{fontSize:12,color:"#636366"}}>
                    👤 {soli.solicitante_name}
                    {soli.equipo_name&&<> · 🔧 {soli.equipo_name}</>}
                  </div>
                  <div style={{fontSize:12,color:"#636366"}}>Solicitado: <strong>{cantSoli} {unidadDe(soli)}</strong>{stockActual!==null&&<> · Stock actual: <strong>{stockActual} {unidadDe(soli)}</strong></>}</div>
                </div>
                <div>
                  <div className="ios-input-label">Cantidad a entregar *</div>
                  <input className="ios-input" type="number" min="1"
                    placeholder={`Ej: ${cantSoli}`}
                    value={cantEntregada}
                    onChange={e=>setCantEntregada(e.target.value)}
                    autoFocus/>
                </div>
                {cant>0&&(
                  <div style={{background:"var(--lighter)",borderRadius:10,padding:"10px 14px",border:"1px solid var(--border)",fontSize:13}}>
                    <div style={{fontWeight:700,fontSize:11,color:"var(--navy)",textTransform:"uppercase",letterSpacing:1,fontFamily:"Montserrat,sans-serif",marginBottom:6}}>Movimiento a registrar</div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{background:"#FFDEDE",color:"#C0001A",borderRadius:6,padding:"2px 8px",fontWeight:700,fontSize:12}}>↓ Salida</span>
                      <span>{cant} {unidadDe(soli)} → {soli.solicitante_name}</span>
                      {stockFinal!==null&&<span style={{marginLeft:"auto",fontWeight:700,color:sinStock?"#C0001A":bajoMinimo?"#C45200":"#1D7A3E"}}>Stock: {stockFinal}</span>}
                    </div>
                  </div>
                )}
                {sinStock&&(
                  <div style={{background:"#FFDEDE",borderRadius:10,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:18}}>🚫</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:"#C0001A"}}>Stock insuficiente</div>
                      <div style={{fontSize:12,color:"#C0001A",marginTop:2}}>Solo hay {stockActual} {unidadDe(soli)||"unidades"} disponibles.</div>
                    </div>
                  </div>
                )}
                {!sinStock&&bajoMinimo&&(
                  <div style={{background:"#FFF0D9",borderRadius:10,padding:"10px 14px",display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:18}}>⚠️</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:"#C45200"}}>Quedará por debajo del mínimo</div>
                      <div style={{fontSize:12,color:"#C45200",marginTop:2}}>Stock final: {stockFinal} {unidadDe(soli)} · Mínimo: {art.minStock} {unidadDe(soli)}</div>
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:10}}>
                  <button className="ios-btn ios-btn-gray" style={{flex:1}} onClick={()=>setEntregaModal(null)}>Cancelar</button>
                  <button className="ios-btn ios-btn-blue" style={{flex:1,background:sinStock?"#C7C7CC":bajoMinimo?"#C45200":undefined}}
                    disabled={!cantEntregada||parseInt(cantEntregada)<=0||sinStock}
                    onClick={()=>handleEntrega(soli)}>
                    {bajoMinimo?"⚠️ Entregar de todas formas":"✅ Confirmar entrega"}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      })()}

      {dispModal&&(
        <div className="overlay" onClick={()=>setDispModal(null)}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div className="sheet-handle"/>
            <div className="sheet-title">📦 Marcar como Disponible</div>
            <div style={{padding:"16px 20px 28px",display:"flex",flexDirection:"column",gap:14}}>
              <div style={{background:"var(--light)",borderRadius:10,padding:"12px 14px",display:"flex",flexDirection:"column",gap:3}}>
                <div style={{fontWeight:700,fontSize:14,color:"var(--navy)"}}>{dispModal.item_name}</div>
                <div style={{fontSize:12,color:"#636366"}}>Solicitado: ×{dispModal.quantity} {unidadDe(dispModal)} · 👤 {dispModal.solicitante_name}</div>
              </div>
              <div>
                <div className="ios-input-label">Cantidad recibida en almacén *</div>
                <input className="ios-input" type="number" min="1"
                  placeholder={`Ej: ${dispModal.quantity}`}
                  value={dispCantidad} onChange={e=>setDispCantidad(e.target.value)} autoFocus/>
              </div>
              <div style={{position:"relative"}}>
                <div className="ios-input-label">Proveedor</div>
                {(()=>{
                  const filtrados=proveedoresList.filter(p=>p.toLowerCase().includes(dispProveedor.toLowerCase()));
                  const exacto=proveedoresList.some(p=>p.toLowerCase()===dispProveedor.toLowerCase().trim());
                  return(
                    <>
                      <input className="ios-input" placeholder="Buscar proveedor…"
                        value={dispProveedor} onChange={e=>setDispProveedor(e.target.value)}/>
                      {dispProveedor&&!exacto&&filtrados.length>0&&(
                        <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:10,background:"#fff",borderRadius:10,
                          boxShadow:"0 4px 20px rgba(0,0,0,0.15)",border:"1px solid var(--border)",maxHeight:160,overflowY:"auto",marginTop:4}}>
                          {filtrados.map(p=>(
                            <div key={p} onClick={()=>setDispProveedor(p)}
                              style={{padding:"10px 14px",fontSize:14,cursor:"pointer",borderBottom:"0.5px solid rgba(60,60,67,0.08)",display:"flex",alignItems:"center",gap:8}}
                              onMouseEnter={e=>e.currentTarget.style.background="#F2F2F7"}
                              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                              <span>🏪</span>{p}
                            </div>
                          ))}
                        </div>
                      )}
                      {dispProveedor&&!exacto&&filtrados.length===0&&(
                        <div style={{fontSize:12,color:"#8E8E93",marginTop:4}}>Sin coincidencias — puedes continuar sin proveedor</div>
                      )}
                    </>
                  );
                })()}
              </div>
              <div>
                <div className="ios-input-label">Número de remisión</div>
                <input className="ios-input" placeholder="Ej: REM-2024-001"
                  value={dispRemision} onChange={e=>setDispRemision(e.target.value)}/>
              </div>
              {dispCantidad&&parseInt(dispCantidad)>0&&(
                <div style={{background:"var(--lighter)",borderRadius:10,padding:"10px 14px",border:"1px solid var(--border)",fontSize:13}}>
                  <div style={{fontWeight:700,fontSize:11,color:"var(--navy)",textTransform:"uppercase",letterSpacing:1,fontFamily:"Montserrat,sans-serif",marginBottom:6}}>Movimiento a registrar</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{background:"#D1F2E0",color:"#1D7A3E",borderRadius:6,padding:"2px 8px",fontWeight:700,fontSize:12}}>↑ Entrada</span>
                    <span>{dispCantidad} {unidadDe(dispModal)} → Almacén{dispProveedor&&` · ${dispProveedor}`}</span>
                  </div>
                </div>
              )}
              <div style={{display:"flex",gap:10}}>
                <button className="ios-btn ios-btn-gray" style={{flex:1}} onClick={()=>setDispModal(null)}>Cancelar</button>
                <button className="ios-btn ios-btn-blue" style={{flex:1}}
                  disabled={!dispCantidad||parseInt(dispCantidad)<=0}
                  onClick={()=>handleDisponible(dispModal)}>📦 Confirmar entrada</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {cotizModal&&(()=>{
        const filtrados = proveedoresList.filter(p=>p.toLowerCase().includes(proveedorInput.toLowerCase()));
        const exacto = proveedoresList.some(p=>p.toLowerCase()===proveedorInput.toLowerCase().trim());
        return(
        <div className="overlay" onClick={()=>{ setCotizModal(null); setProveedorInput(""); }}>
          <div className="sheet" onClick={e=>e.stopPropagation()} style={{maxHeight:"auto"}}>
            <div className="sheet-handle"/>
            <div className="sheet-title">💬 En cotización</div>
            <div style={{padding:"16px 20px 28px",display:"flex",flexDirection:"column",gap:14}}>
              <div style={{position:"relative"}}>
                <div className="ios-input-label">Proveedor con quien se cotiza *</div>
                <input className="ios-input" placeholder="Buscar proveedor…"
                  value={proveedorInput} onChange={e=>setProveedorInput(e.target.value)}
                  autoFocus/>
                {proveedorInput&&!exacto&&filtrados.length>0&&(
                  <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:10,background:"#fff",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.15)",border:"1px solid var(--border)",maxHeight:180,overflowY:"auto",marginTop:4}}>
                    {filtrados.map(p=>(
                      <div key={p} onClick={()=>setProveedorInput(p)}
                        style={{padding:"11px 14px",fontSize:14,cursor:"pointer",borderBottom:"0.5px solid rgba(60,60,67,0.08)",display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background="#F2F2F7"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <span>🏪</span>{p}
                      </div>
                    ))}
                  </div>
                )}
                {proveedorInput&&!exacto&&filtrados.length===0&&(
                  <div style={{fontSize:12,color:"#C0001A",marginTop:4}}>No hay coincidencias. Registra el proveedor en Usuarios primero.</div>
                )}
                {exacto&&proveedorInput&&(
                  <div style={{fontSize:12,color:"#1D7A3E",marginTop:4}}>✓ {proveedorInput}</div>
                )}
              </div>
              <div style={{display:"flex",gap:10}}>
                <button className="ios-btn ios-btn-gray" style={{flex:1}} onClick={()=>{ setCotizModal(null); setProveedorInput(""); }}>Cancelar</button>
                <button className="ios-btn ios-btn-blue" style={{flex:1,background:"#0A5A72"}}
                  disabled={!exacto}
                  onClick={async()=>{
                    await cambiarEstado(cotizModal,"en_cotizacion",proveedorInput.trim());
                    setCotizModal(null); setProveedorInput("");
                  }}>Confirmar</button>
              </div>
            </div>
          </div>
        </div>
        );
      })()}

      {modal==="add"&&(
        <SolicitudModal items={items} equipos={equipos||[]} currentUser={currentUser} onClose={()=>setModal(null)}
          onSave={async(f)=>{
            try {
              // Generar consecutivo
              const { data: consData } = await sb.rpc("siguiente_consecutivo_solicitud");
              const consecutivo = consData || null;

              const {tipo_material, ...insertData} = f;
              const {data,error}=await sb.from("solicitudes").insert([{...insertData, consecutivo}]).select().single();
              if(error) throw new Error(error.message);
              setSolis(prev=>[{...data, tipo_material}, ...prev]);
              flash("✓ Solicitud enviada — "+consecutivo);
              registrarHistorial("nueva_solicitud", "Nueva solicitud: "+(f.item_name||f.item_code||"")+" × "+f.quantity, currentUser?.nombre||currentUser?.username||"Sistema").then(()=>reloadHistorial&&reloadHistorial());
              if(window._refreshPending) window._refreshPending();
              // Notificar confirmación al solicitante
              if(typeof window.notificarSolicitante==="function" && currentUser?.email){
                window.notificarSolicitante("confirmacion", {...data, solicitante_name: currentUser.nombre||currentUser.username}, currentUser.email);
              }
              setModal(null);
            } catch(e) {
              flash("Error al guardar: "+e.message, false);
              throw e;
            }
          }}
        />
      )}
    </div>
  );
}

function SolicitudModal({ items, equipos: equiposProp, currentUser, onClose, onSave }){
  const [f,setF]=useState({
    item_id: null,
    item_name: "",
    item_code: "",
    quantity: 1,
    unidad: "",
    equipo_name: "",
    reason: "",
    proveedor: "",
    tipo_mtto: "",   // "preventivo" | "correctivo"
    nst: "",         // número solicitud de trabajo (solo correctivo)
    status: "pendiente",
    solicitante_id: currentUser.id,
    solicitante_name: currentUser.nombre||currentUser.username,
  });
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const [saving,setSaving]=useState(false);
  const [usarInventario,setUsarInventario]=useState(true);
  const [tipoSolicitud,setTipoSolicitud]=useState("repuesto"); // "repuesto" | "locativo" | "apoyo_critico"
  const [equipoSel,setEquipoSel]=useState("");
  const [eqQ,setEqQ]=useState("");
  const [eqFocused,setEqFocused]=useState(false);
  const [areaQ,setAreaQ]=useState("");
  const [showAreaDrop,setShowAreaDrop]=useState(false);
  const [itemSearch,setItemSearch]=useState("");
  const [showItemDrop,setShowItemDrop]=useState(false);
  const [equipos,setEquipos]=useState(equiposProp||[]);

  // Fetch equipos directly in case the prop isn't populated yet
  useEffect(()=>{
    if(equiposProp&&equiposProp.length>0){ setEquipos(equiposProp); return; }
    sb.from("equipos").select("id,name,code,location,icon").order("name")
      .then(({data})=>{ if(data) setEquipos(data); });
  },[]);

  // Al cambiar de tipo, limpiar la selección de destino
  const cambiarTipo=(tipo)=>{
    setTipoSolicitud(tipo);
    setEquipoSel(""); setEqQ(""); setAreaQ(""); s("equipo_name","");
  };

  const [validErr,setValidErr]=useState("");

  const handleArticuloSelect=(id)=>{
    const item=items.find(i=>i.id===id);
    if(item){ s("item_id",id); s("item_name",item.name); s("item_code",item.code); s("unidad",item.unit||""); setValidErr(""); }
    else { s("item_id",null); s("item_name",""); s("item_code",""); s("unidad",""); }
  };

  const handleSave=async()=>{
    // El artículo DEBE haberse seleccionado del inventario — no se acepta texto libre
    if(!f.item_id){
      setValidErr("Selecciona el artículo del inventario. Escribe para buscar y toca la opción.");
      return;
    }
    const nombreFinal = f.item_name;
    if(!f.quantity||parseInt(f.quantity)<1){
      setValidErr("La cantidad debe ser mayor a 0.");
      return;
    }
    if(f.tipo_mtto!=="correctivo"&&(!f.equipo_name||!f.equipo_name.trim())){
      setValidErr("Selecciona el equipo o máquina.");
      return;
    }
    if(f.tipo_mtto!=="correctivo"&&tipoSolicitud==="locativo"&&(!f.equipo_name||!f.equipo_name.trim())){
      setValidErr("Selecciona el área o ubicación.");
      return;
    }
    if(f.tipo_mtto!=="correctivo"&&tipoSolicitud==="apoyo_critico"&&(!f.equipo_name||!f.equipo_name.trim())){
      setValidErr("Selecciona el equipo o sistema crítico.");
      return;
    }
    if(!f.tipo_mtto){
      setValidErr("Selecciona el tipo de mantenimiento.");
      return;
    }
    if(f.tipo_mtto==="correctivo"&&(!f.nst||!f.nst.trim())){
      setValidErr("Ingresa el N° de Solicitud de Trabajo.");
      return;
    }
    setValidErr("");
    setSaving(true);
    try {
      await onSave({
        ...f,
        item_name: nombreFinal,
        quantity: parseInt(f.quantity)||1,
        tipo_material: tipoSolicitud,
        tipo_mtto: f.tipo_mtto,
        nst: f.nst||null,
      });
    } catch(e) {
      setValidErr("Error inesperado: "+e.message);
    }
    setSaving(false);
  };

  return(
    <div className="overlay" onClick={onClose}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-title">Nueva Solicitud</div>
        <div style={{padding:"16px 20px 28px",display:"flex",flexDirection:"column",gap:14}}>

          {/* Tipo de solicitud: Repuesto, Locativo o Apoyo Crítico */}
          <div style={{display:"flex",gap:8}}>
            {[
              ["repuesto",  "🔧","Repuesto"],
              ["locativo",  "🏢","Locativo"],
              ["apoyo_critico","⚡","Apoyo Crítico"],
            ].map(([val,ic,lbl])=>(
              <button key={val} onClick={()=>cambiarTipo(val)} style={{
                flex:1,padding:"9px 4px",border:"1.5px solid",borderRadius:8,cursor:"pointer",
                borderColor:tipoSolicitud===val
                  ? (val==="apoyo_critico"?"#C0001A":"var(--navy)")
                  : "var(--border)",
                background:tipoSolicitud===val
                  ? (val==="apoyo_critico"?"#FFF0F0":"var(--light)")
                  : "#fff",
                fontWeight:700,fontSize:11,
                color:tipoSolicitud===val
                  ? (val==="apoyo_critico"?"#C0001A":"var(--navy)")
                  : "var(--gray)",
                fontFamily:"Montserrat,sans-serif",textTransform:"uppercase",
                display:"flex",flexDirection:"column",alignItems:"center",gap:3,
              }}>
                <span style={{fontSize:18}}>{ic}</span>
                <span style={{letterSpacing:0.2,lineHeight:1.2}}>{lbl}</span>
              </button>
            ))}
          </div>

          {/* Solo del inventario */}
          <AlmField label="Artículo del inventario">
              <div style={{position:"relative"}}>
                <input
                  className="ios-input"
                  placeholder="Buscar artículo…"
                  value={itemSearch}
                  autoComplete="off"
                  style={{
                    borderColor: itemSearch&&!f.item_id ? "#FF3B30" : undefined,
                    background:  itemSearch&&!f.item_id ? "#FFF5F5" : undefined,
                  }}
                  onChange={e=>{
                    setItemSearch(e.target.value);
                    setShowItemDrop(true);
                    if(!e.target.value){ handleArticuloSelect(""); }
                    else if(f.item_id){ s("item_id",null); s("item_name",""); s("item_code",""); }
                  }}
                  onFocus={()=>setShowItemDrop(true)}
                  onBlur={()=>setTimeout(()=>{
                    setShowItemDrop(false);
                    if(itemSearch&&!f.item_id){ setItemSearch(""); }
                  },180)}
                />
                {f.item_id&&!showItemDrop&&(
                  <div style={{fontSize:12,color:"var(--accent)",marginTop:4,fontWeight:600}}>
                    ✓ {f.item_name} · {f.item_code}
                  </div>
                )}
                {itemSearch&&!f.item_id&&!showItemDrop&&(
                  <div style={{fontSize:11,color:"#FF3B30",marginTop:4,fontWeight:600}}>
                    ⚠ Debes seleccionar una opción de la lista
                  </div>
                )}
                {showItemDrop&&(()=>{
                  const q=itemSearch.trim().toLowerCase();
                  const filtered=q?items.filter(i=>i.name.toLowerCase().startsWith(q)||i.code.toLowerCase().startsWith(q)):items;
                  return filtered.length>0?(
                    <div style={{
                      position:"absolute",top:"100%",left:0,right:0,zIndex:200,
                      background:"#fff",borderRadius:10,
                      boxShadow:"0 8px 32px rgba(13,47,92,0.18)",
                      border:"1.5px solid var(--border)",
                      maxHeight:220,overflowY:"auto",marginTop:4,
                    }}>
                      {filtered.map(i=>(
                        <div key={i.id}
                          onMouseDown={()=>{
                            handleArticuloSelect(i.id);
                            setItemSearch(i.name);
                            setShowItemDrop(false);
                          }}
                          style={{
                            padding:"10px 14px",cursor:"pointer",
                            borderBottom:"0.5px solid rgba(13,47,92,0.07)",
                            fontSize:14,color:"var(--navy)",
                          }}
                          onMouseEnter={e=>e.currentTarget.style.background="var(--light)"}
                          onMouseLeave={e=>e.currentTarget.style.background=""}
                        >
                          <span style={{fontWeight:600}}>{i.name}</span>
                          <span style={{fontSize:12,color:"var(--gray)",marginLeft:6}}>
                            {i.code} · Stock: {i.quantity} {i.unit}
                          </span>
                        </div>
                      ))}
                    </div>
                  ):q?(
                    <div style={{
                      position:"absolute",top:"100%",left:0,right:0,zIndex:200,
                      background:"#fff",borderRadius:10,
                      boxShadow:"0 8px 32px rgba(13,47,92,0.18)",
                      border:"1.5px solid var(--border)",
                      padding:"12px 14px",marginTop:4,
                      fontSize:13,color:"var(--gray)",fontStyle:"italic",
                    }}>Sin resultados para "{itemSearch}"</div>
                  ):null;
                })()}
              </div>
            </AlmField>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <AlmField label="Cantidad">
              <input className="ios-input" type="number" min="1" value={f.quantity} onChange={e=>s("quantity",e.target.value)}/>
            </AlmField>
            <AlmField label="Código">
              <div className="ios-input" style={{background:"var(--light)",color:"var(--gray)",
                fontWeight:600,userSelect:"none"}}>
                {f.item_code||"—"}
              </div>
            </AlmField>
          </div>

          {f.tipo_mtto==="correctivo"&&(
            <div style={{fontSize:12,color:"#8a96a8",fontStyle:"italic",
              background:"var(--light)",borderRadius:8,padding:"8px 12px",
              display:"flex",alignItems:"center",gap:6}}>
              🔒 No requiere equipo/área en correctivo — solo diligencia el N° de Solicitud abajo
            </div>
          )}
          <div style={f.tipo_mtto==="correctivo"?{opacity:.45,pointerEvents:"none",filter:"grayscale(.3)"}:undefined}>
          {tipoSolicitud==="repuesto"?(
            <AlmField label="Equipo / Máquina *">
              {/* Si ya hay equipo seleccionado, mostrar chip con X para limpiar */}
              {equipoSel&&equipoSel!=="otro"?(
                <div style={{display:"flex",alignItems:"center",gap:8,background:"#e8f0fb",
                  borderRadius:9,padding:"9px 13px",border:"1.5px solid rgba(13,47,92,0.15)"}}>
                  <span style={{fontSize:16}}>{(equipos||[]).find(eq=>eq.id===equipoSel)?.icon||"🔧"}</span>
                  <span style={{flex:1,fontSize:13,fontWeight:600,color:"#0D2F5C"}}>{f.equipo_name}</span>
                  <button type="button" onClick={()=>{setEquipoSel("");setEqQ("");s("equipo_name","");}}
                    style={{background:"none",border:"none",cursor:"pointer",color:"#8a96a8",
                      fontSize:16,lineHeight:1,padding:"0 2px"}}>✕</button>
                </div>
              ):(
                <div style={{position:"relative"}}>
                  <input className="ios-input" value={eqQ}
                    onChange={e=>{setEqQ(e.target.value);setEquipoSel("");s("equipo_name","");}}
                    onFocus={()=>setEqFocused(true)}
                    onBlur={()=>setTimeout(()=>setEqFocused(false),180)}
                    placeholder="🔍 Escribe para buscar equipo…"
                    style={{width:"100%"}}/>
                  {(()=>{
                    const itemSel=items.find(i=>i.id===f.item_id);
                    const asociados=itemSel&&itemSel.equipos_asociados&&itemSel.equipos_asociados.length>0
                      ? itemSel.equipos_asociados : null;
                    const dropdownOpen=eqQ.length>0||(asociados&&eqFocused);
                    if(!dropdownOpen) return null;
                    const equiposBase=asociados
                      ? (equipos||[]).filter(eq=>asociados.some(a=>(a&&a.id?a.id:a)===eq.id))
                      : (equipos||[]);
                    const hits=equiposBase.filter(eq=>
                      [eq.name,eq.code,eq.location].filter(Boolean)
                        .some(x=>x.toLowerCase().includes(eqQ.toLowerCase()))
                    );
                    return(
                      <React.Fragment>
                        {asociados&&(
                          <div style={{fontSize:11,color:"#8a96a8",marginTop:4,fontStyle:"italic"}}>
                            Solo se muestran los equipos asociados a "{itemSel.name}"
                          </div>
                        )}
                        {!hits.length?(
                          <div style={{padding:"8px 12px",fontSize:12,color:"#8a96a8",fontStyle:"italic",
                            background:"#fff",border:"1.5px solid rgba(13,47,92,0.12)",borderRadius:9,marginTop:4}}>
                            {asociados?(
                              "Sin coincidencias entre los equipos asociados a este repuesto"
                            ):(
                              <React.Fragment>Sin coincidencias — <span style={{color:"#0D2F5C",fontStyle:"normal",cursor:"pointer",fontWeight:600}}
                                onClick={()=>{setEquipoSel("otro");s("equipo_name",eqQ);}}>
                                usar "{eqQ}" como texto libre
                              </span></React.Fragment>
                            )}
                          </div>
                        ):(
                          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:100,
                            background:"#fff",border:"1.5px solid rgba(13,47,92,0.15)",borderRadius:10,
                            boxShadow:"0 8px 24px rgba(13,47,92,0.13)",maxHeight:230,overflowY:"auto"}}>
                            {hits.map(eq=>(
                              <div key={eq.id} onClick={()=>{
                                setEquipoSel(eq.id);
                                s("equipo_name",eq.name+(eq.code?" ("+eq.code+")":""));
                                setEqQ(eq.name+(eq.code?" ("+eq.code+")":""));
                              }} style={{padding:"10px 14px",cursor:"pointer",
                                borderBottom:"0.5px solid rgba(13,47,92,0.07)",
                                display:"flex",alignItems:"center",gap:10,fontSize:13,color:"#0D2F5C"}}
                                onMouseEnter={e=>e.currentTarget.style.background="#f4f7fd"}
                                onMouseLeave={e=>e.currentTarget.style.background=""}>
                                <span style={{fontSize:18,flexShrink:0}}>{eq.icon||"🔧"}</span>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{eq.name}</div>
                                  {(eq.code||eq.location)&&(
                                    <div style={{fontSize:11,color:"#8a96a8",marginTop:1}}>
                                      {[eq.code,eq.location].filter(Boolean).join(" · ")}
                                    </div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </React.Fragment>
                    );
                  })()}
                </div>
              )}
            </AlmField>
          ):tipoSolicitud==="locativo"?(
            /* ── Selector de ÁREA (modo locativo) ── */
            <AlmField label="Área / Ubicación *">
              {f.equipo_name?(
                <div style={{display:"flex",alignItems:"center",gap:8,background:"#e8f5e9",
                  borderRadius:9,padding:"9px 13px",border:"1.5px solid rgba(30,140,60,0.2)"}}>
                  <span style={{fontSize:16}}>🏢</span>
                  <span style={{flex:1,fontSize:13,fontWeight:600,color:"#0D2F5C",lineHeight:1.3}}>{f.equipo_name}</span>
                  <button type="button" onClick={()=>{setAreaQ("");s("equipo_name","");setShowAreaDrop(false);}}
                    style={{background:"none",border:"none",cursor:"pointer",color:"#8a96a8",
                      fontSize:16,lineHeight:1,padding:"0 2px"}}>✕</button>
                </div>
              ):(
                <div style={{position:"relative"}}>
                  <input className="ios-input" value={areaQ}
                    onChange={e=>{setAreaQ(e.target.value);setShowAreaDrop(true);s("equipo_name","");}}
                    onFocus={()=>setShowAreaDrop(true)}
                    onBlur={()=>setTimeout(()=>setShowAreaDrop(false),180)}
                    placeholder="🔍 Buscar área o número de sala…"
                    style={{width:"100%"}}/>
                  {showAreaDrop&&(()=>{
                    const q=areaQ.trim().toLowerCase();
                    const hits=AREAS_LOC.filter(a=>!q||a.toLowerCase().includes(q)).slice(0,50);
                    if(!hits.length) return(
                      <div style={{padding:"8px 12px",fontSize:12,color:"#8a96a8",fontStyle:"italic",
                        background:"#fff",border:"1.5px solid rgba(13,47,92,0.12)",borderRadius:9,marginTop:4}}>
                        Sin coincidencias — <span style={{color:"#0D2F5C",fontStyle:"normal",cursor:"pointer",fontWeight:600}}

          ):(

                <div style={{display:"flex",alignItems:"center",gap:8,background:"#FFF0F0",
                  borderRadius:9,padding:"9px 13px",border:"1.5px solid rgba(192,0,26,0.2)"}}>

                  <span style={{flex:1,fontSize:13,fontWeight:600,color:"#C0001A"}}>{f.equipo_name}</span>

                    onChange={e=>{setEqQ(e.target.value);setEquipoSel("");s("equipo_name","");}}
                    onFocus={()=>setEqFocused(true)}
                    onBlur={()=>setTimeout(()=>setEqFocused(false),180)}
                    placeholder="🔍 Escribe para buscar equipo…"
                    style={{width:"100%"}}/>
                  {(()=>{
                    const itemSel=items.find(i=>i.id===f.item_id);
                    const asociados=itemSel&&itemSel.equipos_asociados&&itemSel.equipos_asociados.length>0
                      ? itemSel.equipos_asociados : null;
                    const dropdownOpen=eqQ.length>0||(asociados&&eqFocused);
                    if(!dropdownOpen) return null;
                    const equiposBase=asociados
                      ? (equipos||[]).filter(eq=>asociados.some(a=>(a&&a.id?a.id:a)===eq.id))
                      : (equipos||[]);
                    const hits=equiposBase.filter(eq=>
                      [eq.name,eq.code,eq.location].filter(Boolean)
                        .some(x=>x.toLowerCase().includes(eqQ.toLowerCase()))
                    );
                    return(
                      <React.Fragment>
                        {asociados&&(
                          <div style={{fontSize:11,color:"#8a96a8",marginTop:4,fontStyle:"italic"}}>

                          </div>
                        )}
                        {!hits.length?(
                          <div style={{padding:"8px 12px",fontSize:12,color:"#8a96a8",fontStyle:"italic",
                            background:"#fff",border:"1.5px solid rgba(192,0,26,0.15)",borderRadius:9,marginTop:4}}>
                            {asociados?(
                              "Sin coincidencias entre los equipos asociados a este repuesto"
                            ):(
                              <React.Fragment>Sin coincidencias — <span style={{color:"#C0001A",fontStyle:"normal",cursor:"pointer",fontWeight:600}}
                                onClick={()=>{setEquipoSel("otro");s("equipo_name",eqQ);}}>
                                usar "{eqQ}" como texto libre
                              </span></React.Fragment>
                            )}
                          </div>
                        ):(
                          <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:100,
                            background:"#fff",border:"1.5px solid rgba(13,47,92,0.15)",borderRadius:10,
                            boxShadow:"0 8px 24px rgba(13,47,92,0.13)",maxHeight:230,overflowY:"auto"}}>
                            {hits.map(eq=>(
                              <div key={eq.id} onClick={()=>{
                                setEquipoSel(eq.id);
                                s("equipo_name",eq.name+(eq.code?" ("+eq.code+")":""));
                                setEqQ(eq.name+(eq.code?" ("+eq.code+")":""));
                              }} style={{padding:"10px 14px",cursor:"pointer",
                                borderBottom:"0.5px solid rgba(13,47,92,0.07)",
                                display:"flex",alignItems:"center",gap:10,fontSize:13,color:"#0D2F5C"}}
                                onMouseEnter={e=>e.currentTarget.style.background="#f4f7fd"}

                                  {(eq.code||eq.location)&&(
                                    <div style={{fontSize:11,color:"#8a96a8",marginTop:1}}>
                                      {[eq.code,eq.location].filter(Boolean).join(" · ")}
                                    </div>
                                  )}
                                </div>
                              </div>
                            ))}
                          </div>
                        )}
                      </React.Fragment>
                    );
                  })()}
                </div>
              )}
            </AlmField>
          )}
          </div>

          <AlmField label="Tipo de mantenimiento *">
            <div style={{display:"flex",gap:8}}>
              {["preventivo","correctivo"].map(function(v){
                var act = f.tipo_mtto===v;
                return(
                  <button key={v} type="button" onClick={function(){
                      s("tipo_mtto",v); s("nst","");
                      if(v==="correctivo"){
                        s("equipo_name","");
                        setEquipoSel("");setEqQ("");

                    style={{flex:1,padding:"11px 8px",border:"1.5px solid",borderRadius:8,cursor:"pointer",

                      textTransform:"uppercase",letterSpacing:.3}}>

            {f.tipo_mtto==="preventivo"&&f.equipo_name&&(
              <div style={{marginTop:8,fontSize:12,color:"#1A9647",fontWeight:600,
                background:"#e8f5e9",borderRadius:8,padding:"8px 12px"}}>
                ✓ Asociado a: {f.equipo_name}
              </div>
            )}
            {f.tipo_mtto==="correctivo"&&(

                <div className="ios-input-label">N° Solicitud de Trabajo</div>

          {validErr&&(
            <div style={{
