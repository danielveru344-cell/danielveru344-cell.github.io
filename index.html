          {msg.m}
        </div>
      )}
    </SCard>
  );
}

// ── AdminPanel ────────────────────────────────────────────────────────────────
function AdminPanel({eqs,tecs,metEqs,locEqs,turnos,entries,setEqs,setTecs,setMetEqs,setLocEqs,setTurnos,onDel,onLogout}){
  const [ne,setNe]=useState("");
  // nuevo técnico
  const [ntCode,setNtCode]=useState("");
  const [ntName,setNtName]=useState("");
  const [ntCargo,setNtCargo]=useState(CARGOS[1]);
  const [ntErr,setNtErr]=useState("");
  // edición inline de cargo
  const [editId,setEditId]=useState(null);
  const [editCargo,setEditCargo]=useState("");
  // contraseña
  const [pmMode,setPmMode]=useState(false);
  const [op,setOp]=useState(""); const [np,setNp]=useState(""); const [np2,setNp2]=useState("");
  const [pmsg,setPmsg]=useState(null);

  function addTec(){
    const code=ntCode.trim();
    const name=ntName.trim();
    if(!code){setNtErr("Ingresa el código.");return;}
    if(!name){setNtErr("Ingresa el nombre.");return;}
    if(tecs.find(function(t){return t.code===code;})){setNtErr("Ese código ya existe.");return;}
    const n=tecs.concat([{code:code,name:name,cargo:ntCargo}]);
    setTecs(n);save(KS.tec,n);
    setNtCode("");setNtName("");setNtCargo(CARGOS[1]);setNtErr("");
  }
  function remTec(code){
    if(!confirm("Eliminar técnico M"+code+"?"))return;
    const n=tecs.filter(function(t){return t.code!==code;});
    setTecs(n);save(KS.tec,n);
  }
  function startEdit(t){setEditId(t.code);setEditCargo(t.cargo);}
  function saveEdit(code){
    const n=tecs.map(function(t){return t.code===code?Object.assign({},t,{cargo:editCargo}):t;});
    setTecs(n);save(KS.tec,n);setEditId(null);
  }

  function chPass(){
    if(op!==lg(KS.p,PASS_DEF)){setPmsg({ok:false,m:"Contrasena actual incorrecta"});return;}
    if(np.length<4){setPmsg({ok:false,m:"Minimo 4 caracteres"});return;}
    if(np!==np2){setPmsg({ok:false,m:"No coinciden"});return;}
    save(KS.p,np);setPmsg({ok:true,m:"Contrasena actualizada!"});
    setOp("");setNp("");setNp2("");
    setTimeout(function(){setPmsg(null);},2500);
  }

  return (
    <div>
      <div style={{background:NV,borderRadius:14,padding:"18px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:20}}>
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.45)",fontFamily:"Montserrat",letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Panel de administracion</div>
          <div style={{fontSize:20,fontWeight:800,color:"#fff",fontFamily:"Montserrat"}}>Configuracion</div>
        </div>
        <button className="btn btn-ghost" onClick={onLogout}>Cerrar sesion</button>
      </div>

      {/* ── Técnicos ── */}
      <EqManager
        title="Turnos" col="#0D2F5C" icon={IC.clk}
        items={turnos}
        onSave={function(n){setTurnos(n);save(KS.tur,n);}}
        placeholder={"6:00-14:00\n14:00-22:00\n22:00-6:00"}
        emptyMsg="Sin turnos — se usarán los predeterminados (A, B, C)"/>

      <SCard title="Reportes" col="#C0001A" icon={IC.docs}>
        {entries.length===0
          ?<div style={{padding:"16px",color:"#8a96a8",fontSize:13,textAlign:"center"}}>No hay reportes</div>
          :<div style={{maxHeight:320,overflowY:"auto"}}>
            {entries.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);}).map(function(e){
              return(
                <div key={e.id} className="list-row" style={{gap:10}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:NV,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.tecnico}</div>
                    <div style={{fontSize:11,color:"#8a96a8",fontFamily:"Montserrat",marginTop:2}}>
                      {fD(e.fecha+"T12:00:00")} · {e.turno.split(" ")[0]} {e.turno.split(" ")[1]||""}
                      {e.realizadas.length>0&&<span style={{marginLeft:6}}>· {e.realizadas.length} act.</span>}
                      {e.pendientes.length>0&&<span style={{marginLeft:4,color:"#C45200"}}>· {e.pendientes.length} pend.</span>}
                    </div>
                  </div>
                  <button className="del-btn" onClick={function(){
                    if(confirm("Eliminar reporte de "+e.tecnico+"?\n"+fD(e.fecha+"T12:00:00")))onDel(e.id);
                  }}>
                    <Ico d={IC.trash} sz={12}/>Eliminar
                  </button>
                </div>
              );
            })}
          </div>
        }
        <div style={{padding:"8px 14px",borderTop:"1px solid rgba(13,47,92,0.08)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:11,color:"#8a96a8",fontFamily:"Montserrat",fontWeight:700}}>{entries.length} reporte{entries.length!==1?"s":""} en total</span>
          {entries.length>0&&(
            <button className="btn btn-sm" style={{background:"#FFDEDE",color:"#C0001A",border:"1.5px solid #f5b8b8"}}
              onClick={function(){if(confirm("¿Eliminar TODOS los reportes?\nEsto no se puede deshacer."))entries.forEach(function(e){onDel(e.id);});}}>
              🗑 Borrar todos
            </button>
          )}
        </div>
      </SCard>

      <SCard title="Técnicos" col="#2d7dd2" icon={IC.user}>
        <div>
          {tecs.length===0
            ? <div style={{padding:"14px 16px",color:"#8a96a8",fontSize:13,textAlign:"center"}}>No hay técnicos registrados</div>
            : tecs.map(function(t){
              const sty=CARGO_STY[t.cargo]||{bg:"#e8f0fb",col:NV};

              return (
                <div key={t.code} style={{padding:"12px 16px",borderBottom:".5px solid rgba(13,47,92,0.08)"}}>

                    <div style={{display:"flex",flexDirection:"column",gap:5,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                        <span style={{background:NV,color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:11,padding:"2px 8px",borderRadius:5,letterSpacing:0.5,flexShrink:0}}>M{t.code}</span>
                        <span style={{fontWeight:700,fontSize:14,color:NV}}>{t.name}</span>
                      </div>
                      {isEditing
                        ? <div style={{display:"flex",gap:6,alignItems:"center",marginTop:2}}>
                            <select className="inp" style={{fontSize:12,padding:"5px 8px",flex:1}} value={editCargo}
                              onChange={function(e){setEditCargo(e.target.value);}}>
                              {CARGOS.map(function(c){return <option key={c}>{c}</option>;})}
                            </select>
                            <button className="btn btn-ok btn-sm" onClick={function(){saveEdit(t.code);}}>OK</button>
                            <button className="btn btn-ghost btn-sm" onClick={function(){setEditId(null);}}>✕</button>
                          </div>
                        : <span style={{background:sty.bg,color:sty.col,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,fontFamily:"Montserrat"}}>{t.cargo}</span>
                      }
                    </div>
                    {!isEditing&&(
                      <div style={{display:"flex",gap:6,flexShrink:0}}>
                        <button onClick={function(){startEdit(t);}}
                          style={{background:"none",border:"1px solid rgba(13,47,92,0.2)",borderRadius:7,cursor:"pointer",color:NV,padding:"4px 10px",fontSize:12,fontFamily:"Montserrat",fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
                          ✏ Cargo
                        </button>
                        <button onClick={function(){remTec(t.code);}} className="del-btn">
                          <Ico d={IC.trash} sz={12}/>Quitar
                        </button>
                      </div>
                    )}
                  </div>
                </div>
              );
            })
          }
        </div>
        {/* Form agregar */}
        <div style={{padding:"14px 16px",borderTop:"1px solid rgba(13,47,92,0.10)",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:10,color:"#8a96a8",textTransform:"uppercase",letterSpacing:1}}>Agregar técnico</div>
          <div style={{display:"flex",alignItems:"stretch",borderRadius:8,overflow:"hidden",border:"1.5px solid rgba(13,47,92,0.10)",background:"#f4f7fd"}}>
            <span style={{display:"flex",alignItems:"center",padding:"0 12px",background:NV,color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:14,flexShrink:0,userSelect:"none"}}>M</span>
            <input className="inp" style={{border:"none",borderRadius:0,background:"transparent",flex:"0 0 100px"}}
              placeholder="Código" value={ntCode}
              onChange={function(e){setNtCode(e.target.value.replace(/\D/g,""));setNtErr("");}}
              maxLength={10}/>
          </div>
          <input className="inp" placeholder="Nombre completo" value={ntName}
            onChange={function(e){setNtName(e.target.value);setNtErr("");}}/>
          <select className="inp" value={ntCargo} onChange={function(e){setNtCargo(e.target.value);}}>
            {CARGOS.map(function(c){return <option key={c}>{c}</option>;})}
          </select>
          {ntErr&&<div style={{fontSize:12,color:"#C0001A",fontWeight:600}}>{ntErr}</div>}
          <button className="btn btn-ok btn-sm" onClick={addTec} style={{alignSelf:"flex-end"}}>+ Agregar</button>
        </div>
      </SCard>

      <EqManager
        title="Equipos Mantenimiento" col="#C45200" icon={IC.wrench}
        items={eqs}
        onSave={function(n){setEqs(n);save(KS.eq,n);}}
        placeholder={"EP-322-1 - ENVASADORA PPR\nEB-348-1 - BLISTERA MARCHESINI\n..."}
        emptyMsg="Sin equipos — se usará el listado predeterminado"/>

      <EqManager
        title="Áreas Locativo" col="#C45200" icon={IC.home}
        items={locEqs}
        onSave={function(n){setLocEqs(n);save(KS.loc,n);}}
        placeholder={"DISPENSADO 1 (146)\nENVASE POLVOS (322)\nPASILLO HORIZONTAL 1 (319)\n..."}
        emptyMsg="Sin áreas — se usará el listado predeterminado del cronograma"/>

      <EqManager
        title="Equipos Metrología" col="#7C3AED" icon={IC.tag}
        items={metEqs}
        onSave={function(n){setMetEqs(n);save(KS.met,n);}}
        placeholder={"ME-001 - BALANZA ANALÍTICA METTLER\nME-002 - VERNIER MITUTOYO 150mm\nME-003 - TERMÓMETRO PATRÓN\n..."}
        emptyMsg="Sin equipos — carga la lista cuando la tengas disponible"/>

      <SCard title="Contrasena" col="#6366f1" icon={IC.key}>
        <div style={{padding:16}}>
          {!pmMode
            ? <button onClick={function(){setPmMode(true);}} className="btn btn-ghost" style={{color:"#6366f1",borderColor:"#c7d2fe"}}>
                <Ico d={IC.key} sz={14} c="#6366f1"/>Cambiar contrasena

// ── EqSearch – combobox con búsqueda por código o nombre ─────────────────────
function EqSearch({value,onChange,list,cls}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const ref=useRef();
  const inputRef=useRef();

  useEffect(function(){
    if(!open)return;
    function handler(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener("mousedown",handler);
    return function(){document.removeEventListener("mousedown",handler);};
  },[open]);

  useEffect(function(){
    if(open&&inputRef.current)setTimeout(function(){inputRef.current&&inputRef.current.focus();},30);
  },[open]);

  const filtered=q.trim()
    ?list.filter(function(a){return a.toLowerCase().indexOf(q.toLowerCase())>=0;})
    :list;

  function pick(a){onChange(a);setOpen(false);setQ("");}

  function hl(text,srch){
    if(!srch)return text;
    const lo=text.toLowerCase();const sq=srch.toLowerCase();
    const i=lo.indexOf(sq);
    if(i<0)return text;
    return [text.slice(0,i),React.createElement("mark",{key:"m",style:{background:"#fde68a",color:NV,borderRadius:2,padding:"0 1px"}},text.slice(i,i+srch.length)),text.slice(i+srch.length)];
  }

  return (
    <div ref={ref} style={{position:"relative",flex:1,minWidth:0}} className={cls||""}>
      <div className="inp"
        style={{cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",
          gap:8,padding:"12px 14px",userSelect:"none",minHeight:48,
          background: open?"#fff":"var(--lighter)",
          border: open?"1.5px solid var(--navy)":"1.5px solid var(--border)",
          boxShadow: open?"0 0 0 3px rgba(13,47,92,0.10)":"none",
          transition:"all .15s"}}
        onClick={function(){setOpen(function(o){return !o;});setQ("");}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
          fontSize:14,fontWeight:value?600:400,flex:1,
          color:value?NV:"#8a96a8"}}>
          {value||"Seleccionar área / equipo…"}
        </span>
        <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
          {value&&<div style={{width:6,height:6,borderRadius:"50%",background:"#34C759",flexShrink:0}}/>}
          <Ico d={IC.chev} sz={14} c={open?NV:"#8a96a8"}/>
        </div>
      </div>
      {open&&(
        <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,right:0,minWidth:280,
          background:"#fff",border:"1.5px solid rgba(13,47,92,0.18)",borderRadius:12,
          boxShadow:"0 12px 40px rgba(13,47,92,0.20)",zIndex:1000,
          display:"flex",flexDirection:"column",overflow:"hidden"}}>
          <div style={{padding:"10px 12px",borderBottom:"1px solid rgba(13,47,92,0.08)",background:"#f4f7fd"}}>
            <input ref={inputRef} className="inp" style={{fontSize:14,padding:"9px 12px"}}
              placeholder="🔍  Buscar…" value={q}
              onChange={function(e){setQ(e.target.value);}}
              onClick={function(e){e.stopPropagation();}}/>
          </div>
          <div style={{overflowY:"scroll",maxHeight:260,
            scrollbarWidth:"thin",scrollbarColor:"rgba(13,47,92,0.25) transparent"}}>
            {filtered.length===0
              ?<div style={{padding:"14px 16px",color:"#8a96a8",fontSize:13,textAlign:"center"}}>Sin resultados</div>
              :filtered.map(function(a){
                const sel=a===value;
                return (
                  <div key={a}
                    style={{padding:"11px 16px",cursor:"pointer",fontSize:13,lineHeight:1.4,
                      color:sel?NV:"#334",fontWeight:sel?700:400,
                      background:sel?"#e8f0fb":"transparent",
                      borderBottom:".5px solid rgba(13,47,92,0.05)",
                      display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}
                    onMouseDown={function(e){e.preventDefault();pick(a);}}>
                    <span style={{flex:1,minWidth:0}}>{hl(a,q)}</span>
                    {sel&&<span style={{fontSize:14,color:NV,flexShrink:0}}>✓</span>}
                  </div>
                );
              })
            }
          </div>
          <div style={{padding:"7px 12px",fontSize:10,color:"#8a96a8",fontFamily:"Montserrat",
            fontWeight:700,letterSpacing:.5,borderTop:"1px solid rgba(13,47,92,0.07)",
            display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fafbfd"}}>
            <span>{filtered.length} resultado{filtered.length!==1?"s":""}</span>
            <span style={{color:"rgba(13,47,92,0.35)"}}>toca para seleccionar</span>
          </div>
        </div>
      )}
    </div>
  );
}

            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,color:"#8a96a8",letterSpacing:.5}}>FIN</span>
              <div style={{display:"flex",gap:4}}>
                <input type="time" className={"inp"+(hiErr?" inp-err":"")}
                  style={{flex:1,minWidth:0,fontSize:13}} value={r.hf} max={maxT}
                  onChange={function(e){onUpd("hf",e.target.value);}}/>
                <button onClick={function(){onUpd("hf",nowT());}}
                  style={{background:"#e8f0fb",color:NV,border:"none",borderRadius:8,
                    padding:"0 8px",fontSize:11,fontFamily:"Montserrat",fontWeight:700,
                    cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}}>
                  ⏱
                </button>
              </div>
            </div>
          </div>
        )}
        {!isTime&&(
          <div style={{display:"flex",gap:6}}>
            {PRIOS.map(function(pr){return(
              <button key={pr} onClick={function(){onUpd("p",pr);}}
                style={{padding:"7px 14px",borderRadius:20,border:"1.5px solid",cursor:"pointer",
                  fontFamily:"Montserrat",fontWeight:700,fontSize:12,transition:"all .12s",
                  background:r.p===pr?PBG[pr]:"#f4f7fd",
                  color:r.p===pr?PCOL[pr]:"#8a96a8",
                  borderColor:r.p===pr?PCOL[pr]+"66":"transparent"}}>
                {pr}
              </button>
            );})}
          </div>
        )}
        <textarea className="inp" rows={2} style={{resize:"vertical",minHeight:48,fontSize:14}}
          placeholder={isTime?"¿Qué se hizo?":"¿Qué queda pendiente?"}
          value={r.desc} onChange={function(e){onUpd("desc",e.target.value);}}/>
      </div>
    </div>
  );
}

function RBar(p){
  const pct=p.mx>0?Math.round(p.val/p.mx*100):0;
  return(
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
      <span style={{fontSize:11,color:"#8a96a8",width:"35%",maxWidth:120,minWidth:0,
        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0}} title={p.lbl}>{p.lbl}</span>
      <div style={{flex:1,height:9,background:"#e8f0fb",borderRadius:5,overflow:"hidden",minWidth:0}}>
        <div style={{height:"100%",width:pct+"%",background:p.col||NV,borderRadius:5,transition:"width .5s"}}/>
      </div>
      <span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:800,minWidth:36,textAlign:"right",
        color:p.col||NV,flexShrink:0}}>{p.val}{p.sfx||""}</span>
    </div>
  );
}

function KCard(p){
  return(
    <div className="stat-card" onClick={p.onClick}
      style={{cursor:p.onClick?"pointer":"default",transition:"transform .12s, box-shadow .12s"}}
      onMouseEnter={function(e){if(p.onClick){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(13,47,92,0.13)";}}}
      onMouseLeave={function(e){e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";}}>
      <Ico d={p.icon} sz={18} c={p.col}/>
      <div className="stat-val" style={{color:p.col,fontSize:22,marginTop:8}}>{p.val}</div>
      <div className="stat-lbl">{p.lbl}</div>
      {p.sub&&<div style={{fontSize:11,color:"#8a96a8",marginTop:3,fontWeight:500}}>{p.sub}</div>}
      {p.onClick&&<div style={{fontSize:9,color:"#b0bac8",marginTop:4,fontFamily:"Montserrat",fontWeight:600,letterSpacing:.3}}>VER DETALLE →</div>}
    </div>
  );
}

function AnalCard(p){
  return(
    <div id={p.id||undefined} className="card" style={{marginBottom:0}}>
      <div className="card-hdr"><Ico d={p.icon} sz={15} c={p.col}/><span className="stitle" style={{color:p.col}}>{p.title}</span></div>
      <div className="card-body">{p.children}</div>
    </div>
  );
}

// ── NewForm ───────────────────────────────────────────────────────────────────
function NewForm({onSave,onCancel,eqs,tecs,metEqs,locEqs,turnos,initialUser}){
  const turnosList=turnos&&turnos.length>0?turnos:TURNOS_DEF;
  const eqList=eqs.length>0?eqs:AREAS_DEF;
  const locList=locEqs&&locEqs.length>0?locEqs:AREAS_LOC;
  const OTRA="✏ Otra actividad...";

  function detectTurno(){
    const cm=new Date().getHours()*60+new Date().getMinutes();
    for(let i=0;i<turnosList.length;i++){
      const m=turnosList[i].match(/(\d+):(\d+)\s*[-–]\s*(\d+):(\d+)/);
      if(m){
        const s=parseInt(m[1])*60+parseInt(m[2]);
        const e=parseInt(m[3])*60+parseInt(m[4]);
        if(e>s){if(cm>=s&&cm<e)return turnosList[i];}
        else{if(cm>=s||cm<e)return turnosList[i];}
      }
    }
    return turnosList[0];
  }

  const tecMap={}; tecs.forEach(function(t){tecMap[t.code]=t;});

  // Pre-seleccionar técnico desde usuario logueado
  const initialCode = React.useMemo(function(){
    if(!initialUser||!tecs.length) return "";
    var nombre = (initialUser.nombre||"").toLowerCase();
    var found = tecs.find(function(t){
      return t.name && t.name.toLowerCase().includes(nombre.split(" ")[0]);
    });
    return found ? found.code : "";
  }, [initialUser, tecs]);

  const [tecCode,setTecCode]=useState(function(){ return initialCode||""; });
  const [manualMode,setManualMode]=useState(false);
  const [tecSearch,setTecSearch]=useState("");
  const [pendingTec,setPendingTec]=useState(null);
  const [confirmCode,setConfirmCode]=useState("");
  const [confirmErr,setConfirmErr]=useState(false);
  const [turno,setTurno]=useState(function(){return detectTurno();});
  const [fecha,setFecha]=useState(new Date().toISOString().slice(0,10));
  const [obs,setObs]=useState("");
  const tecObj=tecMap[tecCode]||null;
  const tecName=tecObj?tecObj.name:"";
  const isLocativo=tecObj&&tecObj.cargo==="Auxiliar de Mantenimiento Locativo";
  const isMetrologia=tecObj&&tecObj.cargo==="Técnico de Metrología";
  const baseList=isLocativo?locList:isMetrologia?(metEqs.length>0?metEqs:eqList):eqList;
  const aList=baseList.concat([OTRA]);

  const [real,setReal]=useState([{id:gid(),area:aList[0],otraArea:"",desc:"",hi:"",hf:""}]);
  const [pend,setPend]=useState([{id:gid(),area:aList[0],otraArea:"",desc:"",p:"Media"}]);

  // Cuando el técnico se loguea, resetear las áreas al primer valor correcto para su cargo
  useEffect(function(){
    if(!tecObj) return;
    const newBase=isLocativo?locList:isMetrologia?(metEqs.length>0?metEqs:eqList):eqList;
    const first=(newBase.concat([OTRA]))[0];
    setReal(function(r){return r.map(function(x){return Object.assign({},x,{area:first,otraArea:""});});});
    setPend(function(p){return p.map(function(x){return Object.assign({},x,{area:first,otraArea:""});});});
  },[tecObj]);

  function addR(){setReal(function(r){return r.concat([{id:gid(),area:aList[0],otraArea:"",desc:"",hi:"",hf:""}]);});}
  function remR(id){setReal(function(r){return r.filter(function(x){return x.id!==id;});});}
  function updR(id,k,v){setReal(function(r){return r.map(function(x){if(x.id===id){const n=Object.assign({},x);n[k]=v;return n;}return x;});});}
  function addP(){setPend(function(p){return p.concat([{id:gid(),area:aList[0],otraArea:"",desc:"",p:"Media"}]);});}
  function remP(id){setPend(function(p){return p.filter(function(x){return x.id!==id;});});}
  function updP(id,k,v){setPend(function(p){return p.map(function(x){if(x.id===id){const n=Object.assign({},x);n[k]=v;return n;}return x;});});}

  function resolveArea(item){return item.area===OTRA?(item.otraArea.trim()||"Otra actividad"):item.area;}

  function doSave(){
    if(!tecCode.trim()||!tecName){alert("Selecciona un técnico válido.");return;}
    const acts=real.filter(function(r){return r.desc.trim();}).map(function(r){return Object.assign({},r,{area:resolveArea(r)});});
    if(acts.length===0){alert("⚠️ Debes registrar al menos una actividad realizada antes de guardar.");return;}
    if(fecha>todayS()){alert("⚠️ La fecha del reporte no puede ser futura.");return;}
    const now=nowT();const hoy=fecha===todayS();
    for(let i=0;i<acts.length;i++){
      const r=acts[i];
      if(!r.hi||!r.hf){alert("Completa hora inicio y fin de:\n"+r.desc);return;}
      if(r.hf<=r.hi){alert("Hora fin debe ser posterior a inicio.");return;}
      if(hoy&&r.hi>now){alert("Hora inicio ("+r.hi+") no puede ser futura.");return;}
      if(hoy&&r.hf>now){alert("Hora fin ("+r.hf+") no puede ser futura.");return;}
    }
    // Validar cruces de horario entre actividades
    function toMin(t){const p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
    for(let i=0;i<acts.length;i++){
      for(let j=i+1;j<acts.length;j++){
        const a=acts[i],b=acts[j];
        const a1=toMin(a.hi),a2=toMin(a.hf),b1=toMin(b.hi),b2=toMin(b.hf);
        if(a1<b2&&b1<a2){
          alert("⚠️ Las actividades "+(i+1)+" y "+(j+1)+" se cruzan en el tiempo:\n\n"
            +"  Actividad "+(i+1)+": "+a.hi+" – "+a.hf+"\n"
            +"  Actividad "+(j+1)+": "+b.hi+" – "+b.hf+"\n\n"
            +"Ajusta los horarios antes de guardar.");
          return;
        }
      }
    }
    const pends=pend.filter(function(p){return p.desc.trim();}).map(function(p){return Object.assign({},p,{area:resolveArea(p)});});
    onSave({id:gid(),createdAt:ts(),fecha:fecha,turno:turno,tecnico:"M"+tecCode+" · "+tecName,
      realizadas:acts,pendientes:pends,obs:obs.trim()});
  }

  // ── Pantalla 1: Selección de técnico ──────────────────────────────────────
  if(!tecObj){
    const filtered=tecSearch.trim()
      ?tecs.filter(function(t){return(t.name+t.code).toLowerCase().indexOf(tecSearch.toLowerCase())>=0;})
      :tecs;

    return (
      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        <div>
          <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:22,color:NV,letterSpacing:-.3}}>¿Quién eres?</div>
          <div style={{color:"#8a96a8",fontSize:13,marginTop:4}}>Toca tu nombre para comenzar el reporte</div>
        </div>

        {tecs.length>0&&(
          <input className="inp" placeholder="🔍  Buscar por nombre..." value={tecSearch}
            onChange={function(e){setTecSearch(e.target.value);}}
            style={{fontSize:14}}/>
        )}

        {tecs.length===0&&!manualMode&&(
          <div style={{textAlign:"center",color:"#8a96a8",padding:"30px 0",border:"2px dashed rgba(13,47,92,0.12)",borderRadius:14,background:"#fff"}}>
            No hay técnicos registrados.<br/>
            <span style={{fontSize:12}}>El admin debe agregarlos primero.</span>
          </div>
        )}

        <div className="tec-scroll" style={{display:"flex",overflowX:"auto",gap:12,paddingBottom:8,
          scrollSnapType:"x mandatory",WebkitOverflowScrolling:"touch",
          marginLeft:-14,marginRight:-14,paddingLeft:14,paddingRight:14}}>
          {filtered.map(function(t){
            const sty=CARGO_STY[t.cargo]||{bg:"#e8f0fb",col:NV};
            const ini=t.name.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase();
            return(
              <button key={t.code} onClick={function(){setPendingTec(t);setConfirmCode("");setConfirmErr(false);}}
                style={{background:"#fff",border:"2px solid rgba(13,47,92,0.10)",borderRadius:16,
                  padding:"16px 14px",cursor:"pointer",textAlign:"left",flexShrink:0,
                  width:152,scrollSnapAlign:"start",
                  boxShadow:"0 2px 12px rgba(13,47,92,0.07)",
                  WebkitTapHighlightColor:"transparent"}}>
                <div style={{width:44,height:44,borderRadius:12,background:NV,
                  display:"flex",alignItems:"center",justifyContent:"center",marginBottom:10}}>
                  <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:17,letterSpacing:-.5}}>{ini}</span>
                </div>
                <div style={{fontWeight:700,fontSize:14,color:NV,lineHeight:1.3,marginBottom:6}}>{t.name}</div>
                <span style={{background:sty.bg,color:sty.col,padding:"3px 9px",borderRadius:20,
                  fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>{t.cargo}</span>
              </button>
            );
          })}
        </div>

        {tecs.length>2&&(
          <div style={{textAlign:"center",fontSize:11,color:"#b0bac8",fontFamily:"Montserrat",fontWeight:600,letterSpacing:.3,marginTop:-4}}>
            ← desliza para ver más →
          </div>
        )}

        {/* Modal de confirmación de código */}
        {pendingTec&&(function(){
          const psty=CARGO_STY[pendingTec.cargo]||{bg:"#e8f0fb",col:NV};
          const ini=pendingTec.name.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase();
          function tryConfirm(){
            if(confirmCode.trim()===pendingTec.code){
              setTecCode(pendingTec.code);setPendingTec(null);setConfirmCode("");setConfirmErr(false);
            } else {
              setConfirmErr(true);setConfirmCode("");
              setTimeout(function(){setConfirmErr(false);},1400);
            }
          }
          return(
            <div style={{position:"fixed",inset:0,background:"rgba(9,31,62,.55)",zIndex:400,
              display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(4px)"}}>
              <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:360,
                boxShadow:"0 24px 64px rgba(0,0,0,.22)"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
                  <div style={{width:50,height:50,borderRadius:14,background:NV,display:"flex",
                    alignItems:"center",justifyContent:"center",flexShrink:0}}>
                    <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:19}}>{ini}</span>
                  </div>
                  <div>
                    <div style={{fontWeight:700,fontSize:16,color:NV}}>{pendingTec.name}</div>
                    <span style={{background:psty.bg,color:psty.col,padding:"2px 8px",borderRadius:20,
                      fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>{pendingTec.cargo}</span>
                  </div>
                </div>
                <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:13,color:NV,marginBottom:4}}>
                  Confirma tu código M
                </div>
                <div style={{fontSize:12,color:"#8a96a8",marginBottom:14}}>
                  Ingresa tu número de técnico para verificar tu identidad
                </div>
                <div style={{display:"flex",alignItems:"stretch",borderRadius:10,overflow:"hidden",
                  border:"2px solid "+(confirmErr?"#C0001A":"rgba(13,47,92,0.18)"),marginBottom:8,
                  transition:"border-color .15s"}}>
                  <span style={{display:"flex",alignItems:"center",padding:"0 14px",background:NV,
                    color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:16,flexShrink:0}}>M</span>
                  <input className="inp" style={{border:"none",borderRadius:0,background:"transparent",flex:1,
                    fontSize:22,fontFamily:"Montserrat",fontWeight:800,letterSpacing:3,
                    color:confirmErr?"#C0001A":NV}}
                    placeholder="·····" value={confirmCode} maxLength={10} autoFocus
                    onChange={function(e){setConfirmCode(e.target.value.replace(/\D/g,""));setConfirmErr(false);}}
                    onKeyDown={function(e){if(e.key==="Enter")tryConfirm();}}/>
                </div>
                {confirmErr&&(
                  <div style={{fontSize:12,color:"#C0001A",fontWeight:700,fontFamily:"Montserrat",
                    textAlign:"center",marginBottom:10}}>
                    Código incorrecto. Intenta de nuevo.
                  </div>
                )}
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button className="btn btn-ghost" style={{flex:1}}
                    onClick={function(){setPendingTec(null);setConfirmCode("");setConfirmErr(false);}}>
                    Cancelar
                  </button>
                  <button className="btn btn-navy" style={{flex:1,opacity:confirmCode?1:0.4}}
                    onClick={tryConfirm}>
                    Confirmar
                  </button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* Manual M code fallback */}
        {manualMode?(
          <div style={{background:"#fff",border:"1.5px solid rgba(13,47,92,0.12)",borderRadius:14,padding:16,display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:12,color:"#8a96a8"}}>INGRESAR CÓDIGO MANUAL</div>
            <div style={{display:"flex",alignItems:"stretch",borderRadius:8,overflow:"hidden",border:"1.5px solid rgba(13,47,92,0.12)",background:"#f4f7fd"}}>
              <span style={{display:"flex",alignItems:"center",padding:"0 13px",background:NV,color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:15}}>M</span>
              <input className="inp" style={{border:"none",borderRadius:0,background:"transparent",flex:1}}
                placeholder="Código" value={tecCode} maxLength={10}
                onChange={function(e){setTecCode(e.target.value.replace(/\D/g,""));}}
                autoFocus/>
            </div>
            {tecCode&&!tecObj&&<div style={{fontSize:12,color:"#C0001A",fontWeight:600}}>Código no registrado</div>}
            <button className="btn btn-ghost btn-sm" onClick={function(){setManualMode(false);setTecCode("");}}>Volver</button>
          </div>
        ):(
          <button onClick={function(){setManualMode(true);}}
            style={{background:"none",border:"none",color:"#8a96a8",cursor:"pointer",fontSize:12,
              fontFamily:"Montserrat",fontWeight:600,textDecoration:"underline",padding:"4px 0",textAlign:"center"}}>
            Ingresar código manualmente
          </button>
        )}

        <button className="btn btn-ghost" onClick={onCancel} style={{marginTop:4}}>Cancelar</button>
      </div>
    );
  }

  // ── Pantalla 2: Formulario de reporte ─────────────────────────────────────
  const sty=CARGO_STY[tecObj.cargo]||{bg:"#e8f0fb",col:NV};
  const maxT=fecha===todayS()?nowT():undefined;

  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Técnico banner */}
      <div style={{background:"#fff",border:"2px solid rgba(13,47,92,0.12)",borderRadius:16,padding:"14px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:42,height:42,borderRadius:11,background:NV,display:"flex",alignItems:"center",
            justifyContent:"center",flexShrink:0}}>
            <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:16}}>
              {tecObj.name.split(" ").slice(0,2).map(function(w){return w[0]||"";}).join("").toUpperCase()}
            </span>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:NV}}>{tecObj.name}</div>
            <span style={{background:sty.bg,color:sty.col,padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:700,fontFamily:"Montserrat"}}>{tecObj.cargo}</span>
          </div>
        </div>
        <button onClick={function(){setTecCode("");}}
          style={{background:"none",border:"1px solid rgba(13,47,92,0.18)",borderRadius:8,
            cursor:"pointer",color:"#8a96a8",padding:"5px 10px",fontSize:11,fontFamily:"Montserrat",fontWeight:700}}>
          Cambiar
        </button>
      </div>

      {/* Fecha + Turno */}
      <div style={{background:"#fff",border:"1.5px solid rgba(13,47,92,0.10)",borderRadius:16,overflow:"hidden"}}>
        <div style={{display:"flex"}}>
          <div style={{flex:1,padding:"12px 14px",borderRight:"1px solid rgba(13,47,92,0.08)"}}>
            <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,color:"#8a96a8",letterSpacing:.5,marginBottom:5}}>FECHA</div>
            <input type="date" className="inp" value={fecha} style={{border:"none",padding:0,background:"transparent",fontSize:14,fontWeight:600,color:NV}}
              onChange={function(e){setFecha(e.target.value);}}/>
          </div>
          <div style={{flex:1,padding:"12px 14px"}}>
            <div style={{fontFamily:"Montserrat",fontWeight:700,fontSize:10,color:"#8a96a8",letterSpacing:.5,marginBottom:5}}>TURNO</div>
            <select className="inp" value={turno} style={{border:"none",padding:0,background:"transparent",fontSize:13,fontWeight:600,color:NV,width:"100%"}}
              onChange={function(e){setTurno(e.target.value);}}>
              {turnosList.map(function(t){return <option key={t}>{t}</option>;})}
            </select>
          </div>
        </div>
      </div>

      {/* Realizadas */}
      <div>
        <SecHdr label="Realizadas" col="#1D7A3E"
          count={real.filter(function(r){return r.desc.trim();}).length}
          onAdd={addR} addLabel="Nueva actividad"/>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {real.map(function(r,i){return(
            <ActivityCard key={r.id} r={r} i={i} isTime={true} aList={aList} OTRA={OTRA} maxT={maxT}
              onRem={function(){remR(r.id);}}
              onUpd={function(k,v){updR(r.id,k,v);}}/>
          );})}
        </div>
      </div>

      {/* Pendientes */}
      <div>
        <SecHdr label="Pendientes" col="#C45200"
          count={pend.filter(function(p){return p.desc.trim();}).length}
          onAdd={addP} addLabel="Nueva pendiente"/>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {pend.map(function(p,i){return(
            <ActivityCard key={p.id} r={p} i={i} isTime={false} aList={aList} OTRA={OTRA} maxT={maxT}
              onRem={function(){remP(p.id);}}
              onUpd={function(k,v){updP(p.id,k,v);}}/>
          );})}
        </div>
      </div>

      {/* Observaciones */}
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
          <div style={{width:4,height:18,borderRadius:4,background:"#8a96a8"}}/>
          <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:13,color:"#8a96a8",textTransform:"uppercase",letterSpacing:.5}}>Observaciones</span>
        </div>
        <textarea className="inp" rows={3} style={{minHeight:72,resize:"vertical",fontSize:14}}
          placeholder="Novedades del turno, incidentes, entregas especiales..."
          value={obs} onChange={function(e){setObs(e.target.value);}}/>
      </div>

      {/* Actions */}
      <div style={{display:"flex",flexDirection:"column",gap:8,paddingBottom:8}}>
        <button className="btn btn-navy" onClick={doSave}
          style={{padding:"14px",fontSize:14,borderRadius:12}}>

function ReportesView(props){
  const [q,setQ]=useState("");

  const [exp,setExp]=useState({});
  const [sf,setSf]=useState(false);

  function toggleExp(id){const n=Object.assign({},exp);n[id]=!n[id];setExp(n);}
  function reset(){setQ("");setTrn("Todos");setAr("Todas");setPr("Todas");setSp(false);setDe("");setHa("");}
  const fa=!!(q||trn!=="Todos"||ar!=="Todas"||pr!=="Todas"||sp||de||ha);

  const entries=props.entries;
  const allAreas=[];
  entries.forEach(function(e){
    e.realizadas.forEach(function(r){if(allAreas.indexOf(r.area)<0)allAreas.push(r.area);});
    e.pendientes.forEach(function(p){if(allAreas.indexOf(p.area)<0)allAreas.push(p.area);});
  });
  allAreas.sort();

  const sorted=entries.slice().sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt);});
  const fil=sorted.filter(function(e){
    const ql=q.toLowerCase();
    if(ql&&!(e.tecnico.toLowerCase().indexOf(ql)>=0
      ||e.realizadas.some(function(r){return r.desc.toLowerCase().indexOf(ql)>=0||r.area.toLowerCase().indexOf(ql)>=0;})
      ||e.pendientes.some(function(p){return p.desc.toLowerCase().indexOf(ql)>=0;})
      ||e.obs.toLowerCase().indexOf(ql)>=0))return false;
    if(trn!=="Todos"&&e.turno!==trn)return false;
    if(ar!=="Todas"&&!e.realizadas.some(function(r){return r.area===ar;})&&!e.pendientes.some(function(p){return p.area===ar;}))return false;
    if(pr!=="Todas"&&!e.pendientes.some(function(p){return p.p===pr;}))return false;
    if(sp&&e.pendientes.length===0)return false;
    if(de&&isoDay(e.createdAt)<de)return false;
    if(ha&&isoDay(e.createdAt)>ha)return false;
    return true;
  });

  const groups=[]; let lastD=null;
  fil.forEach(function(e){const d=isoDay(e.createdAt);if(d!==lastD){groups.push({d:d,es:[]});lastD=d;}groups[groups.length-1].es.push(e);});

        <div className="card" style={{padding:14}}>
          <div className="fg3" style={{marginBottom:10}}>
            <BtkField label="Turno"><select className="inp" value={trn} onChange={function(e){setTrn(e.target.value);}}><option>Todos</option>{(props.turnos||TURNOS_DEF).map(function(t){return <option key={t}>{t}</option>;})}</select></BtkField>
            <BtkField label="Area"><select className="inp" value={ar} onChange={function(e){setAr(e.target.value);}}><option>Todas</option>{allAreas.map(function(a){return <option key={a}>{a}</option>;})}</select></BtkField>
            <BtkField label="Prioridad"><select className="inp" value={pr} onChange={function(e){setPr(e.target.value);}}><option>Todas</option>{PRIOS.map(function(p){return <option key={p}>{p}</option>;})}</select></BtkField>
          </div>

            <BtkField label="Desde"><input type="date" className="inp" value={de} onChange={function(e){setDe(e.target.value);}}/></BtkField>
            <BtkField label="Hasta"><input type="date" className="inp" value={ha} onChange={function(e){setHa(e.target.value);}}/></BtkField>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#8a96a8",fontWeight:500}}>
              <input type="checkbox" checked={sp} onChange={function(e){setSp(e.target.checked);}} style={{accentColor:NV,width:16,height:16}}/>

      </div>

      {fil.length===0
        ? <div style={{textAlign:"center",color:"#8a96a8",padding:"50px 20px",border:"2px dashed rgba(13,47,92,0.12)",borderRadius:14,background:"#fff"}}>
            <div style={{marginTop:10,fontSize:14,fontWeight:500}}>Sin reportes para los filtros seleccionados.</div>

              </div>
            );})}
          </div>
      }
    </div>
  );
}

// ── AnalisisView ──────────────────────────────────────────────────────────────
function AnalisisView(props){
  const entries=props.entries;
  function dm(a,b){if(!a||!b)return 0;const p=function(s){const x=s.split(":");return parseInt(x[0])*60+parseInt(x[1]);};const d=p(b)-p(a);return d>0?d:0;}
  function fm(m){if(!m)return"--";const h=Math.floor(m/60),mn=m%60;return h>0?h+"h"+(mn>0?" "+mn+"min":""):mn+"min";}

  const eqMap={};
  entries.forEach(function(entry){
    entry.realizadas.forEach(function(r){
      var key = r.equipo && r.equipo.trim() ? r.equipo.trim() : null;
      if(!key) return;
      if(!eqMap[key])eqMap[key]={area:key,iv:0,min:0,pend:0,alta:0};
      eqMap[key].iv++;eqMap[key].min+=dm(r.hi,r.hf);
    });
    entry.pendientes.forEach(function(p){
      var key = p.equipo && p.equipo.trim() ? p.equipo.trim() : null;
      if(!key) return;
      if(!eqMap[key])eqMap[key]={area:key,iv:0,min:0,pend:0,alta:0};
      eqMap[key].pend++;if(p.p==="Alta")eqMap[key].alta++;
    });
  });
  const eqs=Object.values(eqMap);
  const topI=eqs.slice().sort(function(a,b){return b.iv-a.iv;}).slice(0,8);
  const topT=eqs.filter(function(e){return e.min>0;}).sort(function(a,b){return b.min-a.min;}).slice(0,8);
  const topP=eqs.filter(function(e){return e.pend>0;}).sort(function(a,b){return b.pend-a.pend;}).slice(0,6);
  const mxI=topI[0]?topI[0].iv:1; const mxT=topT[0]?topT[0].min:1; const mxP=topP[0]?topP[0].pend:1;

  const PARTES=["rodamiento","cojinete","correa","banda","cadena","sello","empaque","o-ring","filtro","aceite","lubricante","sensor","encoder","valvula","fusible","relay","contactor","breaker","variador","motor","bomba","compresor"];
  const pc={};
  entries.forEach(function(entry){
    entry.realizadas.concat(entry.pendientes).forEach(function(item){
      const txt=(item.desc||"").toLowerCase();
      const area=item.area||"Sin área";
      PARTES.forEach(function(p){
        if(txt.indexOf(p)>=0){
          if(!pc[p])pc[p]={total:0,areas:{}};
          pc[p].total++;
          pc[p].areas[area]=(pc[p].areas[area]||0)+1;
        }
      });
    });
  });
  const ptop=Object.entries(pc).sort(function(a,b){return b[1].total-a[1].total;}).slice(0,16);

  const tm={};entries.forEach(function(e){tm[e.tecnico]=(tm[e.tecnico]||0)+1;});
  const ptec=Object.entries(tm).sort(function(a,b){return b[1]-a[1];}).slice(0,8);
  const mxTec=ptec[0]?ptec[0][1]:1;

  // Distribución por turno — usa los turnos reales del dataset
  const [expandedPart,setExpandedPart]=useState(null);
  const trMap={};
  entries.forEach(function(e){trMap[e.turno]=(trMap[e.turno]||0)+1;});
  const trEntries=Object.entries(trMap).sort(function(a,b){return b[1]-a[1];});
  const totTr=trEntries.reduce(function(s,x){return s+x[1];},0)||1;
  const TR_COLS=["#2d7dd2","#C45200","#6366f1","#1D7A3E","#7C3AED","#B45309"];

  const totIv=entries.reduce(function(a,e){return a+e.realizadas.length;},0);
  const totMin=entries.reduce(function(a,e){return a+e.realizadas.reduce(function(b,r){return b+dm(r.hi,r.hf);},0);},0);
  const totP=entries.reduce(function(a,e){return a+e.pendientes.length;},0);
  const totA=entries.reduce(function(a,e){return a+e.pendientes.filter(function(p){return p.p==="Alta";}).length;},0);

  const hoy=new Date();
  const trend14=[];
  for(let i=13;i>=0;i--){
    const d=new Date(hoy);d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const lbl=d.toLocaleDateString("es-CO",{day:"2-digit",month:"short"});
    const cnt=entries.filter(function(e){return isoDay(e.createdAt)===key;}).reduce(function(a,e){return a+e.realizadas.length;},0);
    trend14.push({l:lbl,v:cnt});
  }

  // ── Predicción de fallos ──────────────────────────────────────────────────
  const ms14=14*24*60*60*1000;
  const cut14=new Date(hoy-ms14);
  const cut28=new Date(hoy-2*ms14);
  const rcnt={};const ocnt={};
  entries.forEach(function(entry){
    const d2=new Date(entry.createdAt);
    const isR=d2>=cut14;const isO=d2>=cut28&&d2<cut14;
    entry.realizadas.forEach(function(r){
      var key=r.equipo&&r.equipo.trim()?r.equipo.trim():null;
      if(!key) return;
      if(isR)rcnt[key]=(rcnt[key]||0)+1;
      if(isO)ocnt[key]=(ocnt[key]||0)+1;
    });
  });
  const eqArr=Object.values(eqMap);
  const mxIvP=eqArr.reduce(function(m,e){return Math.max(m,e.iv);},1);
  const mxPendP=eqArr.reduce(function(m,e){return Math.max(m,e.pend);},1);
  const mxAltaP=eqArr.reduce(function(m,e){return Math.max(m,e.alta);},1);
  const predictions=eqArr.map(function(e){
    let score=0;const reasons=[];
    if(e.alta>0){score+=(e.alta/mxAltaP)*38;reasons.push(e.alta+" pendiente"+(e.alta>1?"s":"")+" prioridad Alta");}
    if(e.pend>0){score+=(e.pend/mxPendP)*18;if(e.alta===0)reasons.push(e.pend+" pendiente"+(e.pend>1?"s":"")+" sin resolver");}
    if(e.iv>0){score+=(e.iv/mxIvP)*18;if(e.iv>=3)reasons.push("Alta frecuencia: "+e.iv+" intervenciones");}
    const rc=rcnt[e.area]||0;const oc=ocnt[e.area]||0;
    if(rc>oc&&rc>1){score+=Math.min((rc-oc)/Math.max(oc,1)*20,22);reasons.push("Intervenciones en aumento (últ. 14 días)");}
    const avgMin=e.iv>0?e.min/e.iv:0;
    if(avgMin>90){score+=12;reasons.push("Intervenciones prolongadas (prom. "+Math.round(avgMin)+"min)");}
    else if(avgMin>45){score+=6;}
    return Object.assign({},e,{score:Math.min(Math.round(score),100),reasons:reasons.slice(0,3)});
  }).filter(function(e){return e.score>12;}).sort(function(a,b){return b.score-a.score;}).slice(0,7);

  if(!entries.length)return(
    <div style={{textAlign:"center",color:"#8a96a8",padding:"60px 20px",border:"2px dashed rgba(13,47,92,0.12)",borderRadius:14,background:"#fff"}}>
      <div style={{marginTop:10,fontSize:14,fontWeight:500}}>Sin datos. Registra actividades para ver el analisis.</div>
    </div>
  );



  return(
    <div style={{display:"flex",flexDirection:"column",gap:18}}>
      <div className="kpi4">
        <KCard lbl="Intervenciones" val={totIv} icon={IC.wrench} col={NV} sub={entries.length+" reportes"}
          onClick={function(){document.getElementById("ac-interv")&&document.getElementById("ac-interv").scrollIntoView({behavior:"smooth",block:"start"});}}/>
        <KCard lbl="Tiempo total" val={fm(totMin)} icon={IC.clk} col="#2d7dd2" sub="horas registradas"
          onClick={function(){document.getElementById("ac-tiempo")&&document.getElementById("ac-tiempo").scrollIntoView({behavior:"smooth",block:"start"});}}/>
        <KCard lbl="Pendientes" val={totP} icon={IC.alert} col="#C45200" sub={totA+" prioridad Alta"}
          onClick={function(){document.getElementById("ac-pend")&&document.getElementById("ac-pend").scrollIntoView({behavior:"smooth",block:"start"});}}/>
        <KCard lbl="Equipos" val={eqs.length} icon={IC.cpu} col="#1D7A3E" sub="con registros"
          onClick={function(){document.getElementById("ac-resumen")&&document.getElementById("ac-resumen").scrollIntoView({behavior:"smooth",block:"start"});}}/>
      </div>

      <div className="a2">
        <AnalCard id="ac-interv" title="Intervenciones por equipo" icon={IC.wrench} col={NV}>
          {topI.length===0?<span style={{color:"#8a96a8",fontSize:13}}>Sin datos</span>
            :topI.map(function(e,i){return <RBar key={e.area} lbl={e.area} val={e.iv} mx={mxI} col={i===0?NV:"#2d7dd2"}/>;}) }
        </AnalCard>
        <AnalCard id="ac-tiempo" title="Tiempo de intervencion" icon={IC.clk} col="#2d7dd2">
          {topT.length===0?<span style={{color:"#8a96a8",fontSize:13}}>Registra horas inicio/fin para ver esto</span>
            :topT.map(function(e,i){return(
              <div key={e.area} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{fontSize:11,color:"#8a96a8",width:"35%",maxWidth:120,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0}}>{e.area}</span>
                <div style={{flex:1,height:9,background:"#e8f0fb",borderRadius:5,overflow:"hidden",minWidth:0}}>
                  <div style={{height:"100%",width:Math.round(e.min/mxT*100)+"%",background:i===0?"#2d7dd2":"#93c5fd",borderRadius:4,transition:"width .5s"}}/>
                </div>
                <span style={{fontFamily:"Montserrat",fontSize:11,fontWeight:800,minWidth:36,textAlign:"right",color:"#2d7dd2",flexShrink:0}}>{fm(e.min)}</span>
              </div>
            );}) }
        </AnalCard>
      </div>

      <AnalCard title="Intervenciones - ultimos 14 dias" icon={IC.bar} col="#6366f1">
        <BarChart14 data={trend14}/>
      </AnalCard>

      <AnalCard title="Predicción de próximos fallos" icon={IC.alert} col="#C0001A">
        {predictions.length===0
          ?<div style={{color:"#8a96a8",fontSize:13,textAlign:"center",padding:"8px 0"}}>
            Sin suficientes datos para predecir. Registra más reportes con pendientes y actividades.
           </div>
          :<div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div style={{fontSize:11,color:"#8a96a8",marginBottom:2}}>
              Basado en pendientes, frecuencia de intervenciones y tendencia reciente. Mayor puntaje = mayor riesgo.
            </div>
            {predictions.map(function(e,idx){
              const nivel=e.score>=65?"Alto":e.score>=35?"Medio":"Bajo";
              const col=e.score>=65?"#C0001A":e.score>=35?"#C45200":"#1D7A3E";
              const bg=e.score>=65?"#FFDEDE":e.score>=35?"#FFF0D9":"#D1F2E0";
              return(
                <div key={e.area} style={{border:"1px solid "+col+"33",borderRadius:12,overflow:"hidden"}}>
                  <div style={{padding:"10px 14px",background:bg,display:"flex",alignItems:"flex-start",gap:10}}>
                    {/* Número ranking */}
                    <div style={{width:28,height:28,borderRadius:8,background:col,display:"flex",
                      alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                      <span style={{color:"#fff",fontFamily:"Montserrat",fontWeight:800,fontSize:13}}>
                        {idx+1}
                      </span>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:700,fontSize:13,color:NV,lineHeight:1.3,
                        overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:5}}>
                        {e.area}
                      </div>
                      {/* Barra de riesgo */}
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{flex:1,height:7,background:"rgba(0,0,0,0.08)",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",width:e.score+"%",background:col,borderRadius:4,transition:"width .6s"}}/>
                        </div>
                        <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:11,color:col,

                          {nivel} · {e.score}%
                        </span>
                      </div>
                      {/* Razones */}
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        {e.reasons.map(function(r,ri){return(
                          <div key={ri} style={{display:"flex",alignItems:"flex-start",gap:5}}>
                            <span style={{color:col,fontSize:11,flexShrink:0,marginTop:1}}>▸</span>
                            <span style={{fontSize:11,color:"#555",lineHeight:1.4}}>{r}</span>
                          </div>
                        );})}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
            <div style={{fontSize:10,color:"#b0bac8",textAlign:"center",marginTop:4,fontStyle:"italic"}}>
              Esta predicción es orientativa. Úsala como apoyo, no como diagnóstico definitivo.
            </div>
          </div>
        }
      </AnalCard>

      {topP.length>0&&(
        <AnalCard id="ac-pend" title="Pendientes por equipo" icon={IC.alert} col="#C45200">
          {topP.map(function(e){return(
            <div key={e.area} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{fontSize:11,color:"#8a96a8",width:"35%",maxWidth:120,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flexShrink:0}}>{e.area}</span>
              <div style={{flex:1,height:9,background:"#e8f0fb",borderRadius:5,overflow:"hidden",minWidth:0}}>
                <div style={{height:"100%",width:Math.round(e.pend/mxP*100)+"%",background:"#C45200",borderRadius:4}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,minWidth:56,justifyContent:"flex-end",flexShrink:0}}>
                <span style={{fontFamily:"Montserrat",fontSize:12,fontWeight:800,color:"#C45200"}}>{e.pend}</span>
                {e.alta>0&&<span style={{background:"#FFDEDE",color:"#C0001A",padding:"1px 6px",borderRadius:10,fontSize:10,fontWeight:800,fontFamily:"Montserrat"}}>{e.alta} alta</span>}
              </div>
            </div>
          );}) }
        </AnalCard>
      )}

      <AnalCard title="Partes y repuestos detectados" icon={IC.tag} col="#1D7A3E">
        {ptop.length===0
          ?<span style={{color:"#8a96a8",fontSize:13}}>No se detectaron palabras clave aun.</span>
          :<div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{fontSize:11,color:"#8a96a8",marginBottom:6}}>
              Toca un repuesto para ver en qué equipos se usó.
            </div>
            {ptop.map(function(kv){
              const nombre=kv[0];
              const datos=kv[1];
              const isOpen=expandedPart===nombre;
              const areasSorted=Object.entries(datos.areas).sort(function(a,b){return b[1]-a[1];});
              return(
                <div key={nombre} style={{border:"1px solid rgba(13,47,92,0.10)",borderRadius:10,overflow:"hidden"}}>
                  {/* Fila principal */}
                  <div onClick={function(){setExpandedPart(isOpen?null:nombre);}}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                      padding:"10px 14px",cursor:"pointer",background:isOpen?"#f0faf4":"#fff",
                      transition:"background .15s"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:13,color:NV,
                        textTransform:"capitalize"}}>{nombre}</span>
                      <span style={{background:"#D1F2E0",color:"#1D7A3E",borderRadius:8,
                        padding:"2px 9px",fontSize:11,fontWeight:800,fontFamily:"Montserrat"}}>
                        {datos.total}x
                      </span>
                      <span style={{fontSize:11,color:"#8a96a8",fontFamily:"Montserrat",fontWeight:600}}>
                        {areasSorted.length} equipo{areasSorted.length!==1?"s":""}

                    <div style={{color:"#8a96a8",transition:"transform .2s",
                      transform:isOpen?"rotate(180deg)":"none",display:"flex"}}>
                      <Ico d={IC.chev} sz={14} c="#8a96a8"/>
                    </div>
                  </div>
                  {/* Detalle por equipo */}
                  {isOpen&&(
                    <div style={{borderTop:"1px solid rgba(13,47,92,0.08)",background:"#f9fafb",
                      padding:"8px 14px 10px",display:"flex",flexDirection:"column",gap:6}}>
                      {areasSorted.map(function(av){
                        const pct=Math.round(av[1]/datos.total*100);
                        return(
                          <div key={av[0]} style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontSize:11,color:"#555",flex:1,minWidth:0,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                              title={av[0]}>{av[0]}</span>
                            <div style={{width:60,height:6,background:"#e8f0fb",borderRadius:3,flexShrink:0}}>
                              <div style={{height:"100%",width:pct+"%",background:"#1D7A3E",borderRadius:3}}/>
                            </div>
                            <span style={{fontFamily:"Montserrat",fontWeight:800,fontSize:11,
                              color:"#1D7A3E",minWidth:24,textAlign:"right",flexShrink:0}}>
                              {av[1]}x
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        }
      </AnalCard>

      <div className="a2">
        <AnalCard title="Reportes por tecnico" icon={IC.user} col="#2d7dd2">
          {ptec.length===0?<span style={{color:"#8a96a8",fontSize:13}}>Sin datos</span>
            :ptec.map(function(kv,i){return <RBar key={kv[0]} lbl={kv[0]} val={kv[1]} mx={mxTec} col={i===0?NV:"#2d7dd2"} sfx=" rep."/>;}) }
        </AnalCard>
        <AnalCard title="Distribucion por turno" icon={IC.clk} col="#6366f1">
          {trEntries.length===0
            ?<span style={{color:"#8a96a8",fontSize:13}}>Sin datos</span>
            :trEntries.map(function(kv,i){
              const p=Math.round(kv[1]/totTr*100);
              const col=TR_COLS[i%TR_COLS.length];
              return(
                <div key={kv[0]} style={{marginBottom:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,gap:8}}>
                    <span style={{fontSize:12,color:col,fontWeight:700,fontFamily:"Montserrat",
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{kv[0]}</span>
                    <span style={{fontFamily:"Montserrat",fontSize:11,color:col,fontWeight:800,flexShrink:0}}>{kv[1]} · {p}%</span>
                  </div>
                  <div style={{height:9,background:"#e8f0fb",borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:p+"%",background:col,borderRadius:5,transition:"width .4s"}}/>
                  </div>
                </div>
              );
            })
          }
        </AnalCard>
      </div>

      <AnalCard id="ac-resumen" title="Resumen por equipo" icon={IC.list} col="#8a96a8">
        <div style={{overflowX:"auto"}}>
          <table className="atbl">
            <thead><tr>
              {["Equipo","Interv.","Tiempo","Pendientes","Pend. Alta"].map(function(h){return <th key={h}>{h}</th>;})}
            </tr></thead>
            <tbody>
              {eqs.slice().sort(function(a,b){return b.iv-a.iv;}).map(function(e){return(
                <tr key={e.area}>
                  <td style={{fontWeight:700,color:NV,fontFamily:"Montserrat"}}>{e.area}</td>
                  <td style={{fontFamily:"Montserrat",color:NV,fontWeight:800}}>{e.iv}</td>
                  <td style={{fontFamily:"Montserrat",color:"#2d7dd2",fontSize:12,fontWeight:700}}>{e.min>0?fm(e.min):"--"}</td>
                  <td style={{fontFamily:"Montserrat",color:e.pend>0?"#C45200":"#8a96a8",fontWeight:e.pend>0?700:400}}>{e.pend||"--"}</td>
                  <td>{e.alta>0?<span style={{background:"#FFDEDE",color:"#C0001A",padding:"2px 7px",borderRadius:10,fontSize:11,fontWeight:800,fontFamily:"Montserrat"}}>{e.alta}</span>:<span style={{color:"#8a96a8"}}>--</span>}</td>
                </tr>
              );})}
            </tbody>
          </table>
          <div style={{fontSize:11,color:"#8a96a8",marginTop:10,fontStyle:"italic"}}>
            "Pend. Alta" = pendientes de prioridad Alta para ese equipo
          </div>
        </div>
      </AnalCard>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function BitacoraApp({onBack, initialUser}){
  const [entries,setEntries]=useState([]);
  const [eqs,setEqs]=useState(AREAS_DEF);
  const [tecs,setTecs]=useState([]);
  const [metEqs,setMetEqs]=useState([]);
  const [locEqs,setLocEqs]=useState(AREAS_LOC);
  const [turnos,setTurnos]=useState(TURNOS_DEF);
  const [tab,setTab]=useState("home");
  const [detail,setDetail]=useState(null);
  const [showPass,setShowPass]=useState(false);
  const [adminOk,setAdminOk]=useState(false);
  const [loading,setLoading]=useState(true);
  const [sync,setSync]=useState(null);

  useEffect(function(){
    async function init(){
      const safetyTimer = setTimeout(()=>setLoading(false), 6000);
      try{
        const [eVal,tVal,eqVal,pVal,metVal,locVal,turVal]=await Promise.all([
          btkGet(KS.e),btkGet(KS.tec),btkGet(KS.eq),btkGet(KS.p),btkGet(KS.met),btkGet(KS.loc),btkGet(KS.tur)
        ]);
        if(eVal!==null) setEntries(eVal);
        else setEntries(lg(KS.e,[]));
        if(tVal!==null){
          const raw=tVal;
          if(raw.length>0&&typeof raw[0]==="string") setTecs([]);
          else setTecs(raw);
        } else {
          const raw=lg(KS.tec,[]);
          if(raw.length>0&&typeof raw[0]==="string") setTecs([]);
          else setTecs(raw);
        }
        if(eqVal!==null) setEqs(eqVal.length>0?eqVal:AREAS_DEF);
        else setEqs(lg(KS.eq,AREAS_DEF));
        if(metVal!==null) setMetEqs(metVal);
        else setMetEqs(lg(KS.met,[]));
        if(locVal!==null&&locVal.length>0) setLocEqs(locVal);
        else setLocEqs(lg(KS.loc,AREAS_LOC));
        if(turVal!==null&&turVal.length>0) setTurnos(turVal);
        else setTurnos(lg(KS.tur,TURNOS_DEF));
        if(pVal!==null) ls(KS.p,pVal);
        setSync("ok");
      }catch(ex){
        console.warn("Supabase init error",ex);
        setEntries(lg(KS.e,[]));
        const raw=lg(KS.tec,[]);
        setTecs(raw.length>0&&typeof raw[0]==="string"?[]:raw);
        setEqs(lg(KS.eq,AREAS_DEF));
        setMetEqs(lg(KS.met,[]));
        setLocEqs(lg(KS.loc,AREAS_LOC));
        setTurnos(lg(KS.tur,TURNOS_DEF));
        setSync("err");
      }finally{
        clearTimeout(safetyTimer);
        setLoading(false);
        setTimeout(function(){setSync(null);},2500);
      }
    }
    init();
  },[]);

  const tapN=useRef(0); const tapTm=useRef(null);
  function logoTap(){
    tapN.current++;clearTimeout(tapTm.current);
    tapTm.current=setTimeout(function(){tapN.current=0;},3000);
    if(tapN.current>=5){tapN.current=0;clearTimeout(tapTm.current);
      if(adminOk)setTab("admin");else setShowPass(true);}
  }

  function doSave(entry){
    setEntries(function(p){
      const n=[entry].concat(p);
      save(KS.e,n);
      return n;
    });
    setTab("home");
  }
  function doDel(id){
    setEntries(function(p){
      const n=p.filter(function(e){return e.id!==id;});
      save(KS.e,n);
      return n;
    });
    setDetail(null);
  }

  const totP=entries.reduce(function(a,e){return a+e.pendientes.length;},0);
  const altaP=entries.reduce(function(a,e){return a+e.pendientes.filter(function(p){return p.p==="Alta";}).length;},0);

  const TABS=[
    {id:"home",lbl:"Inicio",ic:IC.home},
    {id:"reportes",lbl:"Reportes",ic:IC.docs},
    {id:"analisis",lbl:"Analisis",ic:IC.bar},
    {id:"nuevo",lbl:"Nuevo",ic:IC.plus},
  ];

  return(
    <div className="btk-app" style={{minHeight:"100vh",background:"#f4f7fd"}}>

      {/* Loading inicial */}
      {loading&&(
        <div style={{position:"fixed",inset:0,background:"#f4f7fd",zIndex:9999,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
          <img src={LOGO} alt="B" style={{height:54,borderRadius:10,objectFit:"contain"}} onError={function(e){e.target.style.display="none";}}/>
          <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:15,color:NV,letterSpacing:1}}>Cargando…</div>
          <div style={{width:36,height:36,border:"3px solid rgba(13,47,92,0.15)",borderTop:"3px solid #0D2F5C",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <style>{`@keyframes spin{to{transform:rotate(360deg);}}`}</style>
        </div>
      )}

      {/* Indicador de sync Supabase */}
      {sync&&(
        <div style={{position:"fixed",bottom:74,right:14,zIndex:300,background:sync==="ok"?"#1D7A3E":"#C0001A",color:"#fff",borderRadius:8,padding:"6px 12px",fontSize:11,fontFamily:"Montserrat",fontWeight:700,boxShadow:"0 4px 16px rgba(0,0,0,0.18)",display:"flex",alignItems:"center",gap:6}}>
          {sync==="ok"?"✓ Sincronizado con Supabase":"⚠ Sin conexión — modo local"}
        </div>
      )}

      {showPass&&<PassModal onOk={function(){setShowPass(false);setAdminOk(true);setTab("admin");}} onClose={function(){setShowPass(false);}}/>}

      <header className="brand-bar">
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {onBack&&<button onClick={onBack} className="btk-back" style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",padding:"6px 10px",display:"flex",alignItems:"center",gap:5,fontFamily:"Montserrat",fontWeight:700,fontSize:11,marginRight:4}}>← Suite</button>}
          <img src={LOGO} alt="B" onClick={logoTap}
            style={{height:36,borderRadius:7,objectFit:"contain",cursor:"pointer",userSelect:"none"}}
            onError={function(e){e.target.style.display="none";}}/>
          <div>
            <div style={{fontFamily:"Montserrat",fontWeight:800,fontSize:14,color:"#fff",letterSpacing:0.3}}>Bitacora de Turno</div>
            <div style={{fontFamily:"Montserrat",fontSize:9,color:"rgba(255,255,255,0.4)",letterSpacing:1.5,textTransform:"uppercase",marginTop:1}}>Bussie - Mantenimiento</div>
          </div>
        </div>
        {adminOk&&tab!=="admin"&&(
          <button onClick={function(){setTab("admin");}}
            style={{background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:8,color:"#fff",cursor:"pointer",padding:"5px 12px",display:"flex",alignItems:"center",gap:5,fontFamily:"Montserrat",fontSize:11,fontWeight:700}}>
            <Ico d={IC.cog} sz={13} c="#fff"/>Admin
          </button>
        )}
      </header>

      <main style={{maxWidth:860,margin:"0 auto",padding:"20px 14px 82px"}}>
        {detail?(
          <EntryDetail entry={entries.find(function(e){return e.id===detail.id;})||detail} onBack={function(){setDetail(null);}} onDel={doDel}/>
        ):tab==="home"?(
          <div style={{display:"flex",flexDirection:"column",gap:18}}>
            <div className="stat-grid">
              {[{lbl:"Reportes",val:entries.length,col:NV,ic:IC.docs,tab:"reportes"},
                {lbl:"Pendientes",val:totP,col:"#C45200",ic:IC.alert,tab:"reportes"},

          );})}
        </nav>
      )}
    </div>
  );
}

            {/* Text */}
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:16,fontWeight:700,letterSpacing:-0.3,lineHeight:1}}>{m.label}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",marginTop:6,flexWrap:"wrap"}}>
                {m.tags.map(function(t,i){return(
                  React.createElement(React.Fragment,{key:t},
                    React.createElement("span",{style:{
                      fontSize:11,color:"rgba(255,255,255,0.45)",
                      fontWeight:500,letterSpacing:0.1,
                    }},t),
                    i<m.tags.length-1&&React.createElement("span",{style:{
                      fontSize:9,color:"rgba(255,255,255,0.20)",lineHeight:1,
                    }},"·")
                  )
                );})}
              </div>
            </div>

            {/* Chevron */}
            <div style={{flexShrink:0,paddingLeft:4}}>{IconChevron}</div>
          </button>
        );})}
      </div>

      <div style={{marginTop:44,fontSize:10,color:"rgba(255,255,255,0.18)",letterSpacing:1.8,textTransform:"uppercase"}}>
        Bussié · Mantenimiento
      </div>
    </div>
  );
}

function RootApp(){
  var s=React.useState(null); var mod=s[0]; var setMod=s[1];
  var u=React.useState(null); var rootUser=u[0]; var setRootUser=u[1];

  React.useEffect(function(){
    if(mod){
      window.history.pushState({bussie:"module",mod:mod},"");
      var handler=function(e){
        setMod(null);
        window.history.pushState({bussie:"suite"},"");
      };
      window.addEventListener("popstate",handler);
      return function(){ window.removeEventListener("popstate",handler); };
    } else {
      if(!window.history.state||!window.history.state.bussie){
        window.history.replaceState({bussie:"suite"},"");
      }
    }
  },[mod]);

  if(!rootUser) return <LoginScreen onLogin={setRootUser}/>;
  if(!mod) return <SuiteSelector onSelect={setMod} currentUser={rootUser} onLogout={function(){setRootUser(null);setMod(null);}}/>;
  if(mod==="almacen") return <AlmacenApp onBack={function(){setMod(null);}} initialUser={rootUser}/>;
  if(mod==="bitacora") return <BitacoraApp onBack={function(){setMod(null);}}/>;
  return null;
}
ReactDOM.render(React.createElement(RootApp),document.getElementById("root"));

// ── Swipe-down global para cerrar cualquier .sheet ───────────────────────────
(function(){
  var sheet=null, startY=0, startScrollTop=0;
  document.addEventListener("touchstart",function(e){
    var el=e.target.closest(".sheet");
    if(!el) return;
    sheet=el;
    startY=e.touches[0].clientY;
    startScrollTop=el.scrollTop;
  },{passive:true});
  document.addEventListener("touchmove",function(e){
    if(!sheet||startScrollTop>0) return;
    var dy=e.touches[0].clientY-startY;
    if(dy>0){
      sheet.style.transform="translateY("+Math.min(dy*0.5,120)+"px)";
      sheet.style.transition="none";
    }
  },{passive:true});
  document.addEventListener("touchend",function(e){
    if(!sheet) return;
    var dy=e.changedTouches[0].clientY-startY;
    if(dy>80&&startScrollTop===0){
      sheet.style.transform="translateY(110%)";
      sheet.style.transition="transform 0.28s cubic-bezier(0.32,0.72,0,1)";
      var overlay=sheet.closest(".overlay")||sheet.parentElement;
      setTimeout(function(){
        if(overlay) overlay.click();
        sheet.style.transform="";
        sheet.style.transition="";
        sheet=null;
      },260);
    } else {
      sheet.style.transform="";
      sheet.style.transition="transform 0.2s ease";
      sheet=null;
    }
  },{passive:true});
})();

</script>
